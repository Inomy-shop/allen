<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Allen — Landing page options</title>
<link rel="stylesheet" href="landing.css">
<style>
  body { margin: 0; background: oklch(0.94 0.005 80); font-family: 'Inter Tight', system-ui, sans-serif; }
  html, body, #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="landing-shared.jsx"></script>
<script type="text/babel" src="landing-variants.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas title="Allen — Landing page options" subtitle="Three contrasting directions. Drag, rename, or focus any artboard.">
      <DCSection id="variants" title="Three directions">
        <DCArtboard id="v1" label="V1 — Editorial · light · type-led" width={1280} height={3200}>
          <LandingV1/>
        </DCArtboard>
        <DCArtboard id="v2" label="V2 — Operator console · dark · live" width={1280} height={3200}>
          <LandingV2/>
        </DCArtboard>
        <DCArtboard id="v3" label="V3 — Swiss · mega wordmark · diagram-led" width={1280} height={3200}>
          <LandingV3/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
