<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Allen — Agentic OS</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="village.css">
<link rel="stylesheet" href="canon.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/marked@13.0.3/marked.min.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="pages-home.jsx"></script>
<script type="text/babel" src="pages-runs.jsx"></script>
<script type="text/babel" src="pages-lists.jsx"></script>
<script type="text/babel" src="pages-village.jsx"></script>
<script type="text/babel" src="pages-canon.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "sidebarMode": "full"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);
  const theme = tweaks.theme;
  const sidebarMode = tweaks.sidebarMode;

  const setTheme = (v) => setTweak('theme', v);
  const setSidebarMode = (v) => setTweak('sidebarMode', v);

  const [route, setRoute] = useState('mywork');
  const [runId, setRunId] = useState(null);
  const [taskId, setTaskId] = useState('t-1453');
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const { execs } = useLiveSimulation();

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setCmdkOpen(o => !o);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const openRun = (id) => { setRunId(id); setRoute('run'); };
  const openTask = (id) => { setTaskId(id); setRoute('task'); };

  let body = null;
  if (route === 'mywork') body = <MyWorkPage openTask={openTask} setRoute={setRoute} />;
  else if (route === 'inbox') body = <InboxPage openTask={openTask} />;
  else if (route === 'threads') body = <ThreadsPage openTask={openTask} />;
  else if (route === 'task') body = <TaskPage taskId={taskId} setRoute={setRoute} openTask={openTask} />;
  else if (route === 'linear') body = <LinearPage openTask={openTask} />;
  else if (route === 'pulls') body = <PullRequestsPage />;
  else if (route === 'activity') body = <ActivityPage execs={execs} openTask={openTask} />;
  else if (route === 'analytics') body = <AnalyticsPage execs={execs} />;
  else if (route === 'learnings') body = <LearningsPage />;
  else if (route === 'library' || route === 'orgsettings') body = <LibraryPage setRoute={setRoute} />;
  else if (route === 'settings') body = <SettingsPage setRoute={setRoute} theme={theme} setTheme={setTheme} />;
  // legacy still navigable from library tabs / cmdk
  else if (route === 'home') body = <HomePage setRoute={setRoute} openRun={openRun} execs={execs} />;
  else if (route === 'chat') body = <ChatPage setRoute={setRoute} openRun={openRun} />;
  else if (route === 'interventions') body = <InterventionsPage />;
  else if (route === 'executions') body = <ExecutionsPage execs={execs} openRun={openRun} />;
  else if (route === 'run') body = <RunTracePage runId={runId} execs={execs} setRoute={setRoute} />;
  else if (route === 'workspaces') body = <WorkspacesPage />;
  else if (route === 'workflows') body = <WorkflowsPage />;
  else if (route === 'agents') body = <AgentsPage />;
  else if (route === 'repos') body = <ReposPage />;
  else if (route === 'village') body = <VillagePage execs={execs} setRoute={setRoute} />;

  const liveCount = execs.filter(e => e.status === 'running').length;

  return (
    <div className="app" data-sidebar={sidebarMode} data-screen-label={`screen-${route}`}>
      <Sidebar route={route === 'run' ? 'activity' : route === 'task' ? 'mywork' : route} setRoute={setRoute} sidebarMode={sidebarMode} />
      <div className="main">
        <Topbar
          route={route === 'run' ? 'executions' : route}
          theme={theme} setTheme={setTheme}
          sidebarMode={sidebarMode} setSidebarMode={setSidebarMode}
          openCmdK={() => setCmdkOpen(true)}
          liveCount={liveCount}
        />
        {body}
      </div>

      <CommandPalette open={cmdkOpen} onClose={() => setCmdkOpen(false)} setRoute={setRoute} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Appearance">
          <TweakRadio label="Theme" value={theme} onChange={v => setTheme(v)} options={[
            { label: 'Light', value: 'light' },
            { label: 'Dark', value: 'dark' },
          ]}/>
          <TweakRadio label="Sidebar" value={sidebarMode} onChange={v => setSidebarMode(v)} options={[
            { label: 'Full', value: 'full' },
            { label: 'Icons', value: 'icon' },
            { label: 'Hidden', value: 'collapsed' },
          ]}/>
        </TweakSection>
        <TweakSection label="Navigate">
          <TweakButton onClick={() => setRoute('mywork')}>My work</TweakButton>
          <TweakButton onClick={() => setRoute('inbox')}>Inbox</TweakButton>
          <TweakButton onClick={() => setRoute('threads')}>Threads</TweakButton>
          <TweakButton onClick={() => openTask('t-spec-enrich')}>Open task (spec-sheet enrichment)</TweakButton>
          <TweakButton onClick={() => openTask('t-1453')}>Open task (running)</TweakButton>
          <TweakButton onClick={() => openTask('t-1432')}>Open task (waiting)</TweakButton>
          <TweakButton onClick={() => setRoute('linear')}>Tickets</TweakButton>
          <TweakButton onClick={() => setRoute('activity')}>Activity</TweakButton>
          <TweakButton onClick={() => setRoute('settings')}>Settings</TweakButton>
          <TweakButton onClick={() => setRoute('village')}>🏘 Village (legacy)</TweakButton>
          <TweakButton onClick={() => setCmdkOpen(true)}>Open ⌘K</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
