name: understand-and-plan
description: >
  Lightweight planning-only workflow. Takes a task description plus a target
  repo, runs a requirements-analyst agent to UNDERSTAND the ask, lets it
  ask clarifying questions if anything is ambiguous, then produces a
  concrete implementation plan.

  No coding, no PR, no testing — this workflow stops at the plan. Use it
  when you want a human-readable blueprint before deciding whether to
  commit engineering effort.

  Human touches per run (steady state): 1-3 —
    1. Initial task + repo (via the run form)
    2. Clarification answers (only if the analyst needs them)
    3. Plan review (implicit — the plan is the final output)

version: 1

context:
  requires: [repo]
  tools: [filesystem, git, terminal]
  concurrency: 2

input:
  task:
    type: string
    required: true
    widget: textarea
    label: Task
    description: Describe the work in plain English — what you want built, changed, or investigated. Include constraints and success criteria if you know them.
    placeholder: "e.g. Add a CSV export button to the Executions page that downloads the currently-filtered rows."
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Target repo
    description: Registered repo the plan will target. The analyst scans it to ask informed questions and ground the plan in the existing codebase.

nodes:
  understand_requirement:
    agent: requirements-analyst
    # resume_on_retry: true (default) — after the user answers clarifying
    # questions, the agent resumes its prior session so it remembers what
    # it asked. The retry feedback prompt delivers the user's answers
    # into the resumed conversation. The agent then either asks follow-up
    # questions (up to 3 rounds) or emits ready_to_plan=true to advance.
    prompt: |
      You are in UNDERSTAND mode. Read the task and scan the repo briefly to
      form an informed opinion about whether the task is clear enough to
      produce an implementation plan, or whether you need to ask the user
      clarifying questions first.

      TASK: {{task}}
      REPO PATH: {{repo_path}}

      Quick repo scan (mandatory before deciding):
        1. Read top-level config (package.json / go.mod / requirements.txt /
           Cargo.toml) to learn the stack.
        2. Skim the directory structure for the layering convention (routes,
           services, models, UI components).
        3. If the task references an existing feature, find 1-2 similar
           features in the repo to anchor your understanding of patterns.

      After the scan, decide:

      If the task is UNCLEAR — emit 1-3 concrete, answerable questions.
      Prefer questions that surface decisions you cannot make on the user's
      behalf (scope boundaries, behavior under edge cases, UX preferences).
      DON'T ask questions whose answers you can infer from the repo or
      from common-sense defaults.
        ```json
        {
          "clarifying_questions": [
            "Should the export include hidden columns, or only visible ones?",
            "Is there a row cap, or export everything that matches the filter?"
          ],
          "ready_to_plan": false,
          "refined_task": ""
        }
        ```

      If the task is CLEAR (or after enough Q&A has resolved ambiguity),
      synthesize the original ask + every clarification answer into one
      coherent specification. The `refined_task` is what the planning
      node reads — do NOT parrot the original; bake in the answers:
        ```json
        {
          "clarifying_questions": [],
          "ready_to_plan": true,
          "refined_task": "Add a CSV export button to the Executions page toolbar. Exports the currently-filtered rows (not just the visible page). Columns match the current table view including any user-toggled hidden columns. No row cap — we rarely exceed 10k. Downloads as executions-YYYY-MM-DD.csv. Uses existing /api/executions endpoint with export=csv flag."
        }
        ```

      You have at most 3 clarification rounds. Round 3 is your last chance
      to ask — after that, commit to the best interpretation and emit
      ready_to_plan=true with whatever refined_task you can infer.

      {{#if retry_context}}
      USER ANSWERS TO YOUR PRIOR QUESTIONS:
      {{retry_context}}

      Decide: are the answers enough to plan? If yes, emit
      ready_to_plan=true with a synthesized refined_task. If not,
      ask follow-ups (you have {{__retry_attempt}} of 3 rounds used).
      {{/if}}
    outputs:
      clarifying_questions: "Array of clarifying questions. Empty when ready_to_plan=true."
      ready_to_plan: "Boolean — true when the analyst has enough context to plan."
      refined_task: "Synthesized task spec incorporating the original ask + all Q&A answers. Only set when ready_to_plan=true."

  ask_user:
    type: human
    fields:
      - name: answers
        label: "Answers to the clarifying questions"
        type: textarea
        required: true
    outputs:
      answers: "Free-text answers to the clarifying questions, one per line."
    prompt: |
      🟡 The analyst needs clarification before it can plan.

      ORIGINAL TASK:
      {{task}}

      QUESTIONS TO ANSWER:
      {{clarifying_questions}}

      Answer each question in order. Be specific — your answers go
      straight into the plan.

  produce_plan:
    agent: engineering-lead
    prompt: |
      You are in PLANNING mode. Take the refined task specification and
      produce a concrete, file-level implementation plan. DO NOT code —
      the plan is the artifact.

      REFINED TASK:
      {{refined_task}}

      ORIGINAL TASK: {{task}}
      REPO PATH: {{repo_path}}

      Mandatory repo grounding before you plan:
        1. Read the specific files your plan will touch — don't guess
           their structure from names.
        2. Identify the existing patterns for the kind of change you're
           proposing (routing, data access, UI components, tests).
        3. Call out which files need to be created, which modified, and
           the specific change in each file (one line of intent, not a
           vague "update").

      Your plan MUST fit the existing architecture. If a clean fit isn't
      possible, name the exception and justify it explicitly.

      OUTPUT FORMAT — end your response with a fenced JSON block containing
      EXACTLY these top-level keys:
        ```json
        {
          "plan_markdown": "<the full plan as a markdown string — the human-readable artifact>",
          "plan_json": {
            "summary": "1-2 sentence summary of what the plan does",
            "changes": [
              {
                "file": "packages/ui/src/pages/ExecutionsPage.tsx",
                "action": "modify",
                "intent": "Add a CSV export button to the toolbar"
              }
            ],
            "new_files": ["packages/ui/src/utils/csv-export.ts"],
            "risks": ["export may OOM for 50k+ row filters"],
            "assumptions": ["existing /api/executions supports export=csv"],
            "estimated_effort": "1-2 hours",
            "open_questions": []
          }
        }
        ```

      `plan_markdown` is what the user reads. It should include:
        - Summary of the change
        - File-by-file breakdown with intent for each
        - Risks + mitigations
        - Assumptions (things the analyst committed on without user input)
        - Any remaining open questions (if any — should be rare by this stage)
        - Rough effort estimate
    outputs:
      plan_markdown: "Full implementation plan as markdown — the human-readable artifact."
      plan_json: "Structured plan with summary, changes, new_files, risks, assumptions, estimated_effort, open_questions."

edges:
  - { from: START, to: understand_requirement }

  # Branch on ready_to_plan: go ask the user when clarification is needed,
  # otherwise advance directly to producing the plan.
  - { from: understand_requirement, to: produce_plan,  condition: "ready_to_plan == true" }
  - { from: understand_requirement, to: ask_user,       condition: "ready_to_plan != true" }

  # After the user answers, loop back to understand_requirement so the
  # agent can incorporate the answers and decide if more questions are
  # needed or if the task is now clear enough to plan. Up to 3 rounds —
  # the analyst's prompt instructs it to commit after round 3. The agent's
  # session is resumed (default behavior) so it remembers its prior Q&A.
  - from: ask_user
    to: understand_requirement
    max_retries: 3
    retry_context: |
      The user answered your clarifying questions:

      {{answers}}

      Based on these answers, decide: if the task is now clear enough,
      emit ready_to_plan=true with a synthesized refined_task. If not,
      ask follow-ups (you have {{__retry_attempt}} of 3 rounds used).

  - { from: produce_plan, to: END }
