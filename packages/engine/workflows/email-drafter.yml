name: email-drafter
description: Draft a professional email and polish it
version: 1

context:
  requires: []
  tools: []

input:
  context: { type: string, required: true }

nodes:
  draft:
    role: codex-developer
    prompt: |
      You are an email drafting assistant.

      User's request: {{context}}

      {{#if retry_context}}
      ADDITIONAL CONTEXT FROM USER: {{retry_context}}
      {{/if}}

      BEFORE writing the email, check if you have enough information:
      - Who is the recipient?
      - What is the purpose/goal?
      - What key points should be included?

      If ANY of these are missing or unclear from the user's request, you MUST use __action: "clarify" to ask.
      Do NOT write a placeholder email asking for details — use the clarify mechanism instead.

      Only write the actual email when you have enough context to produce a real, sendable email.
    outputs: [subject, body, tone]
    output_format: json
    resume_on_retry: true

  polish:
    role: codex-developer
    prompt: |
      Polish this email for sending:

      Subject: {{subject}}
      Body: {{body}}
      Tone: {{tone}}

      Fix grammar, improve clarity, make it concise. Return the final version ready to send.
    outputs: [final_subject, final_body]
    output_format: json

edges:
  - { from: START, to: draft }
  - { from: draft, to: polish }
  - { from: polish, to: END }
