name: autogate-test
description: Test all auto-gate behaviors — stop, clarify (retry/continue), skip
version: 1

context:
  requires: []
  tools: []

input:
  task: { type: string, required: true }

nodes:
  analyze:
    agent: codex-researcher
    prompt: |
      Analyze this task: {{task}}

      Decide what to do:
      - If the task is nonsensical or gibberish → stop the workflow
      - If the task is too vague (e.g. "do something", "fix it") → ask for clarification, you cannot produce output without it
      - If the task is clear → produce a plan with 3 steps

      {{#if retry_context}}
      HUMAN PROVIDED CLARIFICATION: {{retry_context}}
      Use this to produce your plan.
      {{/if}}
    outputs: [plan, task_type]
    output_format: json
    resume_on_retry: true

  execute:
    agent: codex-researcher
    prompt: |
      Execute step 1 of this plan:
      {{plan}}

      Task type: {{task_type}}

      Produce a short result for step 1.

      If the plan is unclear or you can't execute it → ask for help.
      If the plan has contradictions → ask which direction to take.
    outputs: [step1_result, progress]
    output_format: json

  review:
    agent: codex-reviewer
    prompt: |
      Review the work done:
      Original task: {{task}}
      Plan: {{plan}}
      Step 1 result: {{step1_result}}

      Write a short quality assessment.
      If the result is poor quality or empty → ask if the user wants to proceed anyway.
    outputs: [assessment, quality_score]
    output_format: json

  format:
    agent: codex-researcher
    prompt: |
      Format the final output:
      Task: {{task}}
      Plan: {{plan}}
      Result: {{step1_result}}
      Assessment: {{assessment}}
      Quality: {{quality_score}}

      Create a clean summary report.
      If there's nothing meaningful to report → skip.
    outputs: [report]

edges:
  - { from: START, to: analyze }
  - { from: analyze, to: execute }
  - { from: execute, to: review }
  - { from: review, to: format }
  - { from: format, to: END }
