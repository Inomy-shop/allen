name: self-healing-repair
description: >
  Built-in self-healing repair workflow for Allen-owned defects. Handles Allen
  repo/runtime, tooling, workflow-engine, memory, prompt, and instruction
  incidents through one repair pipeline selected by repair_area/root_cause_area.

version: 1

context:
  requires: [repo]
  tools: [filesystem, git, terminal]
  concurrency: 2

input:
  incident_id:
    type: string
    required: false
    widget: text
  incident_fingerprint:
    type: string
    required: true
    widget: text
  linear_identifier:
    type: string
    required: false
    widget: text
  linear_url:
    type: string
    required: false
    widget: text
  repo_path:
    type: string
    required: true
    widget: repo_picker
  source_type:
    type: string
    required: true
    widget: text
  root_cause_area:
    type: string
    required: true
    widget: text
  repair_area:
    type: string
    required: false
    widget: select
    options:
      - allen_repo
      - memory_system
      - tool_integration
      - workflow_definition
      - prompt_instruction
  incident_summary:
    type: string
    required: true
    widget: textarea
  evidence:
    type: object
    required: false

nodes:
  diagnose:
    agent: bug-investigator
    resume_on_retry: true
    prompt: |
      Investigate this Allen self-healing incident as a bug in the Allen repo.

      LINEAR: {{linear_identifier}} {{linear_url}}
      INCIDENT: {{incident_fingerprint}}
      SOURCE TYPE: {{source_type}}
      ROOT CAUSE AREA: {{root_cause_area}}
      REPAIR AREA: {{repair_area}}
      SUMMARY: {{incident_summary}}
      REPO PATH: {{repo_path}}

      EVIDENCE:
      {{evidence}}

      Use this focus map. If REPAIR AREA is empty, use ROOT CAUSE AREA.
      - memory_system: memory extraction, embeddings, retrieval, memory audits,
        and context injection.
      - tool_integration: MCP discovery, tool schemas, tool allowlists, env
        propagation, workspace/artifact context, and Linear dispatch.
      - workflow_definition: workflow YAML, engine code, node prompts,
        conditions, retries, traces, and stuck workflow states.
      - prompt_instruction: built-in agent prompts, workflow node prompts,
        delegation guidance, memory guidance, system instructions, and tool-use
        instructions.
      - allen_repo: general Allen app/backend/frontend/runtime defects.

      Find the exact root cause in Allen code/config/prompts/workflows. Include
      completed-but-wrong behavior if the evidence shows it.

      End with JSON: root_cause, files_to_touch[], confidence,
      fix_description, reproduction_steps, affected_components,
      regression_strategy, normalized_repair_area.
    outputs:
      root_cause: "Root cause."
      files_to_touch: "Files to change."
      fix_description: "Fix description."
      regression_strategy: "Regression strategy."
      normalized_repair_area: "Repair area chosen by the diagnostician."

  create_workspace:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
      timeout_sec: 600
    outputs:
      workspace_id: "Workspace id."
      worktree_path: "Worktree path."
      branch: "Branch."
      branch_name: "Branch alias."
      base_branch: "Base branch."
      repo_path: "Alias of worktree path."

  implement:
    agent: engineering-lead
    resume_on_retry: true
    prompt: |
      Fix this Allen self-healing incident in the existing worktree.

      LINEAR: {{linear_identifier}} {{linear_url}}
      INCIDENT: {{incident_fingerprint}}
      REPAIR AREA: {{normalized_repair_area}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      FILES TO TOUCH: {{files_to_touch}}
      REGRESSION STRATEGY: {{regression_strategy}}
      WORKTREE PATH: {{worktree_path}}
      BRANCH: {{branch_name}}

      HARD RULES:
      - Do not create a new workspace. Use {{worktree_path}}.
      - Spawn the correct specialists with repo_path={{worktree_path}}.
      - Prompt/instruction changes are valid if the root cause is bad Allen
        guidance, agent prompt text, workflow node prompt, memory guidance, or
        tool-use instruction.
      - Add or update tests where feasible. For workflow repairs, validate YAML
        or engine behavior where possible. For memory/tooling/prompt repairs,
        add focused regression coverage or a clear validation artifact if
        automated coverage is not practical.

      End with JSON: files_changed, specialists_used, any_failures,
      failure_details.
    outputs:
      files_changed: "Files changed."
      specialists_used: "Specialists used."
      any_failures: "Boolean."
      failure_details: "Failure details."

  qa:
    agent: qa-lead
    resume_on_retry: true
    retries: 1
    prompt: |
      Validate the self-healing repair.

      INCIDENT: {{incident_fingerprint}}
      REPAIR AREA: {{normalized_repair_area}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      FILES CHANGED: {{files_changed}}
      WORKTREE PATH: {{worktree_path}}

      Run build, lint, unit tests, and focused integration tests where relevant
      inside {{worktree_path}}. Validate the repair against the root cause and
      regression strategy. If prompt/instruction text changed, ensure there is
      regression coverage or a clear validation artifact explaining why
      automated coverage is not practical.

      End with JSON: qa_verdict, build, lint, unit_tests, integration_tests,
      regression_tests, test_files, summary, failure_details.
    outputs:
      qa_verdict: "pass | fail | escalate"
      test_files: "Test files."
      failure_details: "Failure details."

  code_review:
    agent: code-reviewer
    resume_on_retry: true
    retries: 1
    prompt: |
      Review this Allen self-healing repair.

      WORKTREE PATH: {{worktree_path}}
      BRANCH: {{branch_name}}
      INCIDENT: {{incident_fingerprint}}
      REPAIR AREA: {{normalized_repair_area}}
      ROOT CAUSE: {{root_cause}}
      FILES CHANGED: {{files_changed}}
      QA VERDICT: {{qa_verdict}}

      Check correctness, maintainability, regression risk, security, and whether
      the fix actually addresses the monitor evidence and selected repair area.

      End with JSON: review_verdict, review_feedback, security_findings.
    outputs:
      review_verdict: "APPROVED | REQUEST_CHANGES"
      review_feedback: "Review notes."
      security_findings: "Security findings."

  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a PR for this Allen self-healing repair.

      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME: {{branch_name}}
      LINEAR: {{linear_identifier}} {{linear_url}}
      INCIDENT: {{incident_fingerprint}}
      REPAIR AREA: {{normalized_repair_area}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      FILES CHANGED: {{files_changed}}
      QA VERDICT: {{qa_verdict}}
      REVIEW: {{review_feedback}}

      Commit message prefix: fix:
      Include the Linear ticket and incident fingerprint in the PR body.

      End with JSON: pr_url, commit_hash, status, error.
    outputs:
      pr_url: "PR URL."
      commit_hash: "Commit hash."
      status: "created | reused_existing | failed"
      error: "Error."

edges:
  - { from: START, to: diagnose }
  - { from: diagnose, to: create_workspace }
  - { from: create_workspace, to: implement }
  - { from: implement, to: qa }
  - { from: qa, to: code_review }
  - { from: code_review, to: open_pr }
  - { from: open_pr, to: END }
