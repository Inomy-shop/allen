name: coding-workflow
description: >
  Universal coding-task workflow. Works on any repo (fullstack, backend,
  frontend, mobile, CLI, library, infra, data, monorepo). Agents adapt to the
  repo via the scanner-generated context.

  Flow: understand → clarify → implementation-plan → test-plan → create-branch
  → implement-backend / implement-frontend (conditional parallel) → test-writer
  → validator → requirement-validator → security-review → code-review →
  final-validation → doc-update → create-pr.

  Retry gates: validator (3), requirement-validator (3), security-review (3),
  code-review (3), final-validation (2). No partial implementations accepted.

version: 1

context:
  requires: [repo]
  tools: [filesystem, git, terminal]
  concurrency: 1

input:
  task:
    type: string
    required: true
    description: What needs to be done (feature, bugfix, refactor, docs, config, release)
  repo_path:
    type: string
    required: true
    description: Absolute path of a registered repo

nodes:
  # ─────────────────────────────────────────────────────────────────────
  # Phase 1 — Understand the task
  # ─────────────────────────────────────────────────────────────────────

  understand:
    agent: requirements-analyst
    prompt: |
      Analyze this coding task and produce structured requirements.

      TASK: {{task}}
      REPO PATH: {{repo_path}}

      Use get_repo_context to read the scanner-generated context for the repo
      (tech stack, build system, test runner, directory layout, conventions).
      Then use Glob and Read to look at the files you'll touch.

      Produce:
      1. task_type — one of: feature | bugfix | refactor | chore | docs | config | release
      2. requirements — concrete list of what the finished task must satisfy
      3. acceptance_criteria — Given/When/Then for each requirement
      4. edge_cases — empty states, boundaries, concurrency, failure modes
      5. affected_areas — files, modules, services in scope
      6. out_of_scope — what NOT to touch
      7. risks — breaking changes, migrations, security implications
      8. open_questions — things the user should clarify, or "none".

      If the engine appends a RETRY FEEDBACK block below, that means the user
      already clarified something. Treat those clarifications as authoritative
      and do NOT re-ask answered questions — set open_questions to "none" and
      let the workflow move forward.
    outputs:
      task_type: "One of: feature | bugfix | refactor | chore | docs | config | release. Classifies the kind of work for the conventional-commit prefix later."
      requirements: "Ordered list of concrete, testable things the finished task must satisfy. Each item is a short imperative sentence."
      acceptance_criteria: "List of Given/When/Then statements — one for each requirement — that a human or agent can run through to verify correctness."
      edge_cases: "List of boundary conditions worth testing: empty states, max/min values, concurrent access, permission checks, failure modes, network failures."
      affected_areas: "List of files, modules, services, or directories that are in scope for this change."
      out_of_scope: "List of things that must NOT be touched by this task, even if tempting (e.g. 'unrelated refactors', 'migrations', 'other teams' code')."
      risks: "List of risks — breaking changes, data migrations, security implications, performance regressions, upstream/downstream dependencies."
      open_questions: "Either the string 'none' if the task is clear, or a list of specific questions the user must answer before planning can start."

  clarify:
    type: human
    prompt: |
      Requirements ready. Please review before we proceed:

      Task: {{task}}
      Type: {{task_type}}
      Requirements: {{requirements}}
      Affected areas: {{affected_areas}}
      Risks: {{risks}}

      Open questions from the analyst:
      {{open_questions}}
    fields:
      - { name: answers, type: text, label: "Your answers" }
      - { name: approved, type: select, options: [proceed, revise, cancel], label: "Action", required: true }
    outputs:
      answers: "Free-text answers from the user addressing the open_questions, or empty string if approved == 'proceed'."
      approved: "One of: 'proceed' (go to planning), 'revise' (loop back to understand), 'cancel' (abort the workflow)."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 2 — Implementation plan (architecture + routing flags)
  # ─────────────────────────────────────────────────────────────────────

  implementation-plan:
    agent: engineering-lead
    prompt: |
      Produce an implementation plan for this coding task.

      TASK: {{task}}
      TASK TYPE: {{task_type}}
      REQUIREMENTS: {{requirements}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      EDGE CASES: {{edge_cases}}
      AFFECTED AREAS: {{affected_areas}}
      RISKS: {{risks}}
      {{#if answers}}CLARIFICATIONS FROM USER: {{answers}}{{/if}}

      Read the repo context via get_repo_context to understand the tech stack,
      build system, and conventions.

      Produce a complete plan as described in your system prompt: architecture,
      schema, APIs, UI, infrastructure, security approach, validation commands,
      and has_backend_changes / has_frontend_changes flags.
    outputs:
      changes: "Ordered list of file-level changes. Each item: { file: <repo-relative path>, action: 'add'|'modify'|'delete', why: <which requirement it satisfies>, depends_on?: <other file paths> }."
      architecture_decisions: "List of {decision, rationale, alternatives_considered} objects capturing key design tradeoffs (e.g. sync vs async, chosen data store, interface boundaries). Used for forensics."
      schema_changes: "Description of DB schema changes: new tables/collections, new columns/fields, indexes, migration approach, backward-compatibility notes. null if the task has no schema impact."
      api_contracts: "List of API endpoint changes: { method, path, request_shape, response_shape, auth, error_codes }. null if no API changes."
      ui_changes: "Description of UI changes: screens/components added or modified, state flows, interaction patterns, accessibility notes. null if no UI impact."
      infrastructure_changes: "Description of infra/devops changes: env vars, config files, CI/CD pipelines, deployment topology, feature flags. null if no infra changes."
      security_approach: "Security plan: auth flows, input validation strategy, secrets handling, threat model notes. null if the task has no security surface."
      validation_approach: "EXACT shell commands for build, test, lint, type-check — copy-pasteable, using the repo's own tooling (e.g. 'npm run build && npm test && npm run lint')."
      has_backend_changes: "Boolean. true if any server/API/schema/infra/config work is required. Used by the develop node to decide whether to delegate to backend-developer."
      has_frontend_changes: "Boolean. true if any UI/component/client-side work is required. Used by the develop node to decide whether to delegate to frontend-developer."
      plan_risks: "List of risks introduced by THIS specific plan (vs the general task risks from understand). Captured for forensics and PR risk disclosure."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 3 — Test plan (before implementation — TDD-adjacent)
  # ─────────────────────────────────────────────────────────────────────

  test-plan:
    agent: test-planner
    prompt: |
      Design the test plan for this task.

      TASK: {{task}}
      REQUIREMENTS: {{requirements}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      EDGE CASES: {{edge_cases}}
      IMPLEMENTATION CHANGES: {{changes}}
      VALIDATION APPROACH: {{validation_approach}}

      Read the repo to detect the test framework and existing test layout.

      Produce a test_plan with:
      1. unit_tests — functions/classes/modules to test in isolation
      2. integration_tests — flows that touch multiple components
      3. edge_cases — empty inputs, failure modes, boundary conditions
      4. regression_risks — existing behaviors that might break
      5. test_framework — jest | vitest | pytest | go test | cargo test | xctest | ...
      6. test_commands — the actual commands to run the tests
    outputs:
      test_plan: "Object with these nested keys: { unit_tests: [{name, target, assertion}], integration_tests: [{name, flow, setup}], edge_cases: [{case, expected}], regression_risks: [areas], test_framework: <jest|vitest|pytest|go test|cargo test|xctest|...>, test_commands: [<exact shell commands>] }."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 4 — Create workspace (git worktree + setup)
  # ─────────────────────────────────────────────────────────────────────

  create-branch:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
    outputs:
      worktree_path: "Absolute path to the isolated git worktree created for this execution. All implementers and validators work inside this directory."
      branch_name: "Name of the new git branch created in the worktree (e.g. 'feature/ff-abc123-add-webhook')."
      workspace_id: "Internal FlowForge workspace identifier for tracking and cleanup."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 5 — Develop (engineering-lead coordinates backend / frontend
  #                    specialists internally via delegate_to_agent)
  # ─────────────────────────────────────────────────────────────────────

  develop:
    agent: engineering-lead
    prompt: |
      Implement the plan by delegating to the right specialists. You own the
      coordination — pick backend-developer, frontend-developer, or BOTH (in
      parallel) based on the plan flags.

      WORKING DIRECTORY: {{worktree_path}}
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      CRITICAL: every delegate_to_agent call for a specialist that reads or
      writes source code MUST include context={ "repo_path": "{{worktree_path}}" }.
      This applies to backend-developer, frontend-developer, devops-engineer,
      code-reviewer, security-specialist, documentation-writer, test-writer,
      codebase-navigator. Without it, specialists run in the production deploy
      directory and corrupt the live server.
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      TASK: {{task}}
      REQUIREMENTS: {{requirements}}
      CHANGES PLAN: {{changes}}
      SCHEMA CHANGES: {{schema_changes}}
      API CONTRACTS: {{api_contracts}}
      UI CHANGES: {{ui_changes}}
      INFRASTRUCTURE CHANGES: {{infrastructure_changes}}
      SECURITY APPROACH: {{security_approach}}
      VALIDATION APPROACH: {{validation_approach}}
      RISKS: {{risks}}
      OUT OF SCOPE (do NOT touch): {{out_of_scope}}
      has_backend_changes: {{has_backend_changes}}
      has_frontend_changes: {{has_frontend_changes}}

      ROUTING RULES:
      1. If has_backend_changes is true AND has_frontend_changes is true:
         - In a single turn, call delegate_to_agent TWICE — once for
           backend-developer and once for frontend-developer — so they run
           in parallel. Then call get_delegation_result on each and wait
           for BOTH to complete.
      2. If only has_backend_changes is true:
         - delegate_to_agent("backend-developer", brief)
         - get_delegation_result until "completed"
      3. If only has_frontend_changes is true:
         - delegate_to_agent("frontend-developer", brief)
         - get_delegation_result until "completed"
      4. If neither flag is true:
         - No implementation needed. Set backend_files=[], frontend_files=[]
           and summaries to "no code changes required — task is docs/config only".

      BRIEFING EACH SPECIALIST:
      Pass them ALL of: the relevant section of the plan (schema/api for
      backend, ui for frontend), validation_approach, and risks. If the
      engine appended a RETRY FEEDBACK block at the end of this prompt,
      INCLUDE THAT BLOCK VERBATIM in every specialist brief so they know
      exactly which issues to fix. They execute the changes and report back.

      On retry, you RE-DELEGATE with the retry feedback so the specialists
      know exactly which issues to fix. Do NOT attempt to fix things yourself
      in this node — always delegate the coding work.

      When both delegations complete, consolidate their outputs into a
      single JSON block:
        backend_files: (list from backend-developer, or [])
        backend_summary: (from backend-developer, or "none")
        frontend_files: (list from frontend-developer, or [])
        frontend_summary: (from frontend-developer, or "none")
    outputs:
      backend_files: "List of file paths created or modified by backend-developer (repo-relative). Empty list if no backend work was delegated."
      backend_summary: "One-paragraph summary of the backend changes. 'none' if no backend work was delegated."
      frontend_files: "List of file paths created or modified by frontend-developer (repo-relative). Empty list if no frontend work was delegated."
      frontend_summary: "One-paragraph summary of the frontend changes. 'none' if no frontend work was delegated."
    resume_on_retry: true

  # ─────────────────────────────────────────────────────────────────────
  # Phase 6 — Write the tests (AFTER implementation)
  # ─────────────────────────────────────────────────────────────────────

  test-writer:
    agent: test-writer
    prompt: |
      Write tests in {{worktree_path}} according to the test plan.

      TEST PLAN: {{test_plan}}
      BACKEND FILES: {{backend_files}}
      FRONTEND FILES: {{frontend_files}}
      BACKEND SUMMARY: {{backend_summary}}
      FRONTEND SUMMARY: {{frontend_summary}}

      Use the repo's existing test framework. Cover every case in the plan:
      - unit_tests
      - integration_tests
      - edge_cases

      If the developers changed the implementation on retry (the backend/frontend
      file lists above will reflect the new state), add or update tests to match.
      Do NOT try to fix application code — that's the developers' job. Your only
      output is test files.

      Run the tests once. It is OK if some FAIL — the validator handles that.
      What matters is the tests exist and execute.
    outputs:
      test_files: "List of test file paths created or modified (repo-relative). Forensic record of what was written."
      test_summary: "One-paragraph description of what was tested and how (framework, levels, coverage areas)."
      tests_written: "Integer count of test cases added across all files. Used in the PR description."
    resume_on_retry: true

  # ─────────────────────────────────────────────────────────────────────
  # Phase 7 — Validator (build + tests + lint)
  # ─────────────────────────────────────────────────────────────────────

  validator:
    agent: qa-lead
    prompt: |
      Validate the changes in {{worktree_path}} using the repo's own tooling.

      VALIDATION APPROACH: {{validation_approach}}
      TEST COMMANDS: {{test_plan.test_commands}}

      Run every check, capture output, report results:
      1. Build / compile / type-check
      2. Unit tests
      3. Integration tests (if applicable)
      4. Lint (if configured)
      5. Format check (if configured)

      For each check: PASS or FAIL with the output of the command.
      Overall verdict:
        validation_passed: true  — ALL checks passed
        validation_passed: false — at least one check failed

      If failed, set failed_checks to a concise list: file:line + error.
    outputs:
      validation_passed: "Boolean. true if ALL checks (build, tests, lint, format) passed. false if ANY check failed."
      validation_results: "Object keyed by check name (build, unit, integration, lint, format) → { status: 'PASS'|'FAIL'|'SKIPPED', output: <last 200 lines> }. Forensic record of the full validator run."
      failed_checks: "List of concise failure descriptions when validation_passed is false. Each item: 'file:line — error message'. Empty list when passed."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 8 — Requirement validator (did we satisfy the spec?)
  # ─────────────────────────────────────────────────────────────────────

  requirement-validator:
    agent: acceptance-tester
    prompt: |
      Check whether the implementation actually satisfies the task requirements.

      TASK: {{task}}
      REQUIREMENTS: {{requirements}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      BACKEND FILES: {{backend_files}}
      FRONTEND FILES: {{frontend_files}}
      BACKEND SUMMARY: {{backend_summary}}
      FRONTEND SUMMARY: {{frontend_summary}}
      TEST RESULTS: {{validation_results}}

      Read the changed files in {{worktree_path}} and verify each requirement.
      For each: MET / PARTIAL / MISSING.

      Overall completeness:
        completeness: fully_complete   — ALL requirements MET
        completeness: partial          — any PARTIAL or MISSING
      If partial, produce missing_items: an actionable list (file:line where
      possible).
    outputs:
      completeness: "One of: 'fully_complete' (every requirement MET), 'partial' (at least one PARTIAL or MISSING)."
      requirement_results: "Per-requirement breakdown as { <requirement_text>: { status: 'MET'|'PARTIAL'|'MISSING', evidence: <file:line or code snippet>, notes?: <why partial/missing> } }."
      missing_items: "List of actionable items the developer still needs to address when completeness == 'partial'. Each item includes file:line when possible. Empty when fully_complete."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 9 — Security review
  # ─────────────────────────────────────────────────────────────────────

  security-review:
    agent: security-specialist
    prompt: |
      Review the diff in {{worktree_path}} on branch {{branch_name}} for
      security issues.

      TASK: {{task}}
      SECURITY APPROACH (from plan): {{security_approach}}
      BACKEND FILES: {{backend_files}}
      FRONTEND FILES: {{frontend_files}}

      Check OWASP Top 10, auth flows, input validation, secrets, dep CVEs,
      logging, error handling.

      Verdict:
        security_verdict: APPROVED          — no issues
        security_verdict: REQUEST_CHANGES   — at least one issue must be fixed

      If REQUEST_CHANGES, each finding needs: severity, location, issue,
      exploit scenario, fix.
    outputs:
      security_verdict: "One of: 'APPROVED' (no security issues), 'REQUEST_CHANGES' (at least one issue must be fixed)."
      security_feedback: "Markdown string. When REQUEST_CHANGES, list each finding as { severity: 'critical'|'high'|'medium'|'low', location: file:line, issue, exploit: <concrete scenario>, fix: <remediation> }. Empty string when APPROVED."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 10 — Code review (correctness + conventions)
  # ─────────────────────────────────────────────────────────────────────

  code-review:
    agent: code-reviewer
    prompt: |
      Review the diff in {{worktree_path}} on branch {{branch_name}} for
      correctness, conventions, performance, readability, test quality.

      TASK: {{task}}
      REQUIREMENTS: {{requirements}}
      BACKEND SUMMARY: {{backend_summary}}
      FRONTEND SUMMARY: {{frontend_summary}}

      Do NOT duplicate security review — that was already done by security-review.

      Verdict:
        review_verdict: APPROVED          — ship it
        review_verdict: REQUEST_CHANGES   — specific changes needed

      If REQUEST_CHANGES, review_feedback must be actionable:
      file:line: "what's wrong" + "how to fix".
    outputs:
      review_verdict: "One of: 'APPROVED' (ship it), 'REQUEST_CHANGES' (specific issues must be fixed)."
      review_feedback: "Markdown string. When REQUEST_CHANGES, each entry is '<file>:<line>: <what is wrong>. <how to fix>.' Empty when APPROVED. Do NOT duplicate security issues — security-review handles those."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 11 — Final validation (re-run build/tests on current state)
  # ─────────────────────────────────────────────────────────────────────

  final-validation:
    agent: qa-lead
    prompt: |
      Final validation pass. Re-run the validation commands against the
      current state of {{worktree_path}} to confirm nothing regressed after
      any retry iterations.

      VALIDATION APPROACH: {{validation_approach}}
      TEST COMMANDS: {{test_plan.test_commands}}

      Verdict:
        final_passed: true   — everything still passes end-to-end
        final_passed: false  — something regressed

      If failed, set final_failed_items to an actionable list.
    outputs:
      final_passed: "Boolean. true if the full build + test + lint suite passes on the current worktree state after all retries. false if anything regressed."
      final_failed_items: "List of actionable regressions when final_passed is false. Each item: 'check_name: file:line — error'. Empty when passed."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 12 — Update documentation
  # ─────────────────────────────────────────────────────────────────────

  doc-update:
    agent: documentation-writer
    prompt: |
      Update documentation in {{worktree_path}} to reflect the changes.

      TASK: {{task}}
      TASK TYPE: {{task_type}}
      BACKEND SUMMARY: {{backend_summary}}
      FRONTEND SUMMARY: {{frontend_summary}}
      BACKEND FILES: {{backend_files}}
      FRONTEND FILES: {{frontend_files}}

      Update whichever apply: README, CHANGELOG, API docs, inline comments,
      migration guide.

      If the task doesn't warrant doc changes, set docs_updated: false with a
      one-line reason. Otherwise docs_updated: true and list doc_files.
    outputs:
      docs_updated: "Boolean. true if any documentation was touched; false if the task did not warrant doc changes."
      doc_files: "List of doc file paths that were created or updated (README, CHANGELOG, API docs, migration guide). Empty list when docs_updated is false."

  # ─────────────────────────────────────────────────────────────────────
  # Phase 13 — Create PR
  # ─────────────────────────────────────────────────────────────────────

  create-pr:
    agent: pr-creator
    prompt: |
      Create a pull request from branch {{branch_name}} in {{worktree_path}}.

      Use a conventional-commit prefix based on task_type:
        feature  → feat:
        bugfix   → fix:
        refactor → refactor:
        chore    → chore:
        docs     → docs:
        config   → chore(config):
        release  → chore(release):

      Title: <prefix>: <concise one-line description of the change>

      Body (markdown):
      ## Summary
      {{task}}

      ## Changes
      Backend: {{backend_summary}}
      Frontend: {{frontend_summary}}

      ## Validation
      {{validation_results}}

      ## Tests
      {{test_summary}}

      ## Risks
      {{risks}}

      {{#if docs_updated}}## Documentation
      Updated: {{doc_files}}{{/if}}

      Steps:
      1. Stage all changes (git add -A)
      2. Commit with the title as the message
      3. Push the branch
      4. Create the PR via gh CLI
      5. Return the PR URL
    outputs:
      pr_url: "Full GitHub URL of the created pull request (e.g. https://github.com/org/repo/pull/123). This is the final terminal output returned to the workflow caller."
      commit_hash: "Git SHA of the commit that was pushed to the branch (full 40-char hash)."

edges:
  # Phase 1: Understand → Clarify (if questions) or straight to plan
  - { from: START, to: understand }
  - { from: understand, to: clarify, condition: "open_questions != 'none'" }
  - { from: understand, to: implementation-plan, condition: "open_questions == 'none'" }

  # Clarify routes
  - { from: clarify, to: understand, condition: "approved == 'revise'", max_retries: 2 }
  - { from: clarify, to: implementation-plan, condition: "approved == 'proceed'" }
  - { from: clarify, to: END, condition: "approved == 'cancel'" }

  # Phase 2-4: plan → test-plan → workspace
  - { from: implementation-plan, to: test-plan }
  - { from: test-plan, to: create-branch }

  # Phase 5: Develop (coordinator delegates to specialists internally)
  - { from: create-branch, to: develop }
  - { from: develop, to: test-writer }

  # Phase 6-7: test-writer → validator
  - { from: test-writer, to: validator }

  # Validator retry loop → back to develop (coordinator re-delegates with retry_context)
  - { from: validator, to: develop, condition: "NOT validation_passed", max_retries: 3, retry_context: "Validation failed. Fix these issues:\n{{failed_checks}}" }
  - { from: validator, to: requirement-validator, condition: "validation_passed" }

  # Phase 8: requirement-validator retry loop
  - { from: requirement-validator, to: develop, condition: "completeness != 'fully_complete'", max_retries: 3, retry_context: "Requirements not fully met:\n{{missing_items}}" }
  - { from: requirement-validator, to: security-review, condition: "completeness == 'fully_complete'" }

  # Phase 9: security-review retry loop
  - { from: security-review, to: develop, condition: "security_verdict == 'REQUEST_CHANGES'", max_retries: 3, retry_context: "Security feedback to address:\n{{security_feedback}}" }
  - { from: security-review, to: code-review, condition: "security_verdict == 'APPROVED'" }

  # Phase 10: code-review retry loop
  - { from: code-review, to: develop, condition: "review_verdict == 'REQUEST_CHANGES'", max_retries: 3, retry_context: "Code review feedback to address:\n{{review_feedback}}" }
  - { from: code-review, to: final-validation, condition: "review_verdict == 'APPROVED'" }

  # Phase 11: final-validation retry loop (tighter budget)
  - { from: final-validation, to: develop, condition: "NOT final_passed", max_retries: 2, retry_context: "Final validation failed:\n{{final_failed_items}}" }
  - { from: final-validation, to: doc-update, condition: "final_passed" }

  # Phase 12-13: docs → PR
  - { from: doc-update, to: create-pr }
  - { from: create-pr, to: END }
