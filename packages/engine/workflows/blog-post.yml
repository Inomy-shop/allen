name: blog-post
description: Research, write, review, and format a blog post with quality gate
version: 1

context:
  requires: []
  tools: [web-search, web-fetch]

input:
  topic: { type: string, required: true }
  audience: { type: string, default: developers }

nodes:
  research:
    role: researcher
    prompt: |
      Research this topic: {{topic}}
      Target audience: {{audience}}
      Find 3-5 key points, recent stats, and expert opinions.
    outputs: [findings, key_points, sources]
    output_format: json

  outline:
    role: planner
    prompt: |
      Create a blog post outline for: {{topic}}
      Key points: {{key_points}}
      Audience: {{audience}}
      Return sections with titles and brief descriptions.
    outputs: [outline, estimated_word_count]
    output_format: json

  write:
    role: writer
    prompt: |
      Write a blog post following this outline:
      {{outline}}

      Findings: {{findings}}
      Sources: {{sources}}
      Audience: {{audience}}

      {{#if retry_context}}REVISION NOTES: {{retry_context}}{{/if}}
    outputs: [draft, word_count]

  review:
    role: editor
    prompt: |
      Review this blog post:
      {{draft}}

      Check: accuracy, clarity, engagement, tone for {{audience}}.
      Rate quality 1-10 and verdict: PUBLISH or REVISE with specific feedback.
    outputs: [quality_score, verdict, feedback]
    output_format: json

  format:
    role: formatter
    prompt: |
      Format this blog post for publishing:
      {{draft}}
      Add: markdown headers, code blocks if needed, bold key terms, TL;DR at top.
    outputs: [final_post]

edges:
  - { from: START, to: research }
  - { from: research, to: outline }
  - { from: outline, to: write }
  - { from: write, to: review }
  - { from: review, to: format, condition: "verdict == 'PUBLISH'" }
  - { from: review, to: write, condition: "verdict == 'REVISE'", max_retries: 2, retry_context: "Score: {{quality_score}}/10. Feedback: {{feedback}}" }
  - { from: format, to: END }
