name: agent-build-with-review
description: >
  Built-in agent creation workflow. Analyses the requested agent, researching
  where needed, drafts an Allen agent blueprint, validates the draft, pauses
  for human review of the validated blueprint, and only then creates the
  agent through the internal Agent Builder executor.

version: 1

context:
  requires: []
  tools: []
  concurrency: 1

input:
  user_request:
    type: string
    required: true
    widget: textarea
    label: Agent request
    description: Natural-language request describing the agent to create, its role, target team, and expected responsibilities.
    placeholder: "e.g. Add a release-manager agent to Engineering that coordinates changelog, versioning, and release validation."
  target_team_name:
    type: string
    required: false
    widget: text
    label: Target team name or slug (optional)
    description: Existing Allen team to add the agent to, if known.
    placeholder: "e.g. engineering"
  additional_context:
    type: string
    required: false
    widget: textarea
    label: Additional context (optional)
    description: Constraints, examples, tools, models, or routing expectations the agent should follow.

nodes:
  analyse_requirements:
    agent: research-agent
    prompt: |
      Analyse the requirements for a new Allen agent. You are acting as a requirements analyst: research where needed, but do not stop at fact collection. Infer the role boundaries, operational fit, risks, and tool needs.

      USER REQUEST:
      {{user_request}}

      TARGET TEAM HINT:
      {{default target_team_name "Not provided."}}

      ADDITIONAL CONTEXT:
      {{default additional_context "Not provided."}}

      Inspect the existing Allen org before recommending a role:
      - Use list_teams and list_agents to identify the target team, existing similar agents, and likely lead agent.
      - If a target team is provided, inspect that team and its current members.
      - If a tool catalog or MCP-tool discovery surface is available in your
        context, inspect it before recommending tools. If not, mark tool
        availability assumptions explicitly.
      - Do not create or update any agent, team, workflow, or skill.

      Produce concise, structured analysis for the planner. Include:
      - resolved target team name/slug if confident
      - likely agent responsibilities and boundaries
      - a task-adaptive core job doctrine for the requested role: what the
        agent owns, how it should operate, and what good output looks like
      - instruction guidance that fits the requested task; do not force quality
        bars, checklists, examples, failure modes, or scenarios unless they
        materially improve this agent's core-job performance
      - output expectations appropriate to the role
      - validation guidance for judging whether the blueprint is too generic
      - existing agents that overlap or should be spawn targets
      - required tools/capabilities, including MCP/tool access the agent needs
        for its actual work; distinguish read-only tools from state-changing tools
        and call out least-privilege risks
      - open questions or risks

      End with valid JSON containing: target_team_name_resolved, analysis_summary,
      role_requirements, core_job_doctrine, instruction_guidance,
      output_expectations, validation_guidance, existing_overlap,
      recommended_spawn_targets, recommended_capabilities, open_questions.
    outputs:
      target_team_name_resolved: "Resolved target team name or slug, if known."
      analysis_summary: "Concise requirements analysis summary."
      role_requirements: "Role requirements for the requested agent."
      core_job_doctrine: "Role-specific operating doctrine that defines what excellent work means for this agent."
      instruction_guidance: "Task-adaptive guidance for writing the agent's system prompt without imposing a fixed checklist template."
      output_expectations: "Expected output shape, completion criteria, and quality signals appropriate to this agent's job."
      validation_guidance: "How the validator should judge whether this blueprint captures the core job instead of a generic role label."
      existing_overlap: "Existing agents with overlapping responsibilities."
      recommended_spawn_targets: "Suggested spawn targets, if any."
      recommended_capabilities: "Suggested capability strings."
      open_questions: "Open questions or risks."

  plan_blueprint:
    agent: planner-agent
    prompt: |
      Draft a concrete Allen agent blueprint from the request and requirements analysis.

      USER REQUEST:
      {{user_request}}

      TARGET TEAM HINT:
      {{default target_team_name "Not provided."}}

      ADDITIONAL CONTEXT:
      {{default additional_context "Not provided."}}

      ANALYSIS SUMMARY:
      {{analysis_summary}}

      ROLE REQUIREMENTS:
      {{role_requirements}}

      CORE JOB DOCTRINE:
      {{core_job_doctrine}}

      INSTRUCTION GUIDANCE:
      {{instruction_guidance}}

      OUTPUT EXPECTATIONS:
      {{output_expectations}}

      VALIDATION GUIDANCE:
      {{validation_guidance}}

      EXISTING OVERLAP:
      {{existing_overlap}}

      RECOMMENDED SPAWN TARGETS:
      {{recommended_spawn_targets}}

      RECOMMENDED CAPABILITIES:
      {{recommended_capabilities}}

      OPEN QUESTIONS:
      {{open_questions}}

      {{#if retry_context}}
      REVISION FEEDBACK:
      {{retry_context}}
      {{/if}}

      Inspect list_teams and list_agents as needed to avoid duplicate agents and
      invalid team or spawn-target references. Do not create or update records.

      Draft exactly one new agent blueprint. Keep it lean and consistent with
      existing Allen agent seed fields. The blueprint must be actionable by an
      executor without additional interpretation.

      Core-job excellence is mandatory:
      - The `system` prompt must teach the agent how to perform the requested
        core job, not merely name the role or describe a safe generic assistant.
      - Use a clear, task-appropriate instruction structure. Do not force every
        agent to include every possible checkpoint or heading; include only the
        parts the role actually needs.
      - The prompt must still make the core job operational: what the agent
        owns, what inputs or context it needs, how it should do the work, what
        good output looks like for this task, tool and safety boundaries when
        relevant, and when to stop or escalate.
      - Use the analysis fields as source material, but omit or mark as not
        applicable any checklist, quality bar, examples, failure modes, or
        evaluation scenarios that would add ceremony without improving the
        agent.
      - A one-line role label such as "You are a product manager", "You are a
        front-end developer", or "You are a marketing expert" is not enough;
        the prompt must capture the role's core job in concrete operating
        instructions.
      - Make the prompt self-contained enough that a thin request like
        "create a PRD reviewer agent" still yields a specialist with domain
        standards and concrete review behavior.
      - Keep the prompt focused on the role; do not pad with broad policy,
        speculative responsibilities, or unrelated tools.

      Tool selection is part of the blueprint:
      - Choose the persisted `tools` array from the work the agent must do, not
        from convenience.
      - Include only MCP/tool names the agent actually needs.
      - Verify tool names against available tool/catalog context when possible;
        if a needed tool cannot be verified, leave it out of `tools` and record
        the gap in `assumptions`.
      - Prefer read-only tools unless the agent's job explicitly requires
        mutation.
      - Put the tool-access rationale and denied/unneeded tools in `assumptions`
        or `successCriteria`; do not invent extra create_agent fields.

      Save the complete blueprint as a JSON artifact using allen_save_artifact.
      Then return valid JSON with:
      {
        "agent_blueprint_json": { ...complete blueprint... },
        "blueprint_artifact_url": "artifact URL",
        "blueprint_summary": "short human-readable summary",
        "target_team_name_resolved": "team slug/name"
      }

      The complete blueprint JSON must include: name, displayName, description,
      teamName, teamRole, type, icon, color, provider, model, reasoningEffort,
      planMode, tools, capabilities, personality, spawnTargets, system,
      leadSpawnTargetUpdate, assumptions, successCriteria.
    outputs:
      agent_blueprint_json: "Complete proposed agent blueprint JSON."
      blueprint_artifact_url: "URL of the saved blueprint artifact."
      blueprint_summary: "Short summary for human review."
      target_team_name_resolved: "Resolved target team name or slug."

  validate_blueprint:
    agent: agent-blueprint-validator
    prompt: |
      Validate this drafted Allen agent blueprint. Do not create or update any
      records. Your job is to decide whether the blueprint is safe, coherent,
      non-duplicative, and executable by the Agent Builder.

      USER REQUEST:
      {{user_request}}

      TARGET TEAM:
      {{target_team_name_resolved}}

      ANALYSIS SUMMARY:
      {{analysis_summary}}

      CORE JOB DOCTRINE:
      {{core_job_doctrine}}

      INSTRUCTION GUIDANCE:
      {{instruction_guidance}}

      OUTPUT EXPECTATIONS:
      {{output_expectations}}

      VALIDATION GUIDANCE:
      {{validation_guidance}}

      BLUEPRINT SUMMARY:
      {{blueprint_summary}}

      BLUEPRINT ARTIFACT URL:
      {{blueprint_artifact_url}}

      BLUEPRINT JSON:
      {{agent_blueprint_json}}

      Fetch/read the artifact if needed. Inspect list_teams, list_agents, and
      get_team/get_agent where useful. Validate:
      - target team exists and the team role is valid
      - agent name is a safe slug and does not duplicate an existing agent
      - responsibilities do not materially duplicate an existing agent
      - provider/model/reasoningEffort/planMode are coherent
      - tools/capabilities/spawnTargets are justified by the agent's actual
        work, existing, and least-privilege; state-changing MCP tools must have
        explicit job need and safety boundaries
      - tool names are verified against available tool/catalog context, or any
        uncertainty is called out as needs_changes
      - system prompt has clear boundaries, safety rules, and output contract
      - system prompt uses a clear task-appropriate instruction structure; do
        not require every possible checkpoint or heading when the role does not
        need it
      - system prompt captures the requested core job in concrete operating
        instructions: ownership or scope, relevant inputs, how to do the work,
        output expectations, tool and safety boundaries when relevant, and
        stop/escalation behavior when relevant
      - system prompt is not merely a role label such as "You are a product
        manager" or a generic assistant prompt with the display name swapped
      - optional aids such as checklists, quality bars, examples, failure modes,
        or scenarios are included only when they improve this specific agent;
        omission is acceptable when it does not weaken core-job performance
      - summarize concrete validation evidence for the core-job gate in
        core_job_validation_evidence
      - generic_prompt_risks are absent or explicitly mitigated; return
        needs_changes for prompts that are structurally valid but too generic
        to teach the requested core job at expert level
      - leadSpawnTargetUpdate is explicit and safe

      Save any corrected approved blueprint as a JSON artifact if you make
      minor non-semantic normalization. Do not make substantive role changes;
      return needs_changes instead.

      End with valid JSON:
      {
        "validation_decision": "approved" | "needs_changes",
        "validation_feedback": "specific feedback for the planner or executor",
        "blocking_issues": ["..."],
        "validated_blueprint_artifact_url": "artifact URL if available, otherwise original blueprint URL",
        "core_job_verdict": "pass | needs_changes, with role-specific rationale",
        "core_job_validation_evidence": "summary of why the blueprint passes or fails the task-adaptive core-job gate",
        "generic_prompt_risks": ["unmitigated generic-prompt risk", "..."],
        "validation_summary": "short summary"
      }
    outputs:
      validation_decision: "approved | needs_changes"
      validation_feedback: "Specific validator feedback."
      blocking_issues: "Blocking issues array or summary."
      validated_blueprint_artifact_url: "URL of validated blueprint artifact."
      core_job_verdict: "Pass/fail verdict on whether the blueprint teaches expert-level performance for the requested core job."
      core_job_validation_evidence: "Validator evidence for whether the blueprint captures the requested core job without imposing a fixed checklist template."
      generic_prompt_risks: "Any remaining signs that the blueprint is safe but too generic for the requested role."
      validation_summary: "Short validation summary."

  human_plan_review:
    type: human
    human:
      kind: review
      widget: approval_gate
      title: "Review validated agent blueprint"
      summary: "A validated Allen agent blueprint is ready. Review it before creation."
      question: "Should this workflow create the validated agent?"
      highlights:
        - "Target team: {{target_team_name_resolved}}"
        - "Blueprint summary: {{blueprint_summary}}"
        - "Core job verdict: {{core_job_verdict}}"
        - "Validation summary: {{validation_summary}}"
      evidence:
        - label: "Validated agent blueprint"
          url: "{{validated_blueprint_artifact_url}}"
        - label: "Core-job validation evidence"
          type: text
          value: "{{core_job_validation_evidence}}"
        - label: "Generic prompt risks"
          type: text
          value: "{{generic_prompt_risks}}"
    prompt: |
      Review the validated agent blueprint and choose:
      - **Approve** — create the agent from the validated blueprint.
      - **Request changes** — provide feedback for the planner to revise the blueprint.
      - **Reject** — stop without creating an agent.

  create_agent:
    agent: agent-builder-agent
    prompt: |
      Create the approved Allen agent from the validated blueprint.

      This node is the only approved place where Agent Builder creates agents.
      If validation_decision is not exactly "approved", stop and return an
      error without creating or updating anything.

      VALIDATION DECISION:
      {{validation_decision}}

      VALIDATION SUMMARY:
      {{validation_summary}}

      VALIDATION FEEDBACK:
      {{validation_feedback}}

      CORE JOB VERDICT:
      {{core_job_verdict}}

      CORE-JOB VALIDATION EVIDENCE:
      {{core_job_validation_evidence}}

      GENERIC PROMPT RISKS:
      {{generic_prompt_risks}}

      VALIDATED BLUEPRINT ARTIFACT URL:
      {{validated_blueprint_artifact_url}}

      ORIGINAL BLUEPRINT JSON:
      {{agent_blueprint_json}}

      Steps:
      1. Read the validated blueprint artifact if present; otherwise use the original blueprint JSON.
      2. Before creating, confirm the approved blueprint's `system` prompt still
         passes the same core-job instruction gate enforced by planning and
         validation: it is task-appropriate, concrete about the agent's core
         job, and not merely a role label or generic assistant prompt with a
         name swapped in.
      3. If validation evidence is missing, validation_decision is not approved,
         core_job_verdict is not a pass, generic_prompt_risks contains
         unmitigated risks, or the `system` prompt no longer captures the core
         job in concrete, task-appropriate instructions, stop without creating
         anything and return creation_status "failed" with a concise
         creation_summary.
      4. Call create_agent exactly once with the approved persisted blueprint fields, including the validated `tools` array. Do not pass non-create metadata such as tool rationale.
      5. If leadSpawnTargetUpdate requires adding the new agent to a team lead's spawnTargets, call update_agent exactly once for that lead.
      6. Verify the created agent with get_agent.
      7. Return valid JSON with creation_status, created_agent_name,
         created_agent_display_name, created_agent_team, creation_summary.

      Do not research, re-plan, rewrite the role, ask for confirmation, create a
      team, or modify unrelated agents. Agent Builder enforces the same
      adaptive core-job gate as planner and validator; it does not repair
      non-compliant blueprints at creation time.
    outputs:
      creation_status: "created | failed"
      created_agent_name: "Created agent slug/name."
      created_agent_display_name: "Created agent display name."
      created_agent_team: "Team the agent was added to."
      creation_summary: "Concise creation summary."

edges:
  - { from: START, to: analyse_requirements }
  - { from: analyse_requirements, to: plan_blueprint }
  - { from: plan_blueprint, to: validate_blueprint }

  - { from: validate_blueprint, to: human_plan_review, condition: "validation_decision == 'approved'" }
  - { from: validate_blueprint, to: plan_blueprint, condition: "validation_decision == 'needs_changes'", max_retries: 2, retry_context: "Blueprint validator feedback:\n{{validation_feedback}}\nBlocking issues:\n{{blocking_issues}}" }
  - { from: validate_blueprint, to: END, condition: "validation_decision == 'needs_changes' AND __retry_exhausted_from == 'validate_blueprint'" }

  - { from: human_plan_review, to: create_agent, condition: "human.human_plan_review.latest.decision == 'approve'" }
  - { from: human_plan_review, to: END, condition: "human.human_plan_review.latest.decision == 'reject'" }
  - { from: human_plan_review, to: plan_blueprint, condition: "human.human_plan_review.latest.decision == 'request_changes'", max_retries: 3, retry_context: "Human feedback on validated agent blueprint:\n{{human.human_plan_review.latest.feedback.value}}" }
  - { from: human_plan_review, to: END, condition: "human.human_plan_review.latest.decision == 'request_changes' AND __retry_exhausted_from == 'human_plan_review'" }

  - { from: create_agent, to: END }
