name: test-create-workspace
description: >
  Minimal smoke-test for the `create-workspace` built-in. No agents, no LLM
  cost — just exercises the code path that creates an isolated git worktree
  via WorkspaceManager (in-process, bypassing /api/workspaces auth).

  Pass a registered repo's name, path, or _id. The single code node creates
  a workspace on a fresh branch and returns its worktree path + base port.
  Success = execution completes and the detail page shows worktree_path /
  base_port / status=active in the final state.

version: 1

context:
  tools: []
  concurrency: 5

input:
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Target repo
    description: The registered repo to create a worktree from.
  base_branch:
    type: string
    required: false
    widget: text
    label: Base branch (optional)
    description: Branch to create the worktree from. Leave empty to use the repo's default branch.
    placeholder: main

nodes:
  make_workspace:
    type: code
    function: create-workspace
    config:
      repo_path: "{{repo_path}}"
      base_branch: "{{base_branch}}"
      branch_prefix: "smoke"
      task_summary: "create-workspace smoke test"
    outputs:
      workspace_id: "Internal FlowForge workspace identifier."
      worktree_path: "Absolute path to the isolated git worktree."
      branch_name: "New branch name."
      base_port: "Allocated base port for the workspace."
      status: "active | running | failed"

edges:
  - { from: START, to: make_workspace }
  - { from: make_workspace, to: END }
