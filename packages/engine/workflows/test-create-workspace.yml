name: test-create-workspace
description: >
  Minimal workflow to test the `create-workspace` built-in end-to-end.
  Creates a FlowForge workspace (git worktree + ports + setup scripts) for
  a registered repo and returns the resulting worktree path, base port,
  and workspace id.
version: 1

input:
  repo_name:
    type: string
    required: true
    description: Name of a registered repo (as shown on the Repos page)
  branch:
    type: string
    required: false
    description: Branch name to create. Defaults to flowforge/test-<timestamp>.
  base_branch:
    type: string
    required: false
    description: Base branch to branch from. Defaults to the repo's default branch.

nodes:
  create-ws:
    type: code
    function: create-workspace
    config:
      repo_name: "{{repo_name}}"
      branch: "{{branch}}"
      base_branch: "{{base_branch}}"
      wait_for_setup: true
      timeout_sec: 600
    outputs: [workspace_id, workspace_name, branch, worktree_path, base_port, status]

edges:
  - from: START
    to: create-ws
  - from: create-ws
    to: END
