name: data-analysis
description: Analyse data, run queries, and produce an insight report.
version: 2

context:
  requires: [repo]
  tools: [filesystem, terminal, database]

input:
  question: { type: string, required: true }
  repo_path: { type: string, required: true }

nodes:
  plan:
    agent: metrics-analyst
    prompt: |
      Plan the data analysis for this question:
      {{question}}

      1. What data do we need?
      2. Where does it live? (which DB collections, files, APIs)
      3. What queries should we run?
      4. What metrics should we compute?
    outputs: [plan, data_sources]

  query:
    agent: pipeline-engineer
    prompt: |
      Execute the data queries:
      {{plan}}
      Data sources: {{data_sources}}

      Run the queries and collect raw results.
    outputs: [raw_results, query_log]

  synthesize:
    agent: metrics-analyst
    prompt: |
      Analyse the results and answer the question:
      {{question}}

      Raw data: {{raw_results}}
      Queries run: {{query_log}}

      Produce insights with specific numbers.
    outputs: [insights, metrics]

  report:
    agent: documentation-writer
    prompt: |
      Write a data analysis report:
      Question: {{question}}
      Insights: {{insights}}
      Metrics: {{metrics}}

      Format with clear sections, tables, and recommendations.
    outputs: [report]

edges:
  - { from: START, to: plan }
  - { from: plan, to: query }
  - { from: query, to: synthesize }
  - { from: synthesize, to: report }
  - { from: report, to: END }
