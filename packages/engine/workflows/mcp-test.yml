name: mcp-test
description: |
  Test workflow to verify all MCP tools work inside workflow nodes.
  Tests FlowForge, Linear, PostgreSQL, and MongoDB MCP servers.
  Returns structured JSON results for reliable extraction.
version: 2

context:
  tools: [filesystem]
  concurrency: 1

input:
  task: { type: string, required: false, default: "Test all MCP connections" }

nodes:
  test-flowforge:
    role: coding-planner
    prompt: |
      You have MCP tools available. Test the FlowForge MCP server by doing ALL of these:
      1. Call the flowforge list_workflows tool
      2. Call the flowforge list_roles tool
      3. Call the flowforge list_repos tool
      4. Call the flowforge get_dashboard_stats tool

      Return only valid JSON. Do not include markdown, code fences, commentary, or any text before/after the JSON.

      Use this exact shape:
      {
        "flowforge_results": {
          "server": "FlowForge",
          "status": "PASS",
          "checks": [
            {
              "tool": "list_workflows",
              "ok": true,
              "summary": "2 workflows found"
            },
            {
              "tool": "list_roles",
              "ok": true,
              "summary": "4 roles found"
            },
            {
              "tool": "list_repos",
              "ok": true,
              "summary": "3 repos found"
            },
            {
              "tool": "get_dashboard_stats",
              "ok": true,
              "summary": "33 total executions"
            }
          ],
          "notes": "All core FlowForge MCP tools operational"
        }
      }

      Rules:
      - Set status to PASS if all checks succeeded, PARTIAL if some succeeded, FAIL if none succeeded.
      - summary must be a single short sentence fragment.
      - If a tool fails, set ok to false and explain the failure in summary.
    outputs: [flowforge_results]
    output_format: json
    timeout: 120

  test-linear:
    role: coding-planner
    prompt: |
      You have MCP tools available. Test the Linear MCP server by doing:
      1. Call linear_get_user to get the current user
      2. Call linear_get_teams to list teams
      3. Call linear_search_issues with first=3 to get 3 recent issues

      Return only valid JSON. Do not include markdown, code fences, commentary, or any text before/after the JSON.

      Use this exact shape:
      {
        "linear_results": {
          "server": "Linear",
          "status": "PASS",
          "checks": [
            {
              "tool": "linear_get_user",
              "ok": true,
              "summary": "User: shreemant@inomy.shop"
            },
            {
              "tool": "linear_get_teams",
              "ok": true,
              "summary": "4 teams found"
            },
            {
              "tool": "linear_search_issues",
              "ok": true,
              "summary": "3 issues retrieved"
            }
          ],
          "notes": "Linear MCP tools operational"
        }
      }

      Rules:
      - Set status to PASS if all checks succeeded, PARTIAL if some succeeded, FAIL if none succeeded.
      - summary must be a single short sentence fragment.
      - If a tool fails, set ok to false and explain the failure in summary.
    outputs: [linear_results]
    output_format: json
    timeout: 120

  test-postgres:
    role: coding-planner
    prompt: |
      You have MCP tools available. Test the PostgreSQL MCP server by doing:
      1. Run: SELECT count(*) FROM product
      2. Run: SELECT table_name FROM information_schema.tables WHERE table_schema='public' LIMIT 5
      3. Run: SELECT count(*) FROM enriched_product

      Return only valid JSON. Do not include markdown, code fences, commentary, or any text before/after the JSON.

      Use this exact shape:
      {
        "postgres_results": {
          "server": "PostgreSQL",
          "status": "PASS",
          "checks": [
            {
              "query": "SELECT count(*) FROM product",
              "ok": true,
              "summary": "646890 rows"
            },
            {
              "query": "SELECT table_name ... LIMIT 5",
              "ok": true,
              "summary": "5 table names returned"
            },
            {
              "query": "SELECT count(*) FROM enriched_product",
              "ok": true,
              "summary": "12345 rows"
            }
          ],
          "notes": "PostgreSQL MCP queries operational"
        }
      }

      Rules:
      - Set status to PASS if all checks succeeded, PARTIAL if some succeeded, FAIL if none succeeded.
      - summary must be a single short sentence fragment with the real result.
      - If a query fails, set ok to false and explain the failure in summary.
    outputs: [postgres_results]
    output_format: json
    timeout: 120

  test-mongodb:
    role: coding-planner
    prompt: |
      You have MCP tools available. Test the MongoDB MCP server by doing:
      1. List all collections in the database
      2. Query the scraped_data collection with limit=1 and summarize the returned document keys
      3. Count documents in the job_status collection

      Return only valid JSON. Do not include markdown, code fences, commentary, or any text before/after the JSON.

      Use this exact shape:
      {
        "mongodb_results": {
          "server": "MongoDB",
          "status": "PASS",
          "checks": [
            {
              "operation": "listCollections",
              "ok": true,
              "summary": "95 collections found"
            },
            {
              "operation": "query scraped_data limit=1",
              "ok": true,
              "summary": "Document keys: _id, name, ..."
            },
            {
              "operation": "count job_status",
              "ok": true,
              "summary": "42 documents"
            }
          ],
          "notes": "MongoDB MCP operations operational"
        }
      }

      Rules:
      - Set status to PASS if all checks succeeded, PARTIAL if some succeeded, FAIL if none succeeded.
      - summary must be a single short sentence fragment with the real result.
      - If an operation fails, set ok to false and explain the failure in summary.
    outputs: [mongodb_results]
    output_format: json
    timeout: 120

  summary:
    role: coding-planner
    prompt: |
      Summarize the MCP test results from all 4 providers:

      FlowForge: {{flowforge_results}}
      Linear: {{linear_results}}
      PostgreSQL: {{postgres_results}}
      MongoDB: {{mongodb_results}}

      Return only valid JSON. Do not include markdown, code fences, commentary, or any text before/after the JSON.

      Use this exact shape:
      {
        "final_report": {
          "overall_verdict": "ALL PASS",
          "servers": [
            { "server": "FlowForge", "status": "PASS", "tools_tested": 4, "notes": "..." },
            { "server": "Linear", "status": "PASS", "tools_tested": 3, "notes": "..." },
            { "server": "PostgreSQL", "status": "PASS", "tools_tested": 3, "notes": "..." },
            { "server": "MongoDB", "status": "PASS", "tools_tested": 3, "notes": "..." }
          ],
          "summary_text": "All 4 MCP providers are operational."
        }
      }

      Rules:
      - overall_verdict: ALL PASS if every server is PASS, PARTIAL if mixed, FAIL if all fail.
      - Derive everything from the provided inputs. Do not invent results.
    outputs: [final_report]
    output_format: json
    timeout: 60

edges:
  - { from: START, to: [test-flowforge, test-linear, test-postgres, test-mongodb], parallel: true, join: wait-all }
  - { from: [test-flowforge, test-linear, test-postgres, test-mongodb], to: summary }
  - { from: summary, to: END }
