name: source-prd-to-ui-designs-variations
description: |
  Simplified PRD → UX exploration workflow. Reads a PRD and the source/product
  repo READ-ONLY, generates 5 materially different UX options with stable
  internal option ids and CREATIVE per-option route trees, copies only global
  CSS + Tailwind foundations into a ui-designs worktree, builds source-INSPIRED
  prototype components and routes (no source component copying, no single
  generic dynamic [optionSlug] renderer), ensures every option's creative
  primary route is reachable from /repos/{prd_slug} and from the ui-designs
  top-level home/catalog, verifies the result, and opens a PR.

  v9 (this revision) makes the route layer creative:
    - Internal option identity (option_id = option-01..option-05) stays
      stable for repair feedback, but concrete routes are NO LONGER
      forced to /repos/{prd_slug}/options/option-XX. Each option picks
      its own concept-driven primary_route (e.g. /repos/{prd_slug}/
      decision-studio or /repos/{prd_slug}/room-first-explorer) and
      its own route_tree.
    - build_prototypes_and_routes now uses `frontend-developer`. It
      MUST implement static, concrete per-option route folders. A
      single generic dynamic [optionSlug] renderer or one shared
      layout that flattens all options is a verifier blocker.
    - final_design_verifier checks option-id count (5), reachability,
      no dynamic-route-collapse, route_tree fits each option's
      concept — NOT URL/folder slug shape.
    - PR body lists option_id → creative primary_route and tells the
      reviewer to open /repos/{prd_slug} and click into each route.

  v8 invariants preserved:
    - Source repo is READ-ONLY; all writes go to the ui-designs worktree.
    - Foundations may be COPIED; source components must be INSPIRED, not copied.
    - 5 canonical option IDs by default. Concrete routes are creative.
    - Routes are linked from /repos/{prd_slug} AND the ui-designs home/catalog.
    - Verifier loops back to build only (max 2 retries) → human gate.
version: 15
context:
  requires:
    - repo
  tools:
    - filesystem
    - git
    - terminal
  concurrency: 2
input:
  requirement_or_prd:
    type: string
    required: true
    widget: textarea
    label: Requirement / PRD
    description: PRD body or single-paragraph requirement describing the UX work to explore.
  source_repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Source repo (READ-ONLY evidence)
    description: >-
      Absolute path of the source/product repo. Used as READ-ONLY evidence for foundations and source-inspired
      components. Never mutated by this workflow.
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: ui-designs repo (write target)
    description: >-
      Absolute path of the registered ui-designs repo. A git worktree is cut from this repo and all design output is
      written inside it.
  prd_slug:
    type: string
    required: true
    widget: text
    label: PRD / design slug
    description: Short slug used to organize folders inside the ui-designs worktree. Lowercase, hyphen-separated.
  variation_count:
    type: number
    required: false
    default: 5
    widget: number
    label: Variation count (default and max 5)
    description: How many UX options to generate. Hard-capped at 5.
  trusted_mode:
    type: boolean
    required: false
    default: false
    widget: checkbox
    label: Trusted mode (auto-accept warn-level verifier)
    description: >-
      When true, verifier warn-level findings are auto-accepted without human review. Blocking failures still go through
      the human recovery gate after retries.
  chat_session_id:
    type: string
    required: false
    widget: text
    description: Originating chat session ID (auto-populated from chat).
  started_by_user_id:
    type: string
    required: false
    widget: text
    description: User ID who started the run (for Slack DM routing of interventions).
nodes:
  research_and_options:
    type: agent
    agent: prd-ux-translator
    agentOverrides:
      reasoningEffort: high
    prompt: |
      You are the SINGLE research-and-options step for a PRD → ui-designs
      exploration. This step replaces the legacy understand_prd +
      archaeologize_source + plan_divergence + generate_variations chain,
      so be thorough but DO NOT produce heavyweight archaeology reports.

      📋 PRD / REQUIREMENT:
      {{requirement_or_prd}}

      PRD SLUG:           {{prd_slug}}
      SOURCE REPO (READ-ONLY): {{source_repo_path}}
      UI-DESIGNS REPO:    {{repo_path}}
      VARIATION COUNT:    {{default variation_count 5}} (hard cap 5)

      TASKS — do all in this single run:
        1. Read the PRD. Identify primary user jobs, target surface(s),
           entry points, key states (loading / empty / error / success),
           accessibility / responsive requirements, and design acceptance
           criteria. Mark inferred items.

        2. Lightly inspect {{source_repo_path}} READ-ONLY:
             - Global CSS + Tailwind config locations (paths only).
             - Token / theme / design-foundation file paths.
             - Relevant existing components, routes, and patterns that
               relate to the PRD surface. Cite file paths and 1-line
               descriptions. Do NOT dump full files.
             - Concrete patterns the prototype builder should be
               "source-inspired" by (NOT copy verbatim).
           Keep this section short. No broad archaeology.

        3. Generate EXACTLY {{default variation_count 5}} materially
           different UX options. Each option has:
             - option_id: stable internal id `option-01` … `option-05`
               (used by repair feedback). Do NOT use this as a URL slug.
             - concept_name: human display label
               (e.g. "Decision Studio", "Room-First Explorer").
             - concept_slug: short kebab-case slug derived from
               concept_name (e.g. `decision-studio`,
               `room-first-explorer`). Will appear in URLs / folder names.
             - primary_route: the option's main route on ui-designs,
               using the concept_slug — e.g.
               `/repos/{{prd_slug}}/decision-studio`,
               `/repos/{{prd_slug}}/room-first-explorer`. Routes are
               CREATIVE, concept-driven, static. Do NOT default every
               option to `/repos/{{prd_slug}}/options/option-XX`.
             - route_tree: full list of subroutes the option needs
               (e.g. `/repos/{{prd_slug}}/decision-studio/compare`,
               `/.../decision-studio/checkout`). Each option may have a
               DIFFERENT route tree shape — that's the point.
             - route_differentiation_rationale: 1–3 sentences
               explaining why this route/tree shape supports the
               option's unique UX (e.g. "Decision Studio uses a
               three-pane compare/inspect/checkout layout, hence the
               /compare and /inspect children, instead of a wizard
               flow.").
             - one-paragraph thesis (what makes this option different)
             - target user job(s)
             - components needed (mark each as `inspired_by:<source
               path>` or `new` — NEVER `copy_of`)
             - foundation tokens it relies on (cite source paths)
             - source_file_references: explicit list of source files /
               patterns the prototype builder should consult as
               INSPIRATION for this option (paths + 1-line rationale)
             - interaction notes (primary CTAs, transitions, modals)
             - responsive + a11y notes
           Options must differ materially (IA, layout, interaction
           model, or task flow) — not cosmetic variants. Concept slugs
           must be distinct.

        4. Produce a compact route plan covering every option and an
           updated home/options index expectation. The PRD INDEX page
           at `/repos/{{prd_slug}}` (and the ui-designs top-level
           home/catalog) MUST link every option's `primary_route`. This
           PRD index URL stays the same — only the per-option routes
           are creative.

      Save TWO artifacts:
        - `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/ux-brief.md",
          <markdown>, content_type="markdown", overwrite=true)` —
          PRD synthesis, source-evidence notes, options index. Copy the
          publicUrl into the JSON below as `ux_brief_artifact_url`.
        - `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/options-plan.json",
          <json string>, content_type="json", overwrite=true)` — the
          structured option/route/component/source-references plan.
          Copy publicUrl as `options_plan_artifact_url`. The JSON MUST
          contain the full `options` array with the fields above.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "research_verdict": "pass | escalate",
        "ux_brief_artifact_url": "<publicUrl>",
        "options_plan_artifact_url": "<publicUrl>",
        "option_slugs": ["option-01","option-02","option-03","option-04","option-05"],
        "generated_option_count": 5,
        "options": [
          {
            "option_id": "option-01",
            "concept_name": "Decision Studio",
            "concept_slug": "decision-studio",
            "primary_route": "/repos/{{prd_slug}}/decision-studio",
            "route_tree": ["/repos/{{prd_slug}}/decision-studio", "/repos/{{prd_slug}}/decision-studio/compare"],
            "route_differentiation_rationale": "Three-pane compare/inspect/checkout layout, hence dedicated /compare child route."
          }
        ],
        "route_plan": [
          {
            "option_id": "option-01",
            "concept_slug": "decision-studio",
            "primary_route": "/repos/{{prd_slug}}/decision-studio",
            "route_tree": ["/repos/{{prd_slug}}/decision-studio", "/repos/{{prd_slug}}/decision-studio/compare"]
          }
        ],
        "source_references": [
          {"option_id":"option-01","paths":["..."],"rationale":"..."}
        ],
        "home_index_route": "/repos/{{prd_slug}}",
        "research_failure_details": "(empty unless verdict=escalate)"
      }
      ```

      Use `escalate` ONLY when the PRD is unparseable, the source repo
      is unreadable, or a hard precondition is missing. Otherwise emit
      `pass`.
    outputs:
      research_verdict: pass | escalate
      ux_brief_artifact_url: Public URL of the UX brief markdown artifact.
      options_plan_artifact_url: Public URL of the structured options plan JSON artifact.
      option_slugs: Canonical INTERNAL option ids (option-01..option-05). Used by repair feedback. NOT used as URL segments.
      generated_option_count: Number of options produced (target 5).
      options: >-
        Array of full option records (option_id, concept_name, concept_slug, primary_route, route_tree,
        route_differentiation_rationale, ...).
      route_plan: Per-option route plan with option_id, concept_slug, primary_route, and route_tree.
      source_references: Per-option list of source file paths to reference as inspiration.
      home_index_route: PRD index route that must link every option's primary_route. Stays /repos/{prd_slug}.
      research_failure_details: Reason when verdict=escalate.
  create_workspace:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
      timeout_sec: 600
    outputs:
      workspace_id: Internal Allen workspace identifier.
      worktree_path: Absolute isolated git worktree path inside ui-designs.
      branch: Generated branch name.
      branch_name: Alias of branch.
      base_branch: Branch the worktree was cut from.
      status: Workspace setup status.
      repo_path: Alias of worktree_path.
  copy_foundations:
    type: agent
    agent: design-system-syncer
    agentOverrides:
      model: sonnet
      reasoningEffort: low
    prompt: |
      FOUNDATION-ONLY COPY. This step is intentionally tiny. Do NOT do a
      broad design-system sync. Do NOT copy source components. Do NOT
      generate snippet-reference docs.

      SOURCE REPO (READ-ONLY): {{source_repo_path}}
      UI-DESIGNS WORKTREE:     {{worktree_path}}
      PRD SLUG:                {{prd_slug}}
      OPTIONS PLAN:            {{options_plan_artifact_url}}
      UX BRIEF:                {{ux_brief_artifact_url}}

      DO (only):
        1. From {{source_repo_path}} READ-ONLY, copy the following
           foundation files into the worktree under
           `prototypes/{{prd_slug}}/_foundations/` (preserve relative
           file names where useful):
             - Global CSS file(s) (e.g. app/globals.css, styles/*.css
               at the source root, or the equivalent global stylesheet
               the source uses).
             - Tailwind config file(s) (tailwind.config.{js,ts,cjs,mjs},
               postcss.config.*).
             - Any theme/design-token JSON or CSS files referenced by
               the Tailwind config that ARE foundations
               (colors, spacing, typography, radii, shadows, tokens).
           If the source has NO Tailwind / no global CSS, note that and
           skip — do not fabricate files.

        2. Produce a tiny `prototypes/{{prd_slug}}/_foundations/REFERENCE.md`
           that lists exactly:
             - Foundation files now present in the worktree (paths).
             - For each option in the options plan, the list of SOURCE
               FILE PATHS the frontend developer should consult as
               visual/structural INSPIRATION (NOT to copy). Index this
               by option_id (option-01..option-05) AND show the option's
               concept_slug + primary_route alongside, so the builder
               can reach them by either identifier.
             - A line stating: "No source component files have been
               copied. Components must be newly authored, source-inspired."

        3. Save the same REFERENCE.md as an artifact:
           `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/foundations-reference.md",
           <markdown>, content_type="markdown", overwrite=true)` and
           copy the publicUrl into `foundations_reference_artifact_url`.

      HARD CONSTRAINTS:
        - Do NOT copy files from source `components/`, `app/(routes)`,
          `pages/`, `src/components/`, hooks, providers, stores, or
          data-fetch wrappers. ONLY global CSS, Tailwind config, and
          token foundation files.
        - Do NOT touch {{source_repo_path}}. All writes go to
          {{worktree_path}}.
        - Keep the diff small. No prototype components in this step.

      End with a fenced JSON block:
      ```json
      {
        "copy_foundations_verdict": "pass | warn | escalate",
        "foundations_reference_artifact_url": "<publicUrl>",
        "copied_foundation_files": ["<repo-relative path>"],
        "copied_component_file_count": 0,
        "warnings": [],
        "failure_details": "(empty unless escalate)"
      }
      ```
    outputs:
      copy_foundations_verdict: pass | warn | escalate
      foundations_reference_artifact_url: Public URL of the foundations reference markdown.
      copied_foundation_files: Paths (worktree-relative) of foundation files copied.
      copied_component_file_count: Must remain 0.
      warnings: Soft warnings (e.g. missing tailwind theme).
      failure_details: Reason when verdict=escalate.
  build_prototypes_and_routes:
    type: agent
    agent: frontend-developer
    agentOverrides:
      model: sonnet
      reasoningEffort: high
    prompt: |
      You are implementing a UX EXPLORATION prototype set inside the
      ui-designs worktree. This is design exploration, NOT pixel-perfect
      parity with the source. Components must be NEWLY AUTHORED,
      source-INSPIRED. Do NOT copy source component files. Do NOT use
      scripts to mirror source components.

      WORKTREE PATH (write target — your cwd for every file/build/lint
      command):                {{worktree_path}}
      BRANCH:                  {{branch_name}}
      PRD SLUG:                {{prd_slug}}
      SOURCE REPO (READ-ONLY): {{source_repo_path}}
      OPTIONS PLAN:            {{options_plan_artifact_url}}
      UX BRIEF:                {{ux_brief_artifact_url}}
      FOUNDATIONS REF:         {{foundations_reference_artifact_url}}
      OPTIONS:                 {{options}}
      ROUTE PLAN:              {{route_plan}}
      HOME INDEX ROUTE:        {{home_index_route}}
      SOURCE REFERENCES:       {{source_references}}

      WHAT TO DO:
        1. Read the OPTIONS PLAN artifact to get every option's
           `option_id`, `concept_slug`, `primary_route`, and
           `route_tree`. For each option, implement STATIC, CONCRETE
           per-option route folders matching its `primary_route` and
           every entry in its `route_tree`. Example for
           concept_slug `decision-studio`:
             - app/repos/{{prd_slug}}/decision-studio/page.tsx
             - app/repos/{{prd_slug}}/decision-studio/compare/page.tsx
             - app/repos/{{prd_slug}}/decision-studio/inspect/page.tsx
           Use the worktree's existing app-router convention. Each
           option's folder + component structure may differ — that is
           the point of UX exploration.

        2. DO NOT collapse options into a single generic dynamic
           `[optionSlug]` route or one shared layout that re-uses the
           same body for every option. A generic dynamic renderer that
           makes all options structurally identical is a verifier
           blocker. Each option must have its own static route folder
           tree and its own composition.

        3. Components must be NEWLY AUTHORED inside the worktree,
           visually + structurally INSPIRED by the source files listed
           in `source_references` and the foundations under
           `prototypes/{{prd_slug}}/_foundations/`. Reuse foundation
           tokens (CSS variables, Tailwind theme tokens). Avoid raw
           hex/px on prototype/option-owned surfaces.

        4. Update / create a discoverable PRD INDEX and top-level home:
             - Update `app/repos/{{prd_slug}}/page.tsx` (or the
               worktree's equivalent) so it lists EVERY option with a
               link to its `primary_route`. Show `concept_name` as the
               display label and `option_id` as a small caption — but
               link to the CREATIVE primary_route, NOT to
               `/options/option-XX`.
             - Also link the {{prd_slug}} index from the ui-designs
               top-level home / catalog page (e.g. `app/page.tsx` or
               the existing prototypes/PRDs index). If a global index
               exists, APPEND the new {{prd_slug}} entry; if it does
               not, add a small entry under the existing home pattern.
               Do NOT clobber unrelated entries / PRDs / sections.

        5. Wire primary CTAs, transitions, tabs, modals, and form
           controls per the UX brief — prototypes must FEEL clickable,
           not be static mockups. Implement loading / empty / error /
           success states where the brief calls for them.

        6. Save the routes manifest:
           `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/routes-manifest.md",
           <markdown>, content_type="markdown", overwrite=true)`. The
           manifest table MUST have one row per option with columns:
           option_id | concept_slug | primary_route | route_tree |
           differentiation rationale. Copy publicUrl into
           `routes_manifest_artifact_url`.

        7. Save the interaction map JSON:
           `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/interaction-map.json",
           <json>, content_type="json", overwrite=true)`. Index
           interactions by `option_id` so repair feedback can address
           them precisely. The routes manifest's Interaction Map
           section must mirror this JSON. Copy publicUrl into
           `interaction_map_artifact_url`.

      HARD RULES:
        - NEVER touch {{source_repo_path}}. All writes go inside
          {{worktree_path}}.
        - NO source component file copies (verbatim mirroring is a
          blocker). Components must be newly written.
        - NO source imports from {{source_repo_path}}.
        - Components used by an option must consume foundations from
          `prototypes/{{prd_slug}}/_foundations/` or the worktree's
          existing token system.
        - PRESERVE option identity. `option_id` (option-01..option-05),
          `concept_slug`, and `primary_route` from the options plan
          must remain identical across runs and repair passes. Do NOT
          rename routes or folders to `/options/option-XX`.
        - Build + lint + type-check inside the worktree before
          reporting. Fix anything you broke. Do NOT silently leave a
          red build.

      REPAIR MODE: if the workflow engine injects retry context from a
      prior verifier failure, treat it as repair feedback. Only fix
      what the verifier flagged. DO NOT regenerate options, rename
      routes, or change concept_slugs. DO NOT collapse options into a
      shared dynamic renderer. Keep option_id → primary_route bindings
      stable.

      End with a fenced JSON block:
      ```json
      {
        "prototype_build_verdict": "pass | partial | escalate",
        "routes_manifest_artifact_url": "<publicUrl>",
        "interaction_map_artifact_url": "<publicUrl>",
        "routes": [
          {
            "option_id": "option-01",
            "concept_slug": "decision-studio",
            "primary_route": "/repos/{{prd_slug}}/decision-studio",
            "route_tree": ["/repos/{{prd_slug}}/decision-studio","/repos/{{prd_slug}}/decision-studio/compare"]
          }
        ],
        "home_index_updated": true,
        "wired_interaction_count": 0,
        "source_imports_used": 0,
        "copied_component_file_count": 0,
        "uses_generic_dynamic_route": false
      }
      ```
    outputs:
      prototype_build_verdict: pass | partial | escalate
      routes_manifest_artifact_url: Public URL of routes manifest markdown.
      interaction_map_artifact_url: Public URL of interaction map JSON.
      routes: Per-option list of {option_id, concept_slug, primary_route, route_tree}.
      home_index_updated: True if /repos/{prd_slug} index and top-level home both link every option's primary_route.
      wired_interaction_count: Wired interactive elements.
      source_imports_used: Must remain 0.
      copied_component_file_count: Must remain 0.
      uses_generic_dynamic_route: Must remain false. True means options were collapsed into a single dynamic renderer.
  final_design_verifier:
    type: agent
    agent: design-critic
    agentOverrides:
      reasoningEffort: high
    prompt: |
      You are the FINAL design verifier for a UX exploration build.
      This is exploration, NOT pixel-perfect parity. URLs and folder
      names are EXPECTED to be creative (per-option concept slugs).
      Do NOT fail because routes are not `/repos/{{prd_slug}}/options/
      option-XX`. Internal option identity is option_id
      (option-01..option-05); URLs are creative.

      INPUTS:
        PRD SLUG:               {{prd_slug}}
        SOURCE REPO (READ-ONLY): {{source_repo_path}}
        WORKTREE PATH:          {{worktree_path}}
        OPTIONS PLAN:           {{options_plan_artifact_url}}
        UX BRIEF:               {{ux_brief_artifact_url}}
        FOUNDATIONS REF:        {{foundations_reference_artifact_url}}
        ROUTES MANIFEST:        {{routes_manifest_artifact_url}}
        INTERACTION MAP:        {{interaction_map_artifact_url}}
        OPTIONS:                {{options}}
        ROUTE PLAN:             {{route_plan}}
        BUILD ROUTES:           {{routes}}
        HOME INDEX ROUTE:       {{home_index_route}}
        USES GENERIC DYNAMIC ROUTE: {{default uses_generic_dynamic_route false}}

      RANK-BLOCKER DIMENSIONS (any one → fail):
        1. SOURCE REPO UNTOUCHED — no writes/diffs in
           {{source_repo_path}}.
        2. OPTION COUNT BY option_id — exactly {{default variation_count 5}}
           options with distinct option_ids `option-01`..`option-05`
           (or up to {{default variation_count 5}} stable ids). Each
           option_id appears once in the options plan and once in the
           build routes output. Concrete URLs may be anything creative.
        3. REACHABILITY — every option's `primary_route` MUST be linked
           from both the PRD index page at `/repos/{{prd_slug}}` AND
           the ui-designs top-level home/catalog page. Missing,
           duplicated, or unreachable primary_route → fail.
        4. NO GENERIC DYNAMIC-ROUTE COLLAPSE — if the build collapses
           all options into a single dynamic `[optionSlug]` renderer or
           one shared layout that produces the same body for every
           option (i.e. concepts are not actually realised in
           different route folders / components), → fail. Check
           `uses_generic_dynamic_route == false` and verify the
           worktree filesystem has distinct, static per-option route
           folders.
        5. ROUTES EXIST + RENDER + ARE DISTINCT — every entry in each
           option's `route_tree` exists as a real route file in the
           worktree and renders. Two options sharing the same
           primary_route is a fail. Pages that 404, throw, or return an
           empty shell → fail.
        6. ROUTE TREE FITS CONCEPT — each option's route_tree shape
           supports the unique UX intended by its
           `route_differentiation_rationale`. If three options claim
           "compare", "wizard", and "single-pane" UX but all collapse
           to a single root page with no subroutes, → fail. Use the
           options plan's rationale as ground truth; if a route_tree
           is trivially identical across options whose concepts
           require different shapes, fail with details.
        7. SOURCE-INSPIRED, NOT COPIED — no verbatim source component
           files in the worktree, no imports from {{source_repo_path}},
           components are newly authored with source-inspired patterns.
           `copied_component_file_count == 0`,
           `source_imports_used == 0`.
        8. FOUNDATIONS USED — prototype components consume foundation
           tokens (CSS variables / Tailwind theme) instead of raw
           hex/px on prototype-owned surfaces. Unrelated base app shell
           scaffolding the workflow did NOT modify is out of scope.
        9. USABLE / POLISHED ENOUGH — prototypes are interactive and
           production-like; no ASCII-art placeholders, no mock-only
           wireframes, no obviously-broken layouts. Loading / empty /
           error states present where the brief calls for them.

      EXPLICITLY NOT BLOCKERS:
        - Routes / folders NOT being `/options/option-XX`. Creative
          concept-driven URLs are required, not blocked.
        - Different route_tree shapes across options. That is the
          desired outcome.
        - Pixel-perfect parity with source.
        - Missing snippet-reference docs.

      Save the verdict report:
        `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/design-verdict.md",
        <markdown>, content_type="markdown", overwrite=true)`

      Include a section per rank-blocker dimension and a final summary
      recommending PR or repair. Include an "Option Identity Map"
      section showing option_id → concept_slug → primary_route →
      route_tree, so reviewers and the repair loop can verify identity
      stability.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "design_verdict": "pass | warn | fail | escalate",
        "design_verdict_report_artifact_url": "<publicUrl>",
        "design_failure_details": "short string when warn/fail/escalate (empty on pass)",
        "blocker_summary": {
          "source_repo_untouched": true,
          "option_count_correct": true,
          "reachable_from_home_and_prd_index": true,
          "no_dynamic_route_collapse": true,
          "routes_exist_render_distinct": true,
          "route_tree_fits_concept": true,
          "source_inspired_not_copied": true,
          "foundations_used": true,
          "polished_enough": true
        }
      }
      ```

      Verdict rules:
        - pass     → no blocking findings.
        - warn     → only soft findings (small polish gaps, copy nits).
                    Workflow may auto-continue to PR.
        - fail     → at least one rank-blocker. Workflow loops back
                     to build_prototypes_and_routes (max 2 retries).
        - escalate → reserved for cases where build cannot fix without
                     redoing research/foundation copy. Triggers human
                     recovery gate.
    outputs:
      design_verdict: pass | warn | fail | escalate
      design_verdict_report_artifact_url: Public URL of the verdict report.
      design_failure_details: Short summary when warn/fail/escalate.
      blocker_summary: Per-dimension boolean map of verifier outcomes.
  verifier_recovery_review:
    type: human
    human:
      kind: recover
      widget: escalation_gate
      title: Recover design verifier failure
      summary: final_design_verifier exhausted its 2 repair attempts or escalated. Decide how to recover.
      question: Retry build with feedback, override and continue to PR, or abandon the run.
      highlights:
        - 'PRD slug: {{prd_slug}}'
        - 'Worktree path: {{default worktree_path "—"}}'
        - 'Branch: {{default branch "—"}}'
        - 'Verdict: {{default design_verdict "—"}}'
        - 'Failure details: {{default design_failure_details "—"}}'
      evidence:
        - label: Verifier report
          url: '{{default design_verdict_report_artifact_url ""}}'
        - label: Routes manifest
          url: '{{default routes_manifest_artifact_url ""}}'
        - label: Interaction map
          url: '{{default interaction_map_artifact_url ""}}'
        - label: UX brief
          url: '{{default ux_brief_artifact_url ""}}'
        - label: Options plan
          url: '{{default options_plan_artifact_url ""}}'
        - label: Foundations reference
          url: '{{default foundations_reference_artifact_url ""}}'
    prompt: |
      🔴 final_design_verifier could not be repaired automatically.

      PRD slug:           {{prd_slug}}
      Worktree path:      {{default worktree_path "—"}}
      Branch:             {{default branch "—"}}
      Verdict:            {{default design_verdict "—"}}
      Failure details:    {{default design_failure_details "—"}}

      📄 Artifacts:
        UX BRIEF:                {{default ux_brief_artifact_url "(not produced)"}}
        OPTIONS PLAN:            {{default options_plan_artifact_url "(not produced)"}}
        FOUNDATIONS REFERENCE:   {{default foundations_reference_artifact_url "(not produced)"}}
        ROUTES MANIFEST:         {{default routes_manifest_artifact_url "(not produced)"}}
        INTERACTION MAP JSON:    {{default interaction_map_artifact_url "(not produced)"}}
        VERIFIER REPORT:         {{default design_verdict_report_artifact_url "(not produced)"}}

      Decision:
        retry_with_feedback   → loop back to build_prototypes_and_routes
                                with your feedback as repair context.
        override_and_continue → bypass the verifier and open PR.
        abandon               → end the run; artifacts preserved.
    outputs:
      decision: retry_with_feedback | override_and_continue | abandon
      feedback: Free-form feedback string forwarded to the build step.
  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a pull request on the ui-designs repo containing the
      foundation copy, generated UX options, prototype components,
      creative per-option routes, and PRD-index update for this PRD.

      WORKFLOW TYPE: design-exploration
      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME:   {{branch_name}}

      📋 REQUIREMENT / PRD:
      {{requirement_or_prd}}

      PRD SLUG:           {{prd_slug}}
      SOURCE REPO:        {{source_repo_path}} (READ-ONLY — never committed here)
      OPTION SLUGS:       {{option_slugs}}
      OPTIONS:            {{options}}
      ROUTES:             {{routes}}
      HOME INDEX ROUTE:   {{home_index_route}}

      📄 ARTIFACTS (link in PR body):
        UX BRIEF:                {{ux_brief_artifact_url}}
        OPTIONS PLAN:            {{options_plan_artifact_url}}
        FOUNDATIONS REFERENCE:   {{foundations_reference_artifact_url}}
        ROUTES MANIFEST:         {{routes_manifest_artifact_url}}
        INTERACTION MAP JSON:    {{interaction_map_artifact_url}}
        DESIGN VERDICT REPORT:   {{design_verdict_report_artifact_url}}

      PR title: feat({{prd_slug}}): UX exploration — {{generated_option_count}} options
      PR body MUST include:
        - Summary of the PRD/requirement.
        - A table of generated options with one row per option_id, in
          this exact column order:
            | option_id | concept_name | concept_slug | primary_route |
          Use the `options` / `routes` outputs above. Each
          `primary_route` is the creative route on ui-designs.
        - Foundation-only sync note: foundations copied, NO source
          component files copied, components newly authored
          source-inspired.
        - Verifier verdict + short summary.
        - Links to every artifact above.
        - "How to view" section: `cd` into the worktree, run
          `npm run dev`, open the PRD index at `{{home_index_route}}`,
          then click into each option's `primary_route` listed above.
          Do NOT instruct reviewers to visit `/options/option-XX` URLs.

      Stage, commit, push, and `gh pr create`. NEVER touch
      {{source_repo_path}}.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "pr_url": "<created or reused PR URL, or null on failure>"
      }
      ```
    outputs:
      pr_url: The created (or reused) PR URL on ui-designs, or null on failure.
edges:
  - from: START
    to: research_and_options
  - from: research_and_options
    to: create_workspace
    condition: research_verdict == 'pass'
  - from: research_and_options
    to: verifier_recovery_review
    condition: research_verdict == 'escalate'
  - from: create_workspace
    to: copy_foundations
  - from: copy_foundations
    to: build_prototypes_and_routes
    condition: copy_foundations_verdict == 'pass' OR copy_foundations_verdict == 'warn'
  - from: copy_foundations
    to: verifier_recovery_review
    condition: copy_foundations_verdict == 'escalate'
  - from: build_prototypes_and_routes
    to: final_design_verifier
  - from: final_design_verifier
    to: open_pr
    condition: design_verdict == 'pass' OR design_verdict == 'warn'
  - from: final_design_verifier
    to: build_prototypes_and_routes
    condition: design_verdict == 'fail'
    max_retries: 2
    retry_context: |
      final_design_verifier failed. Repair scope:
      {{design_failure_details}}

      Verifier report: {{design_verdict_report_artifact_url}}
      Routes manifest: {{routes_manifest_artifact_url}}
      Interaction map: {{interaction_map_artifact_url}}
      Options plan (KEEP STABLE):    {{options_plan_artifact_url}}
      Option ids (KEEP STABLE):      {{option_slugs}}
      Concept slugs and primary routes per option MUST stay identical
      to the options plan. Only fix verifier findings. Do NOT
      regenerate options. Do NOT re-copy foundations. Do NOT rename
      routes. Do NOT collapse into a generic dynamic renderer.
  - from: final_design_verifier
    to: verifier_recovery_review
    condition: design_verdict == 'fail' AND __retry_exhausted_from == 'final_design_verifier'
  - from: verifier_recovery_review
    to: build_prototypes_and_routes
    condition: human.verifier_recovery_review.latest.decision == 'retry_with_feedback'
    retry_context: |
      Human feedback on verifier failure:
      {{human.verifier_recovery_review.latest.feedback.value}}
      Preserve option_id → concept_slug → primary_route bindings from
      the options plan. Do NOT rename routes to /options/option-XX.
  - from: verifier_recovery_review
    to: open_pr
    condition: human.verifier_recovery_review.latest.decision == 'override_and_continue'
  - from: verifier_recovery_review
    to: END
    condition: human.verifier_recovery_review.latest.decision == 'abandon'
  - from: open_pr
    to: END
