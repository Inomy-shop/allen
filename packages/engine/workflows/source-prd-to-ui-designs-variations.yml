name: source-prd-to-ui-designs-variations
description: |
  Simplified PRD → UX exploration workflow. Reads a PRD and the source/product
  repo READ-ONLY, generates up to 5 materially different UX options with stable
  internal option ids and CREATIVE per-option route trees, copies only global
  CSS + Tailwind foundations into a ui-designs worktree, builds source-INSPIRED
  prototype components and routes (no source component copying, no single
  generic dynamic [optionSlug] renderer), ensures every option's creative
  primary route is reachable from /repos/{prd_slug} and from the ui-designs
  top-level home/catalog, verifies the result, and opens a PR.

  v10 (this revision) hardens source-grounded full design generation:
    - research_and_options now classifies the design scope
      (`component_redesign` | `full_page_design` | `flow_design` |
      `app_surface_design` | `unknown`) and emits an upfront
      `layout_shell_contract` (navbar, sidebar, header, page container,
      tabs/filters, drawers/modals, responsive shell behaviour) plus a
      `component_fidelity_contract` (exact_locked / adapted_shell /
      varied_target / proposed_new children with source paths and
      replica strategy). Saved as a `fidelity-contract.json` artifact.
    - build_prototypes_and_routes MUST realise locked child replicas
      and shell primitives BEFORE any option page, consume the shared
      locked replicas from every option (no inline reimplementation),
      copy foundation tokens (CSS variables / Tailwind tokens) into
      every prototype-owned surface (no raw hex/rgb/rgba/shadow), and
      emit a `fidelity-manifest.json` artifact upfront.
    - final_design_verifier now also fails on:
        * absent / drifted exact_locked children,
        * full-page design missing required navbar/sidebar/header/page
          shell,
        * foundation-token drift on prototype-owned surfaces (with
          actionable repair instructions),
      while preserving the creative per-option route system.

  v9 invariants preserved:
    - Internal option identity (option_id = option-01..option-05) stays
      stable for repair feedback.
    - Concrete routes are CREATIVE concept-driven per option.
    - Static per-option route folders; no single generic dynamic
      [optionSlug] renderer.
    - Source repo is READ-ONLY; all writes go to the ui-designs
      worktree.
    - Foundations may be COPIED; source components must be INSPIRED,
      not copied (allowed: tiny exact local replicas/snippets when
      explicitly classified as exact_locked).
    - Routes are linked from /repos/{prd_slug} AND the ui-designs
      top-level home/catalog.
    - Verifier loops back to build only (max 2 retries) → human gate.
version: 16
context:
  requires:
    - repo
  tools:
    - filesystem
    - git
    - terminal
  concurrency: 2
input:
  requirement_or_prd:
    type: string
    required: true
    widget: textarea
    label: Requirement / PRD
    description: PRD body or single-paragraph requirement describing the UX work to explore.
  source_repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Source repo (READ-ONLY evidence)
    description: >-
      Absolute path of the source/product repo. Used as READ-ONLY evidence for foundations and source-inspired
      components. Never mutated by this workflow.
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: ui-designs repo (write target)
    description: >-
      Absolute path of the registered ui-designs repo. A git worktree is cut from this repo and all design output is
      written inside it.
  prd_slug:
    type: string
    required: true
    widget: text
    label: PRD / design slug
    description: Short slug used to organize folders inside the ui-designs worktree. Lowercase, hyphen-separated.
  variation_count:
    type: number
    required: false
    default: 5
    widget: number
    label: Variation count (default and max 5)
    description: How many UX options to generate. Hard-capped at 5.
  trusted_mode:
    type: boolean
    required: false
    default: false
    widget: checkbox
    label: Trusted mode (auto-accept warn-level verifier)
    description: >-
      When true, verifier warn-level findings are auto-accepted without human review. Blocking failures still go through
      the human recovery gate after retries.
  chat_session_id:
    type: string
    required: false
    widget: text
    description: Originating chat session ID (auto-populated from chat).
  started_by_user_id:
    type: string
    required: false
    widget: text
    description: User ID who started the run (for Slack DM routing of interventions).
  output_mode:
    type: string
    required: false
    default: spec_only
    label: Output mode
    description: "spec_only produces UX options/specs only (no prototype routes required). prototype produces full prototype routes. Default: spec_only."
  design_session_id:
    type: string
    required: false
    label: Design Session ID
    description: Originating design session ID from the Design tab (auto-populated from design tab runs).
  design_repo_path:
    type: string
    required: false
    label: Design repo path
    description: Absolute path of the design/prototyping repo (alternative to repo_path for design-tab dispatch).
nodes:
  research_and_options:
    type: agent
    agent: prd-ux-translator
    agentOverrides:
      reasoningEffort: high
    prompt: |
      You are the SINGLE research-and-options step for a PRD → ui-designs
      exploration. This step replaces the legacy understand_prd +
      archaeologize_source + plan_divergence + generate_variations chain,
      so be thorough but DO NOT produce heavyweight archaeology reports.

      📋 PRD / REQUIREMENT:
      {{requirement_or_prd}}

      PRD SLUG:           {{prd_slug}}
      SOURCE REPO (READ-ONLY): {{source_repo_path}}
      UI-DESIGNS REPO:    {{repo_path}}
      VARIATION COUNT:    {{default variation_count 5}} (hard cap 5)

      TASKS — do all in this single run:
        1. Read the PRD. Identify primary user jobs, target surface(s),
           entry points, key states (loading / empty / error / success),
           accessibility / responsive requirements, and design acceptance
           criteria. Mark inferred items.

        2. CLASSIFY `design_scope_type` from PRD intent + source evidence:
             - `component_redesign`   → PRD asks to redesign one or more
               existing components (e.g. "redesign the product card"),
               leaving the surrounding page/app chrome unchanged.
             - `full_page_design`     → PRD asks to design a full page
               (e.g. "design the Designs tab"). Page chrome (navbar,
               sidebar, header, page container, tabs/filters) MUST be
               recreated from source patterns before content variants.
             - `flow_design`          → PRD asks for a multi-step flow
               spanning several routes (wizard / checkout / onboarding).
             - `app_surface_design`   → PRD asks to redesign or propose a
               whole product surface / app shell.
             - `unknown`              → emit only if the PRD is genuinely
               ambiguous AND the source has no signal. Treat as
               `escalate` if you cannot resolve it.

        3. Lightly inspect {{source_repo_path}} READ-ONLY:
             - Global CSS + Tailwind config locations (paths only).
             - Token / theme / design-foundation file paths.
             - Existing layout / chrome primitives that wrap the target
               surface: navbar, sidebar, header, page container,
               tabs/filters, drawers/modals, responsive shell behaviour.
               Cite the source paths and 1-line role of each.
             - Existing child components that live INSIDE the target
               surface (price bars, badges, score widgets, selectors,
               shortlist/heart/checkbox affordances, card footers, CTAs,
               title/retailer/price/rating basics, etc.). Cite paths.
             - Patterns the prototype builder should be "source-inspired"
               by (NOT copy verbatim) for varied target components.
           Keep this section short. No broad archaeology.

        4. Emit `layout_shell_contract` — the shell primitives that MUST
           exist BEFORE any content variation is built. One entry per
           primitive:
             - `name`            — e.g. "navbar", "sidebar",
                                   "page-header", "page-container",
                                   "filter-tabs", "filter-drawer",
                                   "modal-shell".
             - `role`            — what it does.
             - `source_path`     — source file(s) being mirrored.
             - `classification`  — `exact_locked` (recreate identically
                                   in the worktree as a shared shell
                                   primitive) or `adapted_shell`
                                   (recreate the structure but option
                                   may restyle it).
             - `responsive_behaviour` — required breakpoint behaviour
                                   (e.g. "sidebar collapses < md").
             - `required_for_scopes` — list of scope types that REQUIRE
                                   this primitive (e.g.
                                   `["full_page_design",
                                   "app_surface_design"]`).
             - `replica_strategy` — how the builder should realise it
                                   (e.g. "create
                                   `prototypes/{{prd_slug}}/shared/
                                   shell/Navbar.tsx` consumed by every
                                   option's layout").
           For `component_redesign` and pure flow_design without new
           page chrome, this list may be small or empty — but you MUST
           still emit the field (empty array allowed) and explain why.

        5. Emit `component_fidelity_contract` — locked vs varied children
           inside the target surface. One entry per child component /
           snippet:
             - `name`            — short identifier
               (e.g. "iscore-badge", "price-range-bar-compact",
               "shortlist-heart", "card-footer-actions",
               "buy-cta-left-pane", "title-block",
               "retailer-row", "rating-row", "selector-checkbox").
             - `role`            — what it does in the surface.
             - `source_path`     — source file(s).
             - `fidelity_class`  — one of:
                 - `exact_locked`   — must be replicated identically:
                   same DOM shape, same classes, same labels, same
                   conditional rendering, same sizing/colors via
                   tokens. Required local replica file under
                   `prototypes/{{prd_slug}}/shared/_local/`.
                 - `adapted_shell` — shell structure preserved, option
                   may restyle within tokens.
                 - `varied_target` — the PRD experiment lives here;
                   options may diverge structurally.
                 - `proposed_new`  — net-new component proposed by the
                   PRD; no source.
             - `replica_strategy` — required filename and consumption
                                   rule (e.g. "Generate
                                   `shared/_local/IScoreBadgeReplica.tsx`
                                   from source InomyScoreCircleBadge.tsx;
                                   every option imports it.").
             - `must_not_drift_from` — bullet list of source attributes
                                   that MUST remain identical
                                   (labels, classes, sizing, color
                                   tokens, conditional shape).
           DEFAULT FIDELITY RULE — for `component_redesign` scopes,
           common product-card children (price range bar / price bar,
           Inomy/iScore badge, selector / checkbox / shortlist
           affordances, title / retailer / price / rating / action
           basics, footer actions) are `exact_locked` UNLESS the PRD
           explicitly says to vary them. The PRD's varied target is the
           OUTER card composition, not the locked children.

        6. Generate EXACTLY {{default variation_count 5}} materially
           different UX options. Each option has:
             - option_id: stable internal id `option-01` … `option-05`
               (used by repair feedback). Do NOT use this as a URL slug.
             - concept_name: human display label.
             - concept_slug: short kebab-case slug derived from
               concept_name. Will appear in URLs / folder names.
             - primary_route: the option's main route on ui-designs,
               using the concept_slug — e.g.
               `/repos/{{prd_slug}}/decision-studio`. Routes are
               CREATIVE, concept-driven, static. Do NOT default every
               option to `/repos/{{prd_slug}}/options/option-XX`.
             - route_tree: full list of subroutes the option needs.
               Each option may have a DIFFERENT shape.
             - route_differentiation_rationale: 1–3 sentences.
             - one-paragraph thesis.
             - target user job(s).
             - components needed (mark each as `inspired_by:<source
               path>`, `locked_from:<source path>` (for exact_locked
               children), or `new` — NEVER `copy_of`).
             - foundation tokens it relies on (cite source paths).
             - source_file_references: explicit list of source files /
               patterns the prototype builder should consult as
               INSPIRATION for this option (paths + 1-line rationale).
             - interaction notes (primary CTAs, transitions, modals).
             - responsive + a11y notes.
           Options must differ materially (IA, layout, interaction
           model, or task flow) — not cosmetic variants. Concept slugs
           must be distinct. Locked children/shell primitives are
           shared across options; only the varied_target / proposed_new
           areas may diverge.

        7. Produce a compact route plan covering every option and an
           updated home/options index expectation. The PRD INDEX page
           at `/repos/{{prd_slug}}` (and the ui-designs top-level
           home/catalog) MUST link every option's `primary_route`.

      Save THREE artifacts:
        - `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/ux-brief.md",
          <markdown>, content_type="markdown", overwrite=true)` —
          PRD synthesis, source-evidence notes, options index. Copy the
          publicUrl into the JSON below as `ux_brief_artifact_url`.
        - `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/options-plan.json",
          <json string>, content_type="json", overwrite=true)` — the
          structured option/route/component/source-references plan.
          Copy publicUrl as `options_plan_artifact_url`.
        - `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/fidelity-contract.json",
          <json string>, content_type="json", overwrite=true)` — the
          structured `design_scope_type`, `layout_shell_contract`, and
          `component_fidelity_contract`. Copy publicUrl as
          `fidelity_contract_artifact_url`.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "research_verdict": "pass | escalate",
        "design_scope_type": "component_redesign | full_page_design | flow_design | app_surface_design | unknown",
        "ux_brief_artifact_url": "<publicUrl>",
        "options_plan_artifact_url": "<publicUrl>",
        "fidelity_contract_artifact_url": "<publicUrl>",
        "option_slugs": ["option-01","option-02","option-03","option-04","option-05"],
        "generated_option_count": 5,
        "options": [
          {
            "option_id": "option-01",
            "concept_name": "Decision Studio",
            "concept_slug": "decision-studio",
            "primary_route": "/repos/{{prd_slug}}/decision-studio",
            "route_tree": ["/repos/{{prd_slug}}/decision-studio", "/repos/{{prd_slug}}/decision-studio/compare"],
            "route_differentiation_rationale": "Three-pane compare/inspect/checkout layout, hence dedicated /compare child route."
          }
        ],
        "route_plan": [
          {
            "option_id": "option-01",
            "concept_slug": "decision-studio",
            "primary_route": "/repos/{{prd_slug}}/decision-studio",
            "route_tree": ["/repos/{{prd_slug}}/decision-studio", "/repos/{{prd_slug}}/decision-studio/compare"]
          }
        ],
        "layout_shell_contract": [
          {"name":"navbar","role":"top-level app navigation","source_path":"...","classification":"exact_locked","responsive_behaviour":"...","required_for_scopes":["full_page_design","app_surface_design"],"replica_strategy":"..."}
        ],
        "component_fidelity_contract": [
          {"name":"iscore-badge","role":"...","source_path":"...","fidelity_class":"exact_locked","replica_strategy":"...","must_not_drift_from":["..."]}
        ],
        "source_references": [
          {"option_id":"option-01","paths":["..."],"rationale":"..."}
        ],
        "home_index_route": "/repos/{{prd_slug}}",
        "research_failure_details": "(empty unless verdict=escalate)"
      }
      ```

      Use `escalate` ONLY when the PRD is unparseable, the source repo
      is unreadable, the design scope is irreducibly `unknown`, or a
      hard precondition is missing. Otherwise emit `pass`.
    outputs:
      research_verdict: pass | escalate
      design_scope_type: component_redesign | full_page_design | flow_design | app_surface_design | unknown
      ux_brief_artifact_url: Public URL of the UX brief markdown artifact.
      options_plan_artifact_url: Public URL of the structured options plan JSON artifact.
      fidelity_contract_artifact_url: Public URL of the fidelity contract JSON (shell + component contracts).
      option_slugs: Canonical INTERNAL option ids (option-01..option-05). Used by repair feedback. NOT used as URL segments.
      generated_option_count: Number of options produced (target 5).
      options: >-
        Array of full option records (option_id, concept_name, concept_slug, primary_route, route_tree,
        route_differentiation_rationale, ...).
      route_plan: Per-option route plan with option_id, concept_slug, primary_route, and route_tree.
      layout_shell_contract: Array of required shell primitives with classification and replica strategy.
      component_fidelity_contract: Array of child components with fidelity_class and replica strategy.
      source_references: Per-option list of source file paths to reference as inspiration.
      home_index_route: PRD index route that must link every option's primary_route. Stays /repos/{prd_slug}.
      research_failure_details: Reason when verdict=escalate.
  create_workspace:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
      timeout_sec: 600
    outputs:
      workspace_id: Internal Allen workspace identifier.
      worktree_path: Absolute isolated git worktree path inside ui-designs.
      branch: Generated branch name.
      branch_name: Alias of branch.
      base_branch: Branch the worktree was cut from.
      status: Workspace setup status.
      repo_path: Alias of worktree_path.
  copy_foundations:
    type: agent
    agent: design-system-syncer
    agentOverrides:
      model: sonnet
      reasoningEffort: low
    prompt: |
      FOUNDATION-ONLY COPY. This step is intentionally tiny. Do NOT do a
      broad design-system sync. Do NOT copy source components. Do NOT
      generate snippet-reference docs.

      SOURCE REPO (READ-ONLY): {{source_repo_path}}
      UI-DESIGNS WORKTREE:     {{worktree_path}}
      PRD SLUG:                {{prd_slug}}
      OPTIONS PLAN:            {{options_plan_artifact_url}}
      UX BRIEF:                {{ux_brief_artifact_url}}
      FIDELITY CONTRACT:       {{fidelity_contract_artifact_url}}

      DO (only):
        1. From {{source_repo_path}} READ-ONLY, copy the following
           foundation files into the worktree under
           `prototypes/{{prd_slug}}/_foundations/`:
             - Global CSS file(s).
             - Tailwind config file(s).
             - Any theme/design-token JSON or CSS files referenced by
               the Tailwind config that ARE foundations.
           If the source has NO Tailwind / no global CSS, note that and
           skip — do not fabricate files.

        2. Produce a tiny `prototypes/{{prd_slug}}/_foundations/REFERENCE.md`
           that lists exactly:
             - Foundation files now present in the worktree (paths).
             - For each option in the options plan, the list of SOURCE
               FILE PATHS the frontend developer should consult as
               visual/structural INSPIRATION (NOT to copy), indexed by
               option_id, concept_slug, and primary_route.
             - The full token names available (colors, spacing,
               typography, radii, shadows) — the builder will use these
               instead of raw hex/rgb/rgba/shadow on prototype-owned
               surfaces.
             - A line stating: "No source component files have been
               copied. Components must be newly authored, source-inspired
               — except tiny exact local replicas/snippets classified
               as exact_locked in the fidelity contract."

        3. Save the same REFERENCE.md as an artifact:
           `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/foundations-reference.md",
           <markdown>, content_type="markdown", overwrite=true)` and
           copy the publicUrl into `foundations_reference_artifact_url`.

      HARD CONSTRAINTS:
        - Do NOT copy files from source `components/`, `app/(routes)`,
          `pages/`, `src/components/`, hooks, providers, stores, or
          data-fetch wrappers. ONLY global CSS, Tailwind config, and
          token foundation files.
        - Do NOT touch {{source_repo_path}}. All writes go to
          {{worktree_path}}.
        - Keep the diff small. No prototype components in this step.

      End with a fenced JSON block:
      ```json
      {
        "copy_foundations_verdict": "pass | warn | escalate",
        "foundations_reference_artifact_url": "<publicUrl>",
        "copied_foundation_files": ["<repo-relative path>"],
        "copied_component_file_count": 0,
        "warnings": [],
        "failure_details": "(empty unless escalate)"
      }
      ```
    outputs:
      copy_foundations_verdict: pass | warn | escalate
      foundations_reference_artifact_url: Public URL of the foundations reference markdown.
      copied_foundation_files: Paths (worktree-relative) of foundation files copied.
      copied_component_file_count: Must remain 0.
      warnings: Soft warnings (e.g. missing tailwind theme).
      failure_details: Reason when verdict=escalate.
  build_prototypes_and_routes:
    if: "{{ output_mode != 'spec_only' or output_mode is not defined }}"
    type: agent
    agent: frontend-developer
    agentOverrides:
      model: sonnet
      reasoningEffort: high
    prompt: |
      You are implementing a UX EXPLORATION prototype set inside the
      ui-designs worktree. This is design exploration: target
      components are varied, but locked children and shell primitives
      defined by the fidelity contract MUST be source-faithful and
      shared across options.

      WORKTREE PATH (write target — your cwd for every file/build/lint
      command):                {{worktree_path}}
      BRANCH:                  {{branch_name}}
      PRD SLUG:                {{prd_slug}}
      DESIGN SCOPE TYPE:       {{design_scope_type}}
      SOURCE REPO (READ-ONLY): {{source_repo_path}}
      OPTIONS PLAN:            {{options_plan_artifact_url}}
      UX BRIEF:                {{ux_brief_artifact_url}}
      FOUNDATIONS REF:         {{foundations_reference_artifact_url}}
      FIDELITY CONTRACT:       {{fidelity_contract_artifact_url}}
      LAYOUT SHELL CONTRACT:   {{layout_shell_contract}}
      COMPONENT FIDELITY CONTRACT: {{component_fidelity_contract}}
      OPTIONS:                 {{options}}
      ROUTE PLAN:              {{route_plan}}
      HOME INDEX ROUTE:        {{home_index_route}}
      SOURCE REFERENCES:       {{source_references}}

      ORDER OF WORK — DO NOT SKIP STEPS:
        STEP 1 — Read `fidelity_contract_artifact_url` end-to-end. You
        must know every shell primitive and every child component's
        `fidelity_class` BEFORE you write any option page.

        STEP 2 — Build shell primitives (when DESIGN SCOPE TYPE is
        `full_page_design` or `app_surface_design`, OR
        `layout_shell_contract` is non-empty):
          - For every shell primitive with `classification ==
            exact_locked`, create a shared replica under
            `prototypes/{{prd_slug}}/shared/shell/<Name>.tsx`
            (e.g. `Navbar.tsx`, `Sidebar.tsx`, `PageHeader.tsx`,
            `PageContainer.tsx`, `FilterTabs.tsx`,
            `FilterDrawer.tsx`, `ModalShell.tsx`).
          - Mirror DOM/structure, classes, labels, sizing, and
            responsive behaviour from the cited source path. Consume
            foundation tokens; never embed raw hex/rgb/rgba.
          - Every option's `app/repos/{{prd_slug}}/<concept-slug>/
            layout.tsx` (or page composition) MUST wrap content in
            these shared shell primitives. Do NOT re-implement shell
            inline per option.

        STEP 3 — Build locked child replicas: for every entry in
        `component_fidelity_contract` with `fidelity_class ==
        exact_locked`, create a shared replica under
        `prototypes/{{prd_slug}}/shared/_local/<Name>Replica.tsx`. The
        replica MUST:
          - Match source DOM shape (element types, conditional
            rendering branches).
          - Match source class strings exactly for the documented
            base/state classes.
          - Match source labels (`label`, `dotColor`,
            `dotColorHex`, button text) character-for-character.
          - Match source sizing constants (e.g. `dotSize = 12`,
            `h-9 px-3`) — do not silently substitute.
          - Use the same foundation tokens as source; never embed
            raw hex/rgb/rgba/shadow unless the source uses that exact
            literal value (in which case keep it as a documented
            named prototype-token variable in
            `prototypes/{{prd_slug}}/_foundations/`).
        Every option that needs a locked child MUST import the shared
        replica — DO NOT reimplement it inline per option.

        STEP 4 — Emit the fidelity manifest BEFORE option pages:
          `mcp__allen__allen_save_artifact(
            "ux/{{prd_slug}}/fidelity-manifest.json",
            <json string>, content_type="json", overwrite=true)`
          The manifest MUST list, for every contract entry:
            - name, fidelity_class, source_path
            - replica_path in the worktree (or null for
              adapted/varied/proposed)
            - source_attributes_locked (labels, classes, sizing,
              conditional shape items copied verbatim from source)
            - per-option `consumers`: which option components import
              the replica.
          Copy publicUrl into `fidelity_manifest_artifact_url`.

        STEP 5 — For each option in the OPTIONS PLAN, implement
        STATIC, CONCRETE per-option route folders matching its
        `primary_route` and every entry in its `route_tree`. Each
        option's page composition consumes:
          - the shared shell primitives from STEP 2 (when scope
            requires them), and
          - the shared locked-child replicas from STEP 3,
        and only writes the varied_target / proposed_new surfaces
        inline. NEVER inline a reimplementation of a locked child.

        STEP 6 — DO NOT collapse options into a single generic dynamic
        `[optionSlug]` route or one shared layout that re-uses the
        same body for every option.

        STEP 7 — Update / create a discoverable PRD INDEX and
        top-level home (no regression of the existing creative-route
        system):
          - Update `app/repos/{{prd_slug}}/page.tsx` so it lists EVERY
            option with a link to its `primary_route`, showing
            `concept_name` and `option_id`.
          - Append a `{{prd_slug}}` entry to the top-level
            home/catalog — do NOT clobber unrelated entries.

        STEP 8 — Wire primary CTAs, transitions, tabs, modals, and
        form controls per the UX brief. Implement loading / empty /
        error / success states.

        STEP 9 — Save routes manifest + interaction map:
          - `mcp__allen__allen_save_artifact(
              "ux/{{prd_slug}}/routes-manifest.md",
              <markdown>, content_type="markdown", overwrite=true)`
            with one row per option: option_id | concept_slug |
            primary_route | route_tree | differentiation rationale.
            Copy publicUrl into `routes_manifest_artifact_url`.
          - `mcp__allen__allen_save_artifact(
              "ux/{{prd_slug}}/interaction-map.json",
              <json>, content_type="json", overwrite=true)`. Index
            interactions by `option_id`. The routes manifest's
            Interaction Map section must mirror this JSON. Copy
            publicUrl into `interaction_map_artifact_url`.

      HARD RULES:
        - NEVER touch {{source_repo_path}}. All writes go inside
          {{worktree_path}}.
        - NO source component file copies (verbatim mirroring of full
          source component files is a blocker). Exception: small
          locked-child replicas built per STEP 3 may match source
          DOM/classes/labels exactly. They are authored inside the
          worktree, not file-copied.
        - NO source imports from {{source_repo_path}}.
        - Prototype-owned surfaces (everything under `prototypes/` and
          every option page under `app/repos/{{prd_slug}}/`) MUST
          consume foundation tokens (CSS variables / Tailwind theme).
          Raw hex / rgb() / rgba() / `boxShadow: '0 ... rgba(...)'` /
          raw HSL on prototype-owned surfaces is a blocker. The only
          allowed raw values are documented named prototype-token
          variables (e.g. `--shadow-guide-card`) declared in
          `prototypes/{{prd_slug}}/_foundations/` AND/OR exact source
          literals reproduced character-for-character on locked
          children that source itself encodes that way.
        - Locked children are imported, not reimplemented per option.
        - PRESERVE option identity. `option_id`, `concept_slug`, and
          `primary_route` from the options plan must remain identical
          across runs and repair passes. Do NOT rename routes or
          folders to `/options/option-XX`. Do NOT regress the creative
          per-option route system.
        - Build + lint + type-check inside the worktree before
          reporting. Fix anything you broke.

      REPAIR MODE: if the workflow engine injects retry context from a
      prior verifier failure, treat it as repair feedback. Only fix
      what the verifier flagged. DO NOT regenerate options, rename
      routes, or change concept_slugs. DO NOT collapse options into a
      shared dynamic renderer. Keep option_id → primary_route
      bindings stable. RE-EMIT the fidelity manifest reflecting any
      replica fixes.

      End with a fenced JSON block:
      ```json
      {
        "prototype_build_verdict": "pass | partial | escalate",
        "routes_manifest_artifact_url": "<publicUrl>",
        "interaction_map_artifact_url": "<publicUrl>",
        "fidelity_manifest_artifact_url": "<publicUrl>",
        "shell_primitives_built": ["<replica path>"],
        "locked_child_replicas_built": ["<replica path>"],
        "locked_children_inline_in_options": 0,
        "routes": [
          {
            "option_id": "option-01",
            "concept_slug": "decision-studio",
            "primary_route": "/repos/{{prd_slug}}/decision-studio",
            "route_tree": ["/repos/{{prd_slug}}/decision-studio","/repos/{{prd_slug}}/decision-studio/compare"]
          }
        ],
        "home_index_updated": true,
        "wired_interaction_count": 0,
        "source_imports_used": 0,
        "copied_component_file_count": 0,
        "uses_generic_dynamic_route": false
      }
      ```
    outputs:
      prototype_build_verdict: pass | partial | escalate
      routes_manifest_artifact_url: Public URL of routes manifest markdown.
      interaction_map_artifact_url: Public URL of interaction map JSON.
      fidelity_manifest_artifact_url: Public URL of fidelity manifest JSON emitted by the builder.
      shell_primitives_built: Repo-relative paths of the shared shell primitives created in step 2.
      locked_child_replicas_built: Repo-relative paths of the shared locked-child replicas created in step 3.
      locked_children_inline_in_options: Must be 0. Greater than 0 means options reimplemented locked children inline instead of importing the shared replica.
      routes: Per-option list of {option_id, concept_slug, primary_route, route_tree}.
      home_index_updated: True if /repos/{prd_slug} index and top-level home both link every option's primary_route.
      wired_interaction_count: Wired interactive elements.
      source_imports_used: Must remain 0.
      copied_component_file_count: Must remain 0.
      uses_generic_dynamic_route: Must remain false. True means options were collapsed into a single dynamic renderer.
  final_design_verifier:
    if: "{{ output_mode != 'spec_only' or output_mode is not defined }}"
    type: agent
    agent: design-critic
    agentOverrides:
      reasoningEffort: high
    prompt: |
      You are the FINAL design verifier for a UX exploration build.
      This is exploration, NOT pixel-perfect parity for the varied
      target. URLs and folder names are EXPECTED to be creative
      (per-option concept slugs). Do NOT fail because routes are not
      `/repos/{{prd_slug}}/options/option-XX`. Internal option
      identity is option_id (option-01..option-05); URLs are creative.

      INPUTS:
        PRD SLUG:                {{prd_slug}}
        DESIGN SCOPE TYPE:       {{design_scope_type}}
        SOURCE REPO (READ-ONLY): {{source_repo_path}}
        WORKTREE PATH:           {{worktree_path}}
        OPTIONS PLAN:            {{options_plan_artifact_url}}
        UX BRIEF:                {{ux_brief_artifact_url}}
        FOUNDATIONS REF:         {{foundations_reference_artifact_url}}
        FIDELITY CONTRACT:       {{fidelity_contract_artifact_url}}
        FIDELITY MANIFEST:       {{fidelity_manifest_artifact_url}}
        LAYOUT SHELL CONTRACT:   {{layout_shell_contract}}
        COMPONENT FIDELITY CONTRACT: {{component_fidelity_contract}}
        SHELL PRIMITIVES BUILT:  {{shell_primitives_built}}
        LOCKED CHILDREN BUILT:   {{locked_child_replicas_built}}
        LOCKED-CHILDREN INLINE COUNT: {{default locked_children_inline_in_options 0}}
        ROUTES MANIFEST:         {{routes_manifest_artifact_url}}
        INTERACTION MAP:         {{interaction_map_artifact_url}}
        OPTIONS:                 {{options}}
        ROUTE PLAN:              {{route_plan}}
        BUILD ROUTES:            {{routes}}
        HOME INDEX ROUTE:        {{home_index_route}}
        USES GENERIC DYNAMIC ROUTE: {{default uses_generic_dynamic_route false}}

      RANK-BLOCKER DIMENSIONS (any one → fail):
        1. SOURCE REPO UNTOUCHED — no writes/diffs in
           {{source_repo_path}}.
        2. OPTION COUNT BY option_id — exactly
           {{default variation_count 5}} options with distinct
           option_ids `option-01`..`option-05`. Concrete URLs may be
           anything creative.
        3. REACHABILITY — every option's `primary_route` linked from
           BOTH the PRD index page at `/repos/{{prd_slug}}` AND the
           ui-designs top-level home/catalog. Missing, duplicated, or
           unreachable primary_route → fail.
        4. NO GENERIC DYNAMIC-ROUTE COLLAPSE — distinct, static
           per-option route folders. `uses_generic_dynamic_route ==
           false`. PRESERVE creative per-option route system.
        5. ROUTES EXIST + RENDER + ARE DISTINCT — every entry in each
           option's `route_tree` exists, renders, returns non-empty
           content. Duplicate primary_route → fail.
        6. ROUTE TREE FITS CONCEPT — each option's route_tree shape
           supports the unique UX in its
           `route_differentiation_rationale`.
        7. SOURCE-INSPIRED, NOT COPIED — `copied_component_file_count
           == 0`, `source_imports_used == 0`. Allowed: shared
           locked-child replicas that match source DOM/classes/labels
           exactly, when classified as `exact_locked` in the fidelity
           contract.
        8. SHELL COMPLETENESS (NEW) — when
           `design_scope_type` is `full_page_design` or
           `app_surface_design`, OR when `layout_shell_contract`
           contains entries with `classification == exact_locked`,
           the worktree MUST contain a shared shell primitive replica
           for every required entry (navbar, sidebar, page-header,
           page-container, tabs/filters, drawers/modals as listed).
           Each option's layout/page MUST consume those shared shell
           primitives. Inline option-only chrome that bypasses the
           shared shell → fail. Missing primitive → fail with an
           actionable repair entry naming the missing primitive and
           its source path.
        9. LOCKED CHILD FIDELITY (NEW) — for every entry in
           `component_fidelity_contract` with `fidelity_class ==
           exact_locked`:
             - A shared replica file MUST exist under
               `prototypes/{{prd_slug}}/shared/_local/<Name>Replica.tsx`.
             - Its source attributes listed in `must_not_drift_from`
               MUST be byte-identical to source (labels, class
               strings, sizing constants, conditional render shape,
               iconography). Drift on ANY locked attribute → fail.
             - Options MUST import the shared replica. Any inline
               reimplementation in an option file → fail.
               (`locked_children_inline_in_options == 0`.)
           For varied_target / proposed_new components, visual
           differences from source are NOT a blocker.
        10. FOUNDATION TOKEN USAGE (NEW, STRICTER) — prototype-owned
            surfaces (everything under `prototypes/` and every option
            page under `app/repos/{{prd_slug}}/`) MUST use foundation
            tokens. Raw hex, raw rgb()/rgba(), raw HSL, and inline
            `boxShadow` literals on prototype-owned surfaces → fail,
            UNLESS the value is:
              - a documented named prototype-token variable declared
                in `prototypes/{{prd_slug}}/_foundations/`, OR
              - an exact source literal reproduced
                character-for-character on a locked-child replica
                because source itself uses that literal.
            For each violation, the verdict report MUST include an
            actionable repair instruction naming the file, the
            offending literal, and the suggested token name.
            DO NOT flag legitimate structural sizing constants
            (`px` widths/heights, gaps, radii) where source uses raw
            px and there is no equivalent spacing/radius token in
            foundations.
        11. USABLE / POLISHED ENOUGH — prototypes are interactive,
            no ASCII-art placeholders, no obviously-broken layouts.
            Loading / empty / error states where the brief calls for
            them.

      EXPLICITLY NOT BLOCKERS:
        - Routes / folders NOT being `/options/option-XX`. Creative
          concept-driven URLs are required, not blocked.
        - Different route_tree shapes across options.
        - Pixel-perfect parity for varied_target / proposed_new
          components.
        - Missing snippet-reference docs.
        - Structural px sizing on prototype-owned surfaces where the
          source uses raw px and no spacing token exists.

      Save the verdict report:
        `mcp__allen__allen_save_artifact("ux/{{prd_slug}}/design-verdict.md",
        <markdown>, content_type="markdown", overwrite=true)`

      The report MUST contain:
        - One section per rank-blocker dimension (1–11).
        - An "Option Identity Map" section: option_id →
          concept_slug → primary_route → route_tree.
        - A "Shell Completeness Map" section listing required shell
          primitives, replica path, and consumption status per
          option.
        - A "Locked Child Fidelity Map" section listing each
          exact_locked child with its replica path, drift status,
          and which options import it.
        - For every failing dimension, an "Actionable Repair" bullet
          list naming files, lines, and concrete fixes.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "design_verdict": "pass | warn | fail | escalate",
        "design_verdict_report_artifact_url": "<publicUrl>",
        "design_failure_details": "short string when warn/fail/escalate (empty on pass)",
        "blocker_summary": {
          "source_repo_untouched": true,
          "option_count_correct": true,
          "reachable_from_home_and_prd_index": true,
          "no_dynamic_route_collapse": true,
          "routes_exist_render_distinct": true,
          "route_tree_fits_concept": true,
          "source_inspired_not_copied": true,
          "shell_completeness_ok": true,
          "locked_child_fidelity_ok": true,
          "foundation_tokens_ok": true,
          "polished_enough": true
        }
      }
      ```

      Verdict rules:
        - pass     → no blocking findings.
        - warn     → only soft findings.
        - fail     → at least one rank-blocker. Workflow loops back
                     to build_prototypes_and_routes (max 2 retries).
        - escalate → reserved for cases where build cannot fix
                     without redoing research/foundation copy.
    outputs:
      design_verdict: pass | warn | fail | escalate
      design_verdict_report_artifact_url: Public URL of the verdict report.
      design_failure_details: Short summary when warn/fail/escalate.
      blocker_summary: Per-dimension boolean map of verifier outcomes.
  verifier_recovery_review:
    if: "{{ output_mode != 'spec_only' or output_mode is not defined }}"
    type: human
    human:
      kind: recover
      widget: escalation_gate
      title: Recover design verifier failure
      summary: final_design_verifier exhausted its 2 repair attempts or escalated. Decide how to recover.
      question: Retry build with feedback, override and continue to PR, or abandon the run.
      highlights:
        - 'PRD slug: {{prd_slug}}'
        - 'Worktree path: {{default worktree_path "—"}}'
        - 'Branch: {{default branch "—"}}'
        - 'Verdict: {{default design_verdict "—"}}'
        - 'Failure details: {{default design_failure_details "—"}}'
      evidence:
        - label: Verifier report
          url: '{{default design_verdict_report_artifact_url ""}}'
        - label: Routes manifest
          url: '{{default routes_manifest_artifact_url ""}}'
        - label: Interaction map
          url: '{{default interaction_map_artifact_url ""}}'
        - label: Fidelity manifest
          url: '{{default fidelity_manifest_artifact_url ""}}'
        - label: Fidelity contract
          url: '{{default fidelity_contract_artifact_url ""}}'
        - label: UX brief
          url: '{{default ux_brief_artifact_url ""}}'
        - label: Options plan
          url: '{{default options_plan_artifact_url ""}}'
        - label: Foundations reference
          url: '{{default foundations_reference_artifact_url ""}}'
    prompt: |
      🔴 final_design_verifier could not be repaired automatically.

      PRD slug:           {{prd_slug}}
      Worktree path:      {{default worktree_path "—"}}
      Branch:             {{default branch "—"}}
      Verdict:            {{default design_verdict "—"}}
      Failure details:    {{default design_failure_details "—"}}

      📄 Artifacts:
        UX BRIEF:                {{default ux_brief_artifact_url "(not produced)"}}
        OPTIONS PLAN:            {{default options_plan_artifact_url "(not produced)"}}
        FIDELITY CONTRACT:       {{default fidelity_contract_artifact_url "(not produced)"}}
        FOUNDATIONS REFERENCE:   {{default foundations_reference_artifact_url "(not produced)"}}
        ROUTES MANIFEST:         {{default routes_manifest_artifact_url "(not produced)"}}
        INTERACTION MAP JSON:    {{default interaction_map_artifact_url "(not produced)"}}
        FIDELITY MANIFEST:       {{default fidelity_manifest_artifact_url "(not produced)"}}
        VERIFIER REPORT:         {{default design_verdict_report_artifact_url "(not produced)"}}

      Decision:
        retry_with_feedback   → loop back to build_prototypes_and_routes
                                with your feedback as repair context.
        override_and_continue → bypass the verifier and open PR.
        abandon               → end the run; artifacts preserved.
    outputs:
      decision: retry_with_feedback | override_and_continue | abandon
      feedback: Free-form feedback string forwarded to the build step.
  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a pull request on the ui-designs repo containing the
      foundation copy, generated UX options, prototype components,
      creative per-option routes, and PRD-index update for this PRD.

      WORKFLOW TYPE: design-exploration
      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME:   {{branch_name}}

      📋 REQUIREMENT / PRD:
      {{requirement_or_prd}}

      PRD SLUG:           {{prd_slug}}
      DESIGN SCOPE TYPE:  {{design_scope_type}}
      SOURCE REPO:        {{source_repo_path}} (READ-ONLY — never committed here)
      OPTION SLUGS:       {{option_slugs}}
      OPTIONS:            {{options}}
      ROUTES:             {{routes}}
      HOME INDEX ROUTE:   {{home_index_route}}

      📄 ARTIFACTS (link in PR body):
        UX BRIEF:                {{ux_brief_artifact_url}}
        OPTIONS PLAN:            {{options_plan_artifact_url}}
        FIDELITY CONTRACT:       {{fidelity_contract_artifact_url}}
        FOUNDATIONS REFERENCE:   {{foundations_reference_artifact_url}}
        ROUTES MANIFEST:         {{routes_manifest_artifact_url}}
        INTERACTION MAP JSON:    {{interaction_map_artifact_url}}
        FIDELITY MANIFEST:       {{fidelity_manifest_artifact_url}}
        DESIGN VERDICT REPORT:   {{design_verdict_report_artifact_url}}

      PR title: feat({{prd_slug}}): UX exploration — {{generated_option_count}} options
      PR body MUST include:
        - Summary of the PRD/requirement and `design_scope_type`.
        - A table of generated options with one row per option_id, in
          this exact column order:
            | option_id | concept_name | concept_slug | primary_route |
        - Foundation-only sync note + locked shell/child replicas
          shared across options.
        - Verifier verdict + short summary.
        - Links to every artifact above (including fidelity contract
          + fidelity manifest).
        - "How to view" section: `cd` into the worktree, run
          `npm run dev`, open the PRD index at `{{home_index_route}}`,
          then click into each option's `primary_route`.

      Stage, commit, push, and `gh pr create`. NEVER touch
      {{source_repo_path}}.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "pr_url": "<created or reused PR URL, or null on failure>"
      }
      ```
    outputs:
      pr_url: The created (or reused) PR URL on ui-designs, or null on failure.
edges:
  - from: START
    to: research_and_options
  - from: research_and_options
    to: create_workspace
    condition: research_verdict == 'pass'
  - from: research_and_options
    to: verifier_recovery_review
    condition: research_verdict == 'escalate'
  - from: create_workspace
    to: copy_foundations
  - from: copy_foundations
    to: build_prototypes_and_routes
    condition: copy_foundations_verdict == 'pass' OR copy_foundations_verdict == 'warn'
  - from: copy_foundations
    to: verifier_recovery_review
    condition: copy_foundations_verdict == 'escalate'
  - from: build_prototypes_and_routes
    to: final_design_verifier
  - from: final_design_verifier
    to: open_pr
    condition: design_verdict == 'pass' OR design_verdict == 'warn'
  - from: final_design_verifier
    to: build_prototypes_and_routes
    condition: design_verdict == 'fail'
    max_retries: 2
    retry_context: |
      final_design_verifier failed. Repair scope:
      {{design_failure_details}}

      Verifier report: {{design_verdict_report_artifact_url}}
      Routes manifest: {{routes_manifest_artifact_url}}
      Interaction map: {{interaction_map_artifact_url}}
      Fidelity contract: {{fidelity_contract_artifact_url}}
      Fidelity manifest: {{fidelity_manifest_artifact_url}}
      Options plan (KEEP STABLE):    {{options_plan_artifact_url}}
      Option ids (KEEP STABLE):      {{option_slugs}}
      Concept slugs and primary routes per option MUST stay identical
      to the options plan. Only fix verifier findings. Do NOT
      regenerate options. Do NOT re-copy foundations. Do NOT rename
      routes. Do NOT collapse into a generic dynamic renderer.
      Locked shell primitives and locked-child replicas remain
      shared; do not inline them per option.
  - from: final_design_verifier
    to: verifier_recovery_review
    condition: design_verdict == 'fail' AND __retry_exhausted_from == 'final_design_verifier'
  - from: verifier_recovery_review
    to: build_prototypes_and_routes
    condition: human.verifier_recovery_review.latest.decision == 'retry_with_feedback'
    retry_context: |
      Human feedback on verifier failure:
      {{human.verifier_recovery_review.latest.feedback.value}}
      Preserve option_id → concept_slug → primary_route bindings from
      the options plan. Do NOT rename routes to /options/option-XX.
      Locked shell primitives and locked-child replicas remain shared.
  - from: verifier_recovery_review
    to: open_pr
    condition: human.verifier_recovery_review.latest.decision == 'override_and_continue'
  - from: verifier_recovery_review
    to: END
    condition: human.verifier_recovery_review.latest.decision == 'abandon'
  - from: open_pr
    to: END
