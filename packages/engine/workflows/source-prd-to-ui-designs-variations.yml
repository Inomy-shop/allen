name: source-prd-to-ui-designs-variations
description: >
  PRD/requirement -> UX variations workflow that keeps a source/product
  repo READ-ONLY and produces all design work inside the ui-designs
  repository.

  Foundation-sync + PRD-scoped SNIPPET EXTRACTION model.

  v4 changes:
    - plan_divergence and generate_variations are NOT re-run when
      parity_check fails. A new node `repair_prototypes_from_parity`
      receives the parity failure, repairs prototypes/routes manifest/
      exact-fidelity replicas/hardcoded styles/route slug alignment/
      interaction map, then loops directly back to parity_check.
    - Canonical option identity is `option-01`..`option-05`. Any
      concept name from the divergence plan is metadata
      (`concept_slug`/`concept_name`) only, never the route slug.
    - Exact-fidelity claims apply ONLY to unchanged child/subcomponents.
      A component the option intentionally varies must be labeled
      `adapted` or `proposed`, never `exact-fidelity`.
    - Prototype CSS/components must use foundation token aliases
      (CSS vars / tailwind tokens). Raw hex/HSL/px are blockers on
      prototype/option surfaces only; unrelated base app shell
      scaffolding is not a blocker unless this workflow modified it.
    - A detailed interaction map MUST be persisted as both a routes
      manifest section and as a separate `interaction-map.json`
      artifact for parity to validate.

  PRD modes (decided by archaeology): existing_component_experiment,
  new_feature_exploration, hybrid.

  Pipeline:
    1. understand_prd
    2. archaeologize_source
    3. create_workspace
    4. sync_design_system (foundations + snippet references only)
    5. plan_divergence (one-time)
    6. generate_variations (one-time)
    7. build_prototype_routes
    8. parity_check
         pass/warn -> frontend_feasibility
         fail      -> repair_prototypes_from_parity -> parity_check
                      (max 2 repair loops)
         escalate  -> parity_failure_review
    9. frontend_feasibility
    10. options_summary
    11. open_pr

  Artifact-read convention: artifact URLs are http://.../api/artifacts/<id>/content.
  Read with mcp__allen__allen_get_artifact(artifact_id=<id>).
  Agents save with mcp__allen__allen_save_artifact.
version: 1
context:
  requires:
    - repo
  tools:
    - filesystem
    - git
    - terminal
  concurrency: 2
input:
  requirement_or_prd:
    type: string
    required: true
    widget: textarea
    label: Requirement / PRD
    description: The PRD body or a single-paragraph requirement describing the UX work to explore. Used by prd-ux-translator to draft the UX brief.
  source_repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Source repo (READ-ONLY evidence)
    description: Absolute path of the source/product repo whose PRD this is. Used as READ-ONLY evidence for foundations and snippet citations. This repo is NEVER mutated by this workflow.
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: ui-designs repo (write target — alias of ui_designs_repo_path)
    description: Absolute path of the registered ui-designs repo. A git worktree is cut from this repo and all design output is written inside it. Engine-canonical name is `repo_path`; functionally equivalent to ui_designs_repo_path.
  prd_slug:
    type: string
    required: true
    widget: text
    label: PRD / design slug
    description: Short slug used to organize folders inside the ui-designs worktree (e.g. "search-results-redesign"). Lowercase, hyphen-separated.
  variation_count:
    type: number
    required: false
    default: 5
    widget: number
    label: Variation count (max 5)
    description: How many design variations to generate. Hard-capped at 5 by the generator.
  trusted_mode:
    type: boolean
    required: false
    default: false
    widget: checkbox
    label: Trusted mode (auto-skip parity warn-level human review)
    description: When true, parity warnings that aren't blocking are auto-accepted without human review. Blocking failures still go through parity_failure_review.
  chat_session_id:
    type: string
    required: false
    widget: text
    description: Originating chat session ID (auto-populated from chat).
  started_by_user_id:
    type: string
    required: false
    widget: text
    description: User ID who started the run (for Slack DM routing of interventions).
nodes:
  understand_prd:
    agent: prd-ux-translator
    resume_on_retry: true
    prompt: |
      Translate the PRD/requirement into a UX brief that downstream
      design agents can execute against.

      📋 REQUIREMENT / PRD:
      {{requirement_or_prd}}

      SOURCE REPO PATH (READ-ONLY evidence — do NOT write):
      {{source_repo_path}}

      PRD SLUG: {{prd_slug}}

      UI-DESIGNS REPO (write target — the workspace has not been
      created yet; do not attempt to write there from this node):
      {{repo_path}}

      Inspect the source repo only for evidence necessary to draft the
      UX brief. Do NOT modify any file in source_repo_path.

      Brief contents (see your system prompt for the full list):
      jobs, entry points, screen list, happy/edge/abandon/return paths,
      required states, design-system constraints (citations), a11y +
      responsive requirements, design acceptance criteria.

      Save the UX brief as a markdown artifact:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/ux-brief.md", <markdown>, content_type="markdown", overwrite=true)
      Copy the returned `publicUrl` into JSON as `ux_brief_artifact_url`.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "ux_brief_artifact_url": "<publicUrl from allen_save_artifact>",
        "prd_slug": "{{prd_slug}}",
        "understand_verdict": "pass | escalate",
        "understand_failure_details": "short string when verdict is escalate (empty on pass)"
      }
      ```
    outputs:
      ux_brief_artifact_url: Public URL of the UX brief markdown artifact.
      prd_slug: Passthrough PRD slug.
      understand_verdict: pass | escalate — drives routing.
      understand_failure_details: Short failure description (empty on pass).
  archaeologize_source:
    agent: design-system-archaeologist
    resume_on_retry: true
    prompt: |
      Inventory the source repo's design system AND derive a
      SNIPPET-REFERENCE PLAN for this PRD. READ-ONLY — never write to
      {{source_repo_path}}.

      This workflow does NOT mirror source component files. Your job
      here is to (A) document the existing design system as evidence
      and (B) decide which foundations to copy, which snippets/patterns
      to cite, and which files MUST NOT be touched.

      SOURCE REPO PATH (read-only):
      {{source_repo_path}}

      PRD SLUG: {{prd_slug}}

      📄 UX BRIEF (fetch via mcp__allen__allen_get_artifact for context):
      {{ux_brief_artifact_url}}

      ── PART A — FULL SOURCE INVENTORY ─────────────────────────────
      Cover at minimum: routes/pages relevant to the PRD, layout
      shells, tokens (CSS vars / Tailwind theme / design-tokens.json),
      typography, spacing, color palette, components (primitives +
      composites), interaction patterns, iconography, breakpoints,
      and any design-system documentation.

      Cite file paths for every verified claim. Label any inference
      as `needs-source-verification`.

      Also derive a short slug for the source repo from its directory
      name (lowercase, hyphen-separated). Emit as `source_repo_slug`.

      Save the inventory as a markdown artifact:
        mcp__allen__allen_save_artifact("source-research/{{prd_slug}}/design-system-inventory.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `design_system_inventory_artifact_url`.

      ── PART B — PRD-SCOPED SNIPPET REFERENCE PLAN ─────────────────
      Decide the PRD mode from the UX brief:
        - "existing_component_experiment" — the PRD modifies or
          experiments on an existing component/pattern. Snippet
          extraction allowed; preserve exact visual fidelity for
          UNCHANGED child/subcomponents only. The target component
          being experimented on is NOT exact-fidelity.
        - "new_feature_exploration" — brand-new feature. Foundations
          ONLY. No source component snippets at all. Set
          `new_feature_foundation_only: true`.
        - "hybrid" — a new feature that intentionally re-uses a small
          existing visual pattern. Allowed only with explicit
          rationale per re-used pattern.

      The plan MUST include (snippet plan schema):
        - source_repo_slug
        - prd_mode
        - new_feature_foundation_only: boolean
        - hybrid_rationale: string (only when prd_mode == "hybrid")
        - foundational_style_sources: array of file paths for
          tokens/theme/global CSS/tailwind config/typography/spacing/
          radius/shadow definitions / CSS variable roots. These are
          the ONLY files allowed to be copied verbatim into the
          worktree.
        - target_existing_components: array (only for
          existing_component_experiment / hybrid); each entry has:
            * source_path, component_name, role_in_prd
            * EVIDENCE REFERENCES ONLY — these are NOT copy targets.
            * NOTE: targets are the components the PRD experiments
              on; they are NOT exact-fidelity. Mark them
              `varies_in_prd: true`.
        - required_snippets: array; each entry has:
            * snippet_id
            * source_path
            * symbol_or_range (function name / class / line range)
            * purpose
            * variants_or_states
            * consuming_screens
            * fidelity_class: "exact" | "adapted" | "proposed"
              ("exact" only for unchanged child/subcomponents)
            * exact_visual_fidelity_required: boolean
              (true ONLY when fidelity_class == "exact" AND the
              snippet is an unchanged child/subcomponent)
        - child_visual_snippets: array of child/subcomponent
          snippets that must be preserved with exact unchanged
          visual appearance.
        - local_stub_contracts: array of props/context/data shapes
          that must be stubbed LOCALLY.
        - explicitly_excluded_files: array of source files that MUST
          NOT be copied or imported.
        - allowlist_confidence: high | medium | low
        - allowlist_gaps: array of UX brief needs with no matching
          source pattern.

      Save the snippet-reference plan as a SEPARATE markdown artifact:
        mcp__allen__allen_save_artifact("source-research/{{prd_slug}}/snippet-reference-plan.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `snippet_reference_plan_artifact_url`.

      Hard rules:
        - If prd_mode is new_feature_exploration, required_snippets
          and target_existing_components MUST be empty and
          new_feature_foundation_only MUST be true.
        - If prd_mode is hybrid, required_snippets may contain only
          the explicitly justified re-used pattern(s).
        - exact_visual_fidelity_required MUST be false for any
          snippet whose parent target the option intentionally varies.
        - If the UX brief is too ambiguous, set archaeology_verdict
          to escalate with archaeology_notes.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "design_system_inventory_artifact_url": "<publicUrl>",
        "snippet_reference_plan_artifact_url": "<publicUrl>",
        "source_repo_slug": "<short slug>",
        "prd_mode": "existing_component_experiment | new_feature_exploration | hybrid",
        "new_feature_foundation_only": false,
        "foundational_style_source_count": 0,
        "required_snippet_count": 0,
        "child_visual_snippet_count": 0,
        "local_stub_count": 0,
        "explicitly_excluded_file_count": 0,
        "allowlist_confidence": "high | medium | low",
        "archaeology_verdict": "pass | partial | escalate",
        "archaeology_notes": "one-line summary"
      }
      ```
    outputs:
      design_system_inventory_artifact_url: Public URL of the source-repo design-system inventory.
      snippet_reference_plan_artifact_url: Public URL of the PRD-scoped snippet reference plan.
      source_repo_slug: Short slug derived from the source repo.
      prd_mode: existing_component_experiment | new_feature_exploration | hybrid.
      new_feature_foundation_only: True when prd_mode == new_feature_exploration.
      foundational_style_source_count: Number of foundational style/token files identified.
      required_snippet_count: Number of cited snippets.
      child_visual_snippet_count: Number of child snippets.
      local_stub_count: Number of local stub contracts.
      explicitly_excluded_file_count: Number of explicitly excluded files.
      allowlist_confidence: high | medium | low.
      archaeology_verdict: pass | partial | escalate.
      archaeology_notes: One-line summary.
  create_workspace:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
      timeout_sec: 600
    outputs:
      workspace_id: Internal Allen workspace identifier.
      worktree_path: Absolute isolated git worktree path inside ui-designs.
      branch: Generated branch name.
      branch_name: Alias of branch.
      base_branch: Branch the worktree was cut from.
      status: Workspace setup status.
      repo_path: Alias of worktree_path.
  sync_design_system:
    agent: design-system-syncer
    resume_on_retry: true
    prompt: |
      Perform a FOUNDATION-ONLY sync + SNIPPET-REFERENCE
      documentation pass. The source repo is READ-ONLY — never write
      to it.

      ⚠️ THIS WORKFLOW OVERRIDES ANY BROAD-COPY DEFAULT IN YOUR SYSTEM
      PROMPT. You will NOT create a components/, assets/, or docs/
      mirror. You will copy ONLY foundational style/token files and
      write snippet citations. `copied_component_file_count` MUST be 0
      on every successful run; any value > 0 is a hard escalate.

      You will:
        (a) Copy foundational style/token files VERBATIM into
            foundations/ (the only files copied verbatim).
        (b) Write snippet-reference docs that CITE the source files
            and ranges from the snippet-reference plan into
            snippet-references/. Snippet code blocks are tiny
            quotations — never the full source file.
        (c) Do NOT create a components/ directory. Do NOT copy any
            component source file. Do NOT copy any parent / provider /
            data-fetch / route / passthrough container file.
        (d) Do NOT create an assets/ mirror or a docs/ mirror unless
            those files are foundation tokens (logos, brand SVGs are
            NOT foundation tokens for this workflow).

      SOURCE REPO PATH (READ-ONLY):
      {{source_repo_path}}

      UI-DESIGNS WORKTREE PATH (write target — all output goes here):
      {{worktree_path}}

      SOURCE REPO SLUG: {{source_repo_slug}}
      PRD SLUG:         {{prd_slug}}
      PRD MODE:         {{prd_mode}}
      NEW-FEATURE-FOUNDATION-ONLY: {{new_feature_foundation_only}}

      📄 SOURCE DESIGN-SYSTEM INVENTORY (context only):
        {{design_system_inventory_artifact_url}}
      📄 SNIPPET REFERENCE PLAN (authoritative — fetch with
         mcp__allen__allen_get_artifact and obey strictly):
        {{snippet_reference_plan_artifact_url}}

      Destination layout (inside the worktree):
        repos/{{source_repo_slug}}/design-system/foundations/
        repos/{{source_repo_slug}}/snippet-references/
        repos/{{source_repo_slug}}/snippet-references/STUBS.md
        repos/{{source_repo_slug}}/SOURCE.md
          — manifest with THREE sections:
            ## Copied (foundations only)
            ## Cited snippets (NOT copied as files)
            ## Excluded (must not be copied/imported)

      Each copied foundation file MUST carry a
        // source: {{source_repo_slug}}:<source_path>@<short_sha>
      header. Binaries get a sibling `<filename>.source.json`.

      HARD RULES:
        - copied_component_file_count MUST be 0.
        - DO NOT create repos/{{source_repo_slug}}/design-system/components/.
        - DO NOT create repos/{{source_repo_slug}}/design-system/assets/
          or repos/{{source_repo_slug}}/design-system/docs/ as broad
          mirrors of the source repo. Only foundation-related files
          go under foundations/.
        - DO NOT copy or import parent components, context providers,
          stores, data-fetching wrappers, route containers,
          props-passthrough containers, or any file on the snippet
          plan's explicitly_excluded_files list.
        - DO NOT modify, rewrite, refactor, or "improve" copied
          foundation files.
        - DO NOT touch any path outside {{worktree_path}}.
        - DO NOT stage, commit, or run formatters in {{source_repo_path}}.
        - If new_feature_foundation_only is true, required_snippets
          MUST be empty.
        - If the snippet plan is missing/empty/unparsable, set
          sync_verdict to "escalate" — do NOT fall back to broad copy.

      Save the sync report (must explicitly state "foundations only +
      snippet references; no source component files copied"):
        mcp__allen__allen_save_artifact("design-system/{{source_repo_slug}}/sync-report.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `sync_report_artifact_url`.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "sync_verdict": "pass | partial | escalate",
        "sync_report_artifact_url": "<publicUrl>",
        "design_system_root": "repos/{{source_repo_slug}}/design-system",
        "foundations_root": "repos/{{source_repo_slug}}/design-system/foundations",
        "snippet_references_root": "repos/{{source_repo_slug}}/snippet-references",
        "manifest_path": "repos/{{source_repo_slug}}/SOURCE.md",
        "snippet_plan_artifact_url": "{{snippet_reference_plan_artifact_url}}",
        "copied_foundation_count": 0,
        "extracted_snippet_count": 0,
        "child_visual_snippet_count": 0,
        "local_stub_count": 0,
        "excluded_file_count": 0,
        "copied_component_file_count": 0,
        "missing_required_snippets": [],
        "sync_failure_details": "short string when verdict is partial or escalate (empty on pass)"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK (parity check or human intervention):
      {{retry_context}}
      {{/if}}
    outputs:
      sync_verdict: pass | partial | escalate.
      sync_report_artifact_url: Public URL of the sync-report markdown artifact.
      design_system_root: Relative path to the synced design-system root inside the worktree.
      foundations_root: Relative path to the copied foundations directory.
      snippet_references_root: Relative path to the snippet-references directory.
      manifest_path: Relative path to the SOURCE.md manifest.
      snippet_plan_artifact_url: Public URL of the snippet-reference plan.
      copied_foundation_count: Number of foundational style/token files copied verbatim.
      extracted_snippet_count: Number of snippet-reference docs written.
      child_visual_snippet_count: Number of child visual-fidelity snippet docs written.
      local_stub_count: Number of local stub contracts documented.
      excluded_file_count: Number of explicitly-excluded source files recorded.
      copied_component_file_count: Number of source component files copied verbatim — MUST be 0.
      missing_required_snippets: List of snippets whose source path could not be located.
      sync_failure_details: Short failure description (empty on pass).
  plan_divergence:
    agent: design-divergence-planner
    resume_on_retry: true
    prompt: |
      Plan up to {{variation_count}} materially different UX option
      strategies for this PRD. Write into the ui-designs worktree only.

      ⚠️ ROUTE SLUG RULE — IMPORTANT:
      Canonical option identity downstream is `option-01` ... `option-05`.
      Any human-readable concept name you produce is METADATA on the
      option (use the field `concept_name` and optionally a derived
      `concept_slug`), but the route slug, prototype folder, registry
      key, options index entry, and routes manifest path will all use
      `option-XX`. Do NOT propose concept slugs (e.g.
      "immersive-room-canvas") as the canonical route slug. Number the
      planned options 1..N in order.

      WORKTREE PATH: {{worktree_path}}
      PRD SLUG:      {{prd_slug}}
      VARIATION COUNT (cap at 5): {{variation_count}}
      PRD MODE:      {{prd_mode}}
      NEW-FEATURE-FOUNDATION-ONLY: {{new_feature_foundation_only}}

      📄 UX BRIEF:                                  {{ux_brief_artifact_url}}
      📄 SOURCE DESIGN-SYSTEM INVENTORY (context):  {{design_system_inventory_artifact_url}}
      📄 SNIPPET REFERENCE PLAN (authoritative):    {{snippet_reference_plan_artifact_url}}
      📄 FOUNDATIONS ROOT (relative to worktree):   {{foundations_root}}
      📄 SNIPPET REFERENCES ROOT (relative):        {{snippet_references_root}}

      Each option must vary by a major dimension. Constraints by mode:
        - existing_component_experiment / hybrid: any pattern not in
          required_snippets must either be `proposed-new-component`
          or avoided. The target component(s) the PRD experiments on
          are explicitly NOT exact-fidelity.
        - new_feature_exploration: foundations ONLY.

      For each planned option emit:
        - option_id: "option-01" .. "option-05" (canonical)
        - concept_name: short human-readable name
        - concept_slug: lowercase-hyphenated form of concept_name
          (metadata only — never used as a route slug)
        - thesis, axes_of_variation, target_components_varied,
          snippets_consumed, child_visual_fidelity_snippets,
          proposed_new_components.

      Save the divergence plan:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/divergence-plan.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `divergence_plan_artifact_url`.

      End with a fenced JSON block:
      ```json
      {
        "divergence_plan_artifact_url": "<publicUrl>",
        "planned_option_count": 0
      }
      ```
    outputs:
      divergence_plan_artifact_url: Public URL of the divergence plan.
      planned_option_count: Number of options planned (≤ variation_count, ≤ 5).
  generate_variations:
    agent: design-variation-generator
    resume_on_retry: true
    prompt: |
      Create up to {{variation_count}} (hard cap 5) repo-grounded UX
      design options based on the divergence plan. Write only inside
      the ui-designs worktree.

      ⚠️ CANONICAL OPTION IDENTITY:
      Option slugs MUST be `option-01`, `option-02`, ... `option-NN`
      in the same order as the divergence plan. Concept names from
      the divergence plan are stored as METADATA on each option spec
      (fields `concept_name`, `concept_slug`) — they are NEVER used as
      route slugs, prototype folder names, or registry keys.
      This identity flows through every downstream node: options
      index, option spec paths, prototype folders, registry, routes
      manifest, and PR body.

      WORKTREE PATH: {{worktree_path}}
      PRD SLUG:      {{prd_slug}}
      PRD MODE:      {{prd_mode}}
      NEW-FEATURE-FOUNDATION-ONLY: {{new_feature_foundation_only}}

      📄 UX BRIEF:                                  {{ux_brief_artifact_url}}
      📄 DIVERGENCE PLAN:                           {{divergence_plan_artifact_url}}
      📄 SOURCE DESIGN-SYSTEM INVENTORY (context):  {{design_system_inventory_artifact_url}}
      📄 SNIPPET REFERENCE PLAN (authoritative):    {{snippet_reference_plan_artifact_url}}
      📄 FOUNDATIONS ROOT (relative to worktree):   {{foundations_root}}
      📄 SNIPPET REFERENCES ROOT (relative):        {{snippet_references_root}}

      Source re-use rules:
        - existing_component_experiment / hybrid: cite snippet_ids
          from the snippet plan. Components the option INTENTIONALLY
          VARIES must be marked `fidelity_class: "adapted"` or
          `"proposed"`. Only UNCHANGED child/subcomponents may be
          marked `fidelity_class: "exact"`.
        - new_feature_exploration: build from foundations only; do
          NOT reference any required_snippet.

      For each option spec also list:
        - option_id: "option-XX"
        - concept_name, concept_slug (metadata)
        - target_components_varied: components the option changes
          (fidelity_class must NOT be "exact" for these)
        - child_visual_fidelity_snippets: snippet_ids whose child
          visuals must look identical to source (only unchanged
          children)
        - foundations_used
        - snippets_used (cited, not implied as exact reuse)
        - local_stubs_used
        - proposed_new_components
        - interactions: primary CTAs, tabs, modals, sheets, filters,
          form controls, route transitions (each described well
          enough for the prototype builder to wire and parity to
          validate)

      ⚠️ DO NOT CLAIM EXACT COMPONENT REUSE. Snippets are referenced
      as evidence; the prototype implements LOCAL components inspired
      by them. The phrasing "component reused" in your system prompt
      is OVERRIDDEN here — use "snippet referenced" and describe a
      local implementation instead.

      Each option spec lives at
        repos/{{prd_slug}}/options/option-XX.md.

      Save a consolidated options index as a markdown artifact:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/options-index.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `options_index_artifact_url`.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "options_index_artifact_url": "<publicUrl>",
        "generated_option_count": 0,
        "option_slugs": ["option-01", "option-02"]
      }
      ```
    outputs:
      options_index_artifact_url: Public URL of the options index markdown.
      generated_option_count: Number of option specs actually produced.
      option_slugs: Canonical option slugs (option-01..option-NN).
  build_prototype_routes:
    agent: prototype-route-builder
    resume_on_retry: true
    prompt: |
      Create or update INTERACTIVE Next.js prototype routes for each
      generated option inside the ui-designs worktree. Build local
      prototype components from FOUNDATIONS + SNIPPET PATTERNS with
      LOCAL STUB PROPS/STATE. Do NOT import from the source repo and
      do NOT import any copied source component file.

      ⚠️ CANONICAL ROUTE / SLUG ALIGNMENT (HARD RULE):
      The slugs in `{{option_slugs}}` (e.g. option-01..option-05)
      MUST be used identically as:
        - prototype folder names: prototypes/{{prd_slug}}/{optionSlug}/
        - route URL segments:    /repos/{{prd_slug}}/options/{optionSlug}
        - option spec filenames: repos/{{prd_slug}}/options/{optionSlug}.md
        - registry/index keys (options index, routes manifest)
        - PR body links
      Concept names are LABELS only, surfaced as the route's display
      name. Do NOT use a concept slug as a folder or URL segment.

      ⚠️ FOUNDATION TOKEN USAGE (HARD RULE):
      All prototype CSS / className utilities / inline styles MUST
      consume foundation tokens (CSS variables from foundations/,
      tailwind theme tokens, design-tokens.json keys). Raw hex,
      HSL, rgb(), or px values for color/spacing/typography/radius/
      shadow on PROTOTYPE OR OPTION-OWNED SURFACES are NOT allowed
      where a foundation token exists. If a token does not exist,
      propose a new token alias under foundations/proposals/ with a
      rationale comment AND reference it from the prototype.
      You may NOT add raw values to `app/globals.css` for the
      prototype. The unrelated base app shell scaffolding (Next.js
      starter scaffolding you did NOT add for this workflow) is out
      of scope.

      ⚠️ EXACT-FIDELITY CLAIMS:
      Only build a `_replica` / `Replica` component that claims
      exact source fidelity when the underlying snippet's
      `fidelity_class` is "exact" AND the snippet describes an
      UNCHANGED child/subcomponent. If the snippet's parent is being
      varied by the option, do NOT name the component `*Replica`
      and do NOT claim exact fidelity. Use `*Adapted` or `*Proposed`
      and document the visual deltas. Replicas (when used) MUST
      structurally mirror the cited source (same DOM shape, same
      token usage, same iconography).

      WORKTREE PATH: {{worktree_path}}
      PRD SLUG:      {{prd_slug}}
      OPTION SLUGS:  {{option_slugs}}
      PRD MODE:      {{prd_mode}}
      NEW-FEATURE-FOUNDATION-ONLY: {{new_feature_foundation_only}}

      📄 OPTIONS INDEX:                                {{options_index_artifact_url}}
      📄 UX BRIEF:                                     {{ux_brief_artifact_url}}
      📄 SNIPPET REFERENCE PLAN (authoritative):       {{snippet_reference_plan_artifact_url}}
      📄 FOUNDATIONS ROOT (relative to worktree):      {{foundations_root}}
      📄 SNIPPET REFERENCES ROOT (relative):           {{snippet_references_root}}

      INTERACTIVITY REQUIREMENTS (hard):
        1. /repos/{{prd_slug}} links every option route.
        2. Every primary CTA / button in the UX brief is a real
           clickable element with a handler.
        3. Tabs, segmented controls, filters, dropdowns, drawers /
           modals / sheets, back/next, selection, and form controls
           are wired.
        4. Route-to-route transitions for the happy path of each
           flow work end-to-end via next/link or router.push.
        5. Loading / empty / error / success local state where the
           brief calls for it.
        6. Accessible elements (button, a, role, aria-*).

      INTERACTION MAP — PERSISTED IN TWO PLACES (HARD):
        (i)  Inline section "Interaction Map" in the routes manifest
             markdown, with one row per clickable element per option.
        (ii) A SEPARATE JSON artifact with full per-element detail:
               mcp__allen__allen_save_artifact(
                 "ux/{{prd_slug}}/interaction-map.json",
                 <json string>,
                 content_type="json",
                 overwrite=true
               )
        The JSON schema is:
          {
            "prd_slug": "{{prd_slug}}",
            "options": [
              {
                "option_id": "option-01",
                "concept_name": "<display name>",
                "route": "/repos/{{prd_slug}}/options/option-01",
                "interactions": [
                  {
                    "element": "PrimaryCTA: 'Continue'",
                    "location": "<route + component>",
                    "action_type": "route_change|open_modal|toggle_state|submit_form|filter|tab_switch|back|external_link",
                    "target": "<target route, modal id, state key>",
                    "wired": true,
                    "evidence": "<file path:line referenced>"
                  }
                ]
              }
            ]
          }
        Copy the returned publicUrl into JSON as `interaction_map_artifact_url`.

      Also produce a VISUAL FIDELITY MAP listing each exact-fidelity
      snippet (only unchanged children), the local replica path,
      and a self-check note ("matches source: yes/needs-review").

      Save the routes manifest:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/routes-manifest.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `routes_manifest_artifact_url`.

      Verdict rules:
        pass     → option index links all options; primary flow CTAs
                   / tabs / modals are wired; transitions work;
                   interaction_map complete; no source imports; no
                   copied source component files imported; route
                   slugs are option-XX everywhere; foundation tokens
                   used.
        partial  → most flows wired but at least one primary CTA or
                   transition is static contrary to the brief, OR
                   exact-fidelity child snippets self-flagged
                   "needs-review", OR a few prototype tokens still
                   raw.
        escalate → static mockups, missing interaction map, slug
                   mismatch across registry/folders, or source-file
                   imports.

      End with a fenced JSON block:
      ```json
      {
        "routes_manifest_artifact_url": "<publicUrl>",
        "interaction_map_artifact_url": "<publicUrl>",
        "routes": [],
        "interaction_map": [],
        "visual_fidelity_map": [],
        "wired_interaction_count": 0,
        "unwired_interaction_count": 0,
        "local_replica_count": 0,
        "source_imports_used": 0,
        "raw_value_violations": 0,
        "prototype_build_verdict": "pass | partial | escalate"
      }
      ```
    outputs:
      routes_manifest_artifact_url: Public URL of the prototype routes manifest.
      interaction_map_artifact_url: Public URL of the per-element interaction map JSON.
      routes: List of route URLs for each option.
      interaction_map: Structured map of clickable elements per option.
      visual_fidelity_map: Structured map of exact-fidelity snippets to local replicas.
      wired_interaction_count: Count of wired interactive elements.
      unwired_interaction_count: Count of intentionally-static elements.
      local_replica_count: Number of local prototype-only replicas.
      source_imports_used: Number of imports from the source repo or copied source files — MUST be 0.
      raw_value_violations: Number of raw hex/HSL/px values used on prototype surfaces where a foundation token exists — MUST be 0 on pass.
      prototype_build_verdict: pass | partial | escalate.
  parity_check:
    agent: design-critic
    resume_on_retry: true
    retries: 1
    prompt: |
      Verify the foundation sync, snippet references, generated
      designs, and prototype routes match the source repo's design
      system AND respect the snippet-reference plan.

      ⚠️ HOW TO INTERPRET EXACT FIDELITY (READ THIS FIRST):
      Distinguish TARGET COMPONENT EXPERIMENTATION from UNCHANGED
      CHILD/SUBCOMPONENT FIDELITY:
        - The PRD's target component(s) are EXPECTED to vary. Mark
          them as `adapted` or `proposed`. Judge them on:
            (a) source-grounded pattern fit (do they consume
                foundations consistently and stay within the design
                language?), and
            (b) the divergence thesis they implement.
          Do NOT fail them for not looking identical to source.
        - UNCHANGED child/subcomponents (snippets with
          fidelity_class == "exact") MUST look identical to source:
          same DOM shape, same foundation tokens, same iconography.
          A `*Replica` component that is simplified/manual is a
          BLOCKER — but only when the snippet is explicitly
          unchanged/exact.
        - If a component is named `*Replica` but the underlying
          snippet's fidelity_class is not "exact", the BLOCKER is
          the misleading naming/claim, not the visual delta.
          Recommend renaming to `*Adapted`/`*Proposed`.

      WORKTREE PATH (read-only for this review):
      {{worktree_path}}

      SOURCE REPO PATH (read-only evidence):
      {{source_repo_path}}

      PRD MODE: {{prd_mode}}
      NEW-FEATURE-FOUNDATION-ONLY: {{new_feature_foundation_only}}

      📄 SOURCE DESIGN-SYSTEM INVENTORY:               {{design_system_inventory_artifact_url}}
      📄 SNIPPET REFERENCE PLAN:                       {{snippet_reference_plan_artifact_url}}
      📄 SYNC REPORT:                                  {{sync_report_artifact_url}}
      📄 OPTIONS INDEX:                                {{options_index_artifact_url}}
      📄 ROUTES MANIFEST:                              {{routes_manifest_artifact_url}}
      📄 INTERACTION MAP JSON:                         {{interaction_map_artifact_url}}
      📄 FOUNDATIONS ROOT (relative to worktree):      {{foundations_root}}
      📄 SNIPPET REFERENCES ROOT (relative):           {{snippet_references_root}}

      Rank-blocker dimensions (any one → fail):
        1. FOUNDATION FIDELITY: tokens in copied foundation files
           match source exactly.
        2. NO COMPONENT-FILE COPYING: no source component file
           appears verbatim in the worktree outside foundations/.
           If design-system/components/ exists → fail.
        3. NO PARENT/PROVIDER/ROUTE/DATA-FETCH IMPORTS.
        4. FOUNDATION-ONLY MODE INTEGRITY when
           new_feature_foundation_only is true.
        5. EXACT-VISUAL-FIDELITY DRIFT — ONLY for
           child_visual_snippets where
           exact_visual_fidelity_required is true AND the snippet
           describes an unchanged child. For varied target
           components, do NOT fail for visual drift — fail ONLY if
           the prototype claims `exact-fidelity` for a component
           that is intentionally varied.
        6. HARDCODED-STYLE DRIFT — fail when prototype CSS or
           option-owned files use raw hex/HSL/px for properties
           where a foundation token exists. SCOPE: prototype
           components under prototypes/, option spec code under
           repos/{{prd_slug}}/options/, and any
           `app/globals.css` changes added BY this workflow. Do
           NOT block on unrelated base app shell scaffolding the
           workflow did not modify.
        7. STATIC FLOWS: if the interaction_map JSON artifact is
           missing, empty, or shows wired=false for non-display
           primary CTAs / tabs / modals / route transitions
           called out by the UX brief → fail. The interaction
           map must be the per-element JSON, not just counts.
        8. ROUTE SLUG MISMATCH: option_slugs, options index
           entries, prototype folders, routes manifest entries,
           and option spec filenames must all match `option-XX`
           form. Mismatches → fail (parity blocker).
        9. MISSING REQUIRED SNIPPET REPLICA: a required_snippet
           with fidelity_class == "exact" has no corresponding
           local replica → fail.

      Soft-blocker dimensions (warn-only):
        10. Snippet-reference docs cite minimal ranges.
        11. SOURCE.md has a complete Excluded section.
        12. New components clearly labeled `proposed-new-component`
            with rationale.
        13. Designs prefer foundation tokens over inlined replicas
            when foundations suffice.
        14. Target component visual changes have a documented
            divergence thesis (warn-only; not a blocker).

      Save the parity report (include explicit sections for each
      of the 9 rank-blocker dimensions and a section labelled
      "Target vs Child fidelity rationale" explaining which
      components are excused from exact-fidelity because they are
      varied targets):
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/parity-report.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `parity_report_artifact_url`.

      Verdict rules:
        pass     → no blocking drift.
        warn     → only soft-blocker findings.
        fail     → at least one rank-blocker dimension diverged;
                   prototype-level repair needed (NOT a full
                   sync/replan).
        escalate → the snippet plan / foundations / divergence
                   plan are themselves incompatible with source.
                   Use escalate ONLY for that case — drift in
                   prototypes is `fail`, not `escalate`.

      End with a fenced JSON block:
      ```json
      {
        "parity_verdict": "pass | warn | fail | escalate",
        "parity_report_artifact_url": "<publicUrl>",
        "parity_failure_details": "short string when verdict is warn/fail/escalate (empty on pass)"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      parity_verdict: pass | warn | fail | escalate.
      parity_report_artifact_url: Public URL of the parity report.
      parity_failure_details: Short description; used in retry_context / escalation display.
  repair_prototypes_from_parity:
    agent: prototype-route-builder
    resume_on_retry: true
    prompt: |
      🛠 PROTOTYPE-LEVEL REPAIR PASS — parity_check returned `fail`.
      Keep the divergence plan, option identities, and option
      strategies STABLE. You may update option specs ONLY to align
      them with the canonical option-XX identity and to reflect the
      repaired prototype implementation. You MUST NOT regenerate the
      divergence plan, change the number of options, or invent new
      concept directions.

      WORKTREE PATH: {{worktree_path}}
      PRD SLUG:      {{prd_slug}}
      OPTION SLUGS:  {{option_slugs}}
      PRD MODE:      {{prd_mode}}
      NEW-FEATURE-FOUNDATION-ONLY: {{new_feature_foundation_only}}

      📄 PARITY REPORT (read first):                   {{parity_report_artifact_url}}
      📄 PARITY FAILURE DETAILS:                        {{parity_failure_details}}
      📄 ROUTES MANIFEST (current):                    {{routes_manifest_artifact_url}}
      📄 INTERACTION MAP JSON (current):               {{interaction_map_artifact_url}}
      📄 OPTIONS INDEX (current):                      {{options_index_artifact_url}}
      📄 DIVERGENCE PLAN (do NOT regenerate):          {{divergence_plan_artifact_url}}
      📄 SNIPPET REFERENCE PLAN (authoritative):       {{snippet_reference_plan_artifact_url}}
      📄 UX BRIEF:                                     {{ux_brief_artifact_url}}
      📄 FOUNDATIONS ROOT (relative to worktree):      {{foundations_root}}
      📄 SNIPPET REFERENCES ROOT (relative):           {{snippet_references_root}}

      Repair scope (work through each parity rank-blocker raised):
        A. EXACT-FIDELITY DRIFT: For each `*Replica` flagged, either
           (1) rewrite the local replica to structurally mirror the
               cited source snippet (same DOM, same foundation
               tokens, same iconography), OR
           (2) if the underlying snippet's parent is intentionally
               varied by the option, rename the component to
               `*Adapted` / `*Proposed`, update the option spec's
               `fidelity_class` to `adapted` or `proposed`, and
               update the visual fidelity map accordingly. The
               replica claim is the bug — fix the claim or fix the
               structure.
        B. HARDCODED-STYLE DRIFT: Replace raw hex/HSL/px on
           prototype surfaces and option-owned files with foundation
           token references (CSS vars, tailwind tokens). If a
           required token does not exist, add a proposal token to
           foundations/proposals/ with a rationale comment and
           reference it from the prototype. Touch app/globals.css
           ONLY to remove raw values this workflow added; do not
           edit unrelated base app shell scaffolding.
        C. INTERACTION MAP: Produce the per-element JSON artifact
           at ux/{{prd_slug}}/interaction-map.json with every
           clickable element (element, location, action_type,
           target, wired, evidence). The routes manifest's
           Interaction Map section MUST mirror it row-for-row.
           Wire any primary CTA / tab / modal / route transition
           that is currently unwired but called out by the UX brief.
        D. ROUTE SLUG MISMATCH: Rename folders, registry entries,
           routes manifest paths, and option spec filenames so they
           all use `option-XX` from {{option_slugs}}. Concept names
           remain as display labels only. Update any internal
           imports/links that referenced concept slugs. Add a redirect
           or alias only if a concept slug URL was already exposed
           externally — otherwise just rename.
        E. MISSING REPLICA: Add the missing local replica for any
           required_snippet whose fidelity_class == "exact" that the
           prototype claims to consume.
        F. ROUTES MANIFEST CONSISTENCY: Regenerate the routes
           manifest section so routes/option_slugs/interaction_map
           rows match the new repaired state.

      Constraints:
        - Do NOT regenerate divergence plan or options index unless
          the options index is the artifact being repaired for slug
          alignment. If you update it, preserve all option strategies
          and only fix identity/links/fidelity-class fields.
        - Do NOT create new options.
        - Do NOT touch source_repo_path.
        - Re-save updated artifacts with overwrite=true:
            ux/{{prd_slug}}/routes-manifest.md (routes_manifest_artifact_url)
            ux/{{prd_slug}}/interaction-map.json (interaction_map_artifact_url)
            ux/{{prd_slug}}/options-index.md (only if needed)

      Save a repair report:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/repair-report.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `repair_report_artifact_url`.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "repair_report_artifact_url": "<publicUrl>",
        "routes_manifest_artifact_url": "<publicUrl>",
        "interaction_map_artifact_url": "<publicUrl>",
        "options_index_artifact_url": "{{options_index_artifact_url}}",
        "option_slugs": {{option_slugs}},
        "fixes_applied": ["exact_fidelity_drift", "hardcoded_styles", "interaction_map", "route_slug_alignment", "missing_replica", "routes_manifest"],
        "raw_value_violations": 0,
        "wired_interaction_count": 0,
        "unwired_interaction_count": 0,
        "local_replica_count": 0,
        "source_imports_used": 0,
        "repair_verdict": "pass | partial | escalate",
        "repair_failure_details": "short string when verdict is partial or escalate (empty on pass)"
      }
      ```
    outputs:
      repair_report_artifact_url: Public URL of the repair report.
      routes_manifest_artifact_url: Updated public URL of the routes manifest.
      interaction_map_artifact_url: Updated public URL of the interaction map JSON artifact.
      options_index_artifact_url: Options index URL (unchanged unless slug alignment required an update).
      option_slugs: Canonical option-XX slugs (unchanged).
      fixes_applied: List of repair categories applied this pass.
      raw_value_violations: Remaining raw-value violations on prototype surfaces — should be 0.
      wired_interaction_count: Updated wired count.
      unwired_interaction_count: Updated unwired count.
      local_replica_count: Updated local replica count.
      source_imports_used: MUST be 0.
      repair_verdict: pass | partial | escalate.
      repair_failure_details: Short failure description (empty on pass).
  frontend_feasibility:
    agent: frontend-feasibility-reviewer
    resume_on_retry: true
    prompt: |
      Review the generated options + prototype routes for frontend
      feasibility against the source repo's current frontend patterns.
      Source repo is READ-ONLY evidence — never write to it.

      SOURCE REPO PATH (read-only):
      {{source_repo_path}}

      WORKTREE PATH (read-only for this review):
      {{worktree_path}}

      PRD MODE: {{prd_mode}}

      📄 OPTIONS INDEX:                                {{options_index_artifact_url}}
      📄 ROUTES MANIFEST:                              {{routes_manifest_artifact_url}}
      📄 INTERACTION MAP JSON:                         {{interaction_map_artifact_url}}
      📄 SNIPPET REFERENCE PLAN:                       {{snippet_reference_plan_artifact_url}}
      📄 UX BRIEF:                                     {{ux_brief_artifact_url}}

      Save the feasibility report:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/frontend-feasibility.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `feasibility_report_artifact_url`.

      End with a fenced JSON block:
      ```json
      {
        "feasibility_report_artifact_url": "<publicUrl>",
        "feasibility_verdict": "pass | concerns | escalate"
      }
      ```
    outputs:
      feasibility_report_artifact_url: Public URL of the feasibility report.
      feasibility_verdict: pass | concerns | escalate.
  options_summary:
    agent: options-synthesizer
    resume_on_retry: true
    prompt: |
      Synthesize all options into a decision-ready summary for the
      reviewer.

      WORKTREE PATH: {{worktree_path}}
      PRD MODE:      {{prd_mode}}

      📄 UX BRIEF:                                    {{ux_brief_artifact_url}}
      📄 SNIPPET REFERENCE PLAN:                      {{snippet_reference_plan_artifact_url}}
      📄 DIVERGENCE PLAN:                             {{divergence_plan_artifact_url}}
      📄 OPTIONS INDEX:                               {{options_index_artifact_url}}
      📄 ROUTES MANIFEST:                             {{routes_manifest_artifact_url}}
      📄 INTERACTION MAP JSON:                        {{interaction_map_artifact_url}}
      📄 PARITY REPORT:                               {{parity_report_artifact_url}}
      📄 FEASIBILITY REPORT:                          {{feasibility_report_artifact_url}}

      Include comparison table; recommendation shortlist;
      risks/open questions; the prototype-route index; an
      "Interaction Coverage" note pulled from the interaction map
      JSON (wired CTAs, modals, tabs, route transitions per option);
      and a "Source Re-use Summary" (PRD mode, foundations used,
      snippet replicas, exact-fidelity child snippets, excluded
      source files).

      Save the synthesized summary:
        mcp__allen__allen_save_artifact("ux/{{prd_slug}}/options-summary.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl into JSON as `options_summary_artifact_url`.

      End with a fenced JSON block:
      ```json
      {
        "options_summary_artifact_url": "<publicUrl>"
      }
      ```
    outputs:
      options_summary_artifact_url: Public URL of the final decision-ready options summary.
  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a pull request on the ui-designs repo containing the
      foundation sync, snippet-reference docs, generated design
      options, interactive prototype routes, and all design artifacts
      for this PRD.

      WORKFLOW TYPE: design-exploration
      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME:   {{branch_name}}

      📋 REQUIREMENT / PRD:
      {{requirement_or_prd}}

      PRD SLUG:    {{prd_slug}}
      PRD MODE:    {{prd_mode}}
      SOURCE REPO: {{source_repo_path}} (READ-ONLY — never committed here)
      OPTIONS:     {{option_slugs}}
      ROUTES:      {{routes}}

      📄 ARTIFACTS (link in PR body):
        UX BRIEF:                  {{ux_brief_artifact_url}}
        SOURCE INVENTORY:          {{design_system_inventory_artifact_url}}
        SNIPPET REFERENCE PLAN:    {{snippet_reference_plan_artifact_url}}
        SYNC REPORT:               {{sync_report_artifact_url}}
        DIVERGENCE PLAN:           {{divergence_plan_artifact_url}}
        OPTIONS INDEX:             {{options_index_artifact_url}}
        ROUTES MANIFEST:           {{routes_manifest_artifact_url}}
        INTERACTION MAP JSON:      {{interaction_map_artifact_url}}
        PARITY REPORT:             {{parity_report_artifact_url}}
        FEASIBILITY REPORT:        {{feasibility_report_artifact_url}}
        OPTIONS SUMMARY:           {{options_summary_artifact_url}}

      PR title: feat({{prd_slug}}): UX exploration — {{generated_option_count}} options
      PR body MUST include:
        - Summary of the PRD/requirement.
        - PRD mode and rationale.
        - List of generated options with their canonical option-XX
          slugs AND their concept_name display labels.
        - Foundation-sync + snippet-extraction summary: foundations
          copied, snippet references extracted, child visual-fidelity
          snippets, local stubs, excluded files. State explicitly
          that `copied_component_file_count == 0`.
        - Parity verdict + summary.
        - Frontend feasibility verdict.
        - Links to every artifact above.
        - "How to view" section: run `npm run dev` in the worktree and
          open /repos/{{prd_slug}}/options/<option-XX> for each option.

      Stage, commit, push, and `gh pr create`. NEVER touch
      {{source_repo_path}}.

      End with a fenced JSON block containing EXACTLY:
      ```json
      {
        "pr_url": "<created or reused PR URL, or null on failure>"
      }
      ```
    outputs:
      pr_url: The created (or reused) PR URL on ui-designs, or null on failure.
  parity_failure_review:
    type: human
    human:
      kind: recover
      widget: escalation_gate
      title: Recover parity / sync failure
      summary: design-critic flagged blocking issues that the repair pass could not resolve, or design-system-syncer escalated.
      question: Retry the sync with feedback, override and continue, or abandon the run.
      highlights:
        - 'Parity verdict: {{default parity_verdict "(not run yet)"}}'
        - 'Parity details: {{default parity_failure_details "—"}}'
        - 'Repair verdict: {{default repair_verdict "—"}}'
        - 'Repair details: {{default repair_failure_details "—"}}'
        - 'Sync verdict: {{default sync_verdict "—"}}'
        - 'Sync details: {{default sync_failure_details "—"}}'
      evidence:
        - label: Parity report
          url: '{{default parity_report_artifact_url ""}}'
        - label: Repair report
          url: '{{default repair_report_artifact_url ""}}'
        - label: Sync report
          url: '{{default sync_report_artifact_url ""}}'
        - label: Snippet reference plan
          url: '{{default snippet_reference_plan_artifact_url ""}}'
        - label: Source inventory
          url: '{{default design_system_inventory_artifact_url ""}}'
    prompt: |
      🔴 The workflow paused because parity_check exhausted its
      repair attempts / escalated, or sync_design_system escalated.

      Sync verdict:    {{default sync_verdict "—"}}
      Sync details:    {{default sync_failure_details "—"}}
      Parity verdict:  {{default parity_verdict "(not run yet)"}}
      Parity details:  {{default parity_failure_details "—"}}
      Repair verdict:  {{default repair_verdict "—"}}
      Repair details:  {{default repair_failure_details "—"}}

      📄 Artifacts so far:
        UX BRIEF:                  {{default ux_brief_artifact_url "(not produced)"}}
        SOURCE INVENTORY:          {{default design_system_inventory_artifact_url "(not produced)"}}
        SNIPPET REFERENCE PLAN:    {{default snippet_reference_plan_artifact_url "(not produced)"}}
        SYNC REPORT:               {{default sync_report_artifact_url "(not produced)"}}
        DIVERGENCE PLAN:           {{default divergence_plan_artifact_url "(not produced)"}}
        OPTIONS INDEX:             {{default options_index_artifact_url "(not produced)"}}
        ROUTES MANIFEST:           {{default routes_manifest_artifact_url "(not produced)"}}
        INTERACTION MAP JSON:      {{default interaction_map_artifact_url "(not produced)"}}
        PARITY REPORT:             {{default parity_report_artifact_url "(not produced)"}}
        REPAIR REPORT:             {{default repair_report_artifact_url "(not produced)"}}

      Decision:
        retry_with_feedback  → loop back to sync_design_system with feedback.
        override_and_continue → bypass parity and continue to feasibility.
        abandon              → end the run; artifacts preserved.
edges:
  - from: START
    to: understand_prd
  - from: understand_prd
    to: archaeologize_source
    condition: understand_verdict == 'pass'
  - from: understand_prd
    to: parity_failure_review
    condition: understand_verdict == 'escalate'
  - from: archaeologize_source
    to: create_workspace
    condition: archaeology_verdict == 'pass' OR archaeology_verdict == 'partial'
  - from: archaeologize_source
    to: parity_failure_review
    condition: archaeology_verdict == 'escalate'
  - from: create_workspace
    to: sync_design_system
  - from: sync_design_system
    to: plan_divergence
    condition: sync_verdict == 'pass' OR sync_verdict == 'partial'
  - from: sync_design_system
    to: parity_failure_review
    condition: sync_verdict == 'escalate'
  - from: plan_divergence
    to: generate_variations
  - from: generate_variations
    to: build_prototype_routes
  - from: build_prototype_routes
    to: parity_check
  - from: parity_check
    to: frontend_feasibility
    condition: parity_verdict == 'pass'
  - from: parity_check
    to: frontend_feasibility
    condition: parity_verdict == 'warn'
  - from: parity_check
    to: repair_prototypes_from_parity
    condition: parity_verdict == 'fail'
    max_retries: 2
    retry_context: |
      Parity check failed. Repair scope: {{parity_failure_details}}
      Parity report: {{parity_report_artifact_url}}
      Routes manifest: {{routes_manifest_artifact_url}}
      Interaction map: {{interaction_map_artifact_url}}
      Options index: {{options_index_artifact_url}}
      Option slugs (KEEP STABLE): {{option_slugs}}
      Divergence plan (DO NOT REGENERATE): {{divergence_plan_artifact_url}}
  - from: repair_prototypes_from_parity
    to: parity_check
    max_retries: 2
    retry_context: |
      Repaired prototypes. Re-check parity.
      Repair report: {{repair_report_artifact_url}}
  - from: parity_check
    to: parity_failure_review
    condition: parity_verdict == 'fail' AND __retry_exhausted_from == 'parity_check'
  - from: parity_check
    to: parity_failure_review
    condition: parity_verdict == 'escalate'
  - from: frontend_feasibility
    to: options_summary
  - from: options_summary
    to: open_pr
  - from: open_pr
    to: END
  - from: parity_failure_review
    to: END
    condition: human.parity_failure_review.latest.decision == 'abandon'
  - from: parity_failure_review
    to: sync_design_system
    condition: human.parity_failure_review.latest.decision == 'retry_with_feedback'
    retry_context: |
      Human feedback on parity/sync failure:
      {{human.parity_failure_review.latest.feedback.value}}
  - from: parity_failure_review
    to: frontend_feasibility
    condition: human.parity_failure_review.latest.decision == 'override_and_continue'
