name: qa-with-judge
description: Ask a question, LLM answers, judge validates, retry if wrong, format final output
version: 1

context:
  requires: []
  tools: [web-search]

input:
  question: { type: string, required: true }

nodes:
  answer:
    agent: researcher
    prompt: |
      Answer this question accurately and concisely:
      {{question}}

      {{#if retry_context}}
      YOUR PREVIOUS ANSWER WAS REJECTED BY THE JUDGE.
      {{retry_context}}
      Research again carefully and provide a corrected answer.
      {{/if}}
    outputs: [answer, confidence, sources]
    output_format: json
    resume_on_retry: true

  judge:
    agent: reviewer
    prompt: |
      You are a strict fact-checking judge. Evaluate this answer:

      Question: {{question}}
      Answer: {{answer}}
      Sources: {{sources}}

      Check:
      1. Is the answer factually correct?
      2. Does it actually answer the question asked?
      3. Is it complete (not missing key information)?

      Verdict: APPROVED or REJECTED with specific reasons.
    outputs: [verdict, reasons, score]
    output_format: json

  format:
    agent: writer
    prompt: |
      Format this Q&A cleanly:

      Question: {{question}}
      Answer: {{answer}}
      Sources: {{sources}}
      Quality score: {{score}}/10

      Format as a clean, readable Q&A card with:
      - Question in bold
      - Answer in clear paragraphs
      - Sources as a numbered list
      - Score badge at the bottom
    outputs: [formatted_qa]

edges:
  - { from: START, to: answer }
  - { from: answer, to: judge }
  - { from: judge, to: format, condition: "verdict == 'APPROVED'" }
  - { from: judge, to: answer, condition: "verdict == 'REJECTED'", max_retries: 3, retry_context: "Judge score: {{score}}/10. Reasons: {{reasons}}" }
  - { from: format, to: END }
