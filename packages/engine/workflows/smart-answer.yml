name: smart-answer
description: Two-node Q&A — answer then format. Tests all auto-gate actions based on input quality.
version: 1

context:
  requires: []
  tools: []

input:
  question: { type: string, required: true }

nodes:
  answer:
    agent: codex-researcher
    prompt: |
      Answer this question:
      {{question}}

      {{#if retry_context}}
      ADDITIONAL CONTEXT FROM USER: {{retry_context}}
      Use this to answer properly.
      {{/if}}
    outputs: [answer, confidence]
    output_format: json
    resume_on_retry: true

  format:
    agent: codex-researcher
    prompt: |
      Format this Q&A for display:

      Question: {{question}}
      Answer: {{answer}}
      Confidence: {{confidence}}

      Create a clean, readable summary.
    outputs: [formatted]

edges:
  - { from: START, to: answer }
  - { from: answer, to: format }
  - { from: format, to: END }
