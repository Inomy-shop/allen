name: test-human-intervention
description: >
  Minimal smoke-test workflow for the Human Intervention Protocol. Exercises
  all three severity types (🟡 QUESTION, 🟢 APPROVAL, 🔴 ESCALATION) back-to-
  back with no external dependencies — no repo, no agents, no code nodes.
  Run this to verify:

    1. The pending-intervention banner shows on the execution page with the
       correct severity color.
    2. The Interventions list page (/interventions) shows the pending row.
    3. The Interventions detail page renders the card with the right action
       buttons per severity (Approve/Reject vs Answer vs Accept/Abort).
    4. The Slack notification fires (if ALLEN_SLACK_BOT_TOKEN and
       ALLEN_SLACK_INTERVENTIONS_CHANNEL are configured) — DM to the
       starter + channel post.
    5. Submitting a response resumes the workflow and advances to the next
       human node.
    6. The per-run Interventions sidebar on the execution page shows all
       three interventions chronologically.

  Severity is auto-derived from node names by the intervention hook in
  execution.service.ts — ask_question (🟡), ask_approval_gate (🟢),
  ask_escalation (🔴).

version: 1

context:
  tools: []
  concurrency: 5

input:
  test_message:
    type: string
    required: false
    default: "Testing HIP end-to-end"
    widget: text
    label: Test message
    description: Any string — gets echoed back on the first question card so you can confirm the input flowed through.

nodes:
  ask_question:
    type: human
    fields:
      - name: user_answer
        label: "Your answer (any text is fine)"
        type: text
        required: true
    outputs:
      user_answer: "The user's free-text answer."
    prompt: |
      🟡 QUESTION severity test card — step 1 of 3.

      This is the Human Intervention Protocol smoke test. You're at the
      first stop: a QUESTION intervention. The purpose is to verify that:

        • the severity badge in the banner/card renders yellow
        • the action zone shows an "Answer" button (not approve/reject)
        • the execution page banner is yellow
        • Slack ping fires (if configured)

      Test input you passed: "{{test_message}}"

      Type anything in the answer field and submit to advance to the
      APPROVAL test card.

  ask_approval_gate:
    type: human
    fields:
      - name: decision
        label: "Decision"
        type: select
        options: [approve, reject]
        required: true
    outputs:
      decision: "User's approve/reject decision."
    prompt: |
      🟢 APPROVAL severity test card — step 2 of 3.

      You are now at an APPROVAL intervention. The severity badge should
      be green. The action zone should show Approve / Request changes /
      Reject buttons.

      Your previous answer: "{{user_answer}}"

      Behavior:
        • Approve  → advances to the ESCALATION test card.
        • Reject   → ends the workflow immediately.
        • Request changes → triggers the loop-back retry machinery (this
          will loop back to the question step — use this to verify the
          retry-with-feedback path end-to-end).

  ask_escalation:
    type: human
    fields:
      - name: final_feedback
        label: "Final feedback"
        type: textarea
        required: true
    outputs:
      final_feedback: "Free-text feedback."
    prompt: |
      🔴 ESCALATION severity test card — step 3 of 3.

      Final test card. ESCALATION severity — the banner should be red.
      The action zone for escalations shows Approve (accept deviations) /
      Request changes / Reject (abandon).

      Previous decision: "{{decision}}"

      Submit any feedback to complete the workflow. This is the last
      intervention — the workflow ends after this step regardless of
      which button you click.

edges:
  - { from: START, to: ask_question }
  - { from: ask_question, to: ask_approval_gate }
  - { from: ask_approval_gate, to: ask_escalation, condition: "decision == 'approve'" }
  - { from: ask_approval_gate, to: END, condition: "decision == 'reject'" }
  - { from: ask_escalation, to: END }
