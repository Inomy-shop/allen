name: deploy-checklist
description: Simple approval workflow with human gates for testing
version: 1

context:
  requires: []
  tools: []

input:
  task: { type: string, required: true }

nodes:
  gather-info:
    type: human
    prompt: "Task: {{task}}\n\nProvide deployment details:"
    fields:
      - { name: environment, type: select, label: "Environment", options: [dev, staging, production], required: true }
      - { name: priority, type: select, label: "Priority", options: [low, medium, high, critical], required: true }
      - { name: description, type: text, label: "What changed?", required: true }
    outputs: [environment, priority, description]

  review:
    type: human
    prompt: |
      Please review this deployment request:

      Task: {{task}}
      Environment: {{environment}}
      Priority: {{priority}}
      Description: {{description}}

      Approve or reject?
    fields:
      - { name: approved, type: boolean, label: "Approve?" }
      - { name: reviewer_notes, type: text, label: "Notes", required: false }
    outputs: [approved, reviewer_notes]

  final-confirm:
    type: human
    prompt: |
      Final confirmation before deploying to {{environment}}:

      Task: {{task}}
      Priority: {{priority}}
      Reviewer notes: {{reviewer_notes}}

      This is the last step. Confirm?
    fields:
      - { name: confirmed, type: boolean, label: "Deploy now?" }
    outputs: [confirmed]

edges:
  - { from: START, to: gather-info }
  - { from: gather-info, to: review }
  - { from: review, to: final-confirm, condition: "approved" }
  - { from: review, to: END, condition: "not approved" }
  - { from: final-confirm, to: END }
