name: review-only
description: Review code without making changes. Produces a detailed review report.
version: 2

context:
  requires: [repo]
  tools: [filesystem]

input:
  task: { type: string, required: true }
  repo_path: { type: string, required: true }

nodes:
  review:
    agent: backend-code-reviewer
    prompt: "Review the codebase at your CWD for: {{task}}"
    outputs: [review_verdict, review_feedback, issues]

  report:
    agent: documentation-writer
    prompt: |
      Write a code review report:
      Verdict: {{review_verdict}}
      Feedback: {{review_feedback}}
      Issues: {{issues}}
    outputs: [report]

edges:
  - { from: START, to: review }
  - { from: review, to: report }
  - { from: report, to: END }
