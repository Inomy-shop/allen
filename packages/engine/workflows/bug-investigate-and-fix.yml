name: bug-investigate-and-fix
description: >
  Lean bug fix workflow: create an isolated worktree, investigate the
  root cause, pause for human approval, dispatch the fix via the engineering-lead
  orchestrator, write targeted unit/integration acceptance tests, skip the
  slow regression suite, validate the fix against the root cause,
  run security-aware code review, open a PR, post a summary.

  Human touches per run (steady state): 2 total —
    1. Initial bug report
    2. Root-cause/fix-scope approval before implementation

  Additional escalation touches happen when QA can't triage a failure, when
  validation fails repeatedly, when review blocks, or when PR creation fails.

version: 1

context:
  requires: [repo]
  tools: [filesystem, git, terminal]
  concurrency: 3

input:
  bug_report:
    type: string
    required: true
    widget: textarea
    label: Bug report
    description: Describe the bug — symptoms, repro steps, error messages, stack traces if you have them. The investigator uses this to reproduce the issue and trace to the root cause.
    placeholder: "e.g. Clicking the Delete button on an empty workflow crashes the UI with 'Cannot read property id of undefined'. Reproduced on Chrome 120 and Firefox 125. Happens on workflows with no nodes."
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Target repo
    description: The registered repo where the bug lives.
  related_pr:
    type: string
    required: false
    widget: text
    label: Related PR (optional)
    description: URL of a PR you suspect introduced the bug. Handed to the investigator as a context hint — it doesn't have to use it.
    placeholder: "https://github.com/org/repo/pull/123"
  chat_session_id:
    type: string
    required: false
    widget: text
    description: Originating chat session ID (auto-populated from chat — leave blank when running from this form).
  started_by_user_id:
    type: string
    required: false
    widget: text
    description: User ID who started the run (for Slack DM routing of interventions).

nodes:
  # Dedicated workspace-creation node — runs ONCE before any bug-fix
  # agent receives the repo. Investigation is read-only, but it still
  # runs in the isolated worktree so every downstream command and any
  # accidental write stays out of the main clone. Retries back to
  # `implement` skip this node entirely and reuse the existing
  # worktree_path carried in state.
  create_workspace:
    type: code
    function: create-workspace
    config:
      # Branch from the repo's detected default branch (workspace.ts falls
      # back to 'main' if detection missed). 10-minute setup timeout.
      wait_for_setup: true
      timeout_sec: 600
    outputs:
      workspace_id: "Internal Allen workspace identifier."
      worktree_path: "Absolute path to the isolated git worktree the fix specialist(s) will work inside."
      branch: "Generated branch name (e.g. allen/feature-<stamp>)."
      branch_name: "Alias of `branch` — downstream nodes read {{branch_name}}."
      base_branch: "Branch the worktree was cut from (repo default)."
      status: "Workspace setup status — 'active' or 'running' on success."
      repo_path: "Alias of worktree_path — overwrites the input repo_path so downstream agents operate inside the worktree."

  investigate:
    agent: bug-investigator
    resume_on_retry: true
    prompt: |
      Investigate this bug and find the root cause. This is a READ-ONLY
      investigation step: do not edit files. Implementation happens in the
      downstream engineering-lead node.

      BUG REPORT: {{bug_report}}
      WORKTREE PATH: {{worktree_path}}
      {{#if related_pr}}
      RELATED PR: {{related_pr}}
      {{/if}}
      {{#if retry_context}}
      HUMAN FEEDBACK FROM PRE-IMPLEMENTATION APPROVAL:
      {{retry_context}}
      {{/if}}

      Follow your four-rule contract:
        1. Reproduce first — run the reported steps in a terminal from
           {{worktree_path}}.
        2. Walk the call stack — don't guess.
        3. If the issue appears to be a design gap rather than a defect,
           say so in the root_cause and fix_description so the approval
           gate can decide whether to continue.
        4. Identify minimal fix scope — no while-we're-here cleanup.

      End with a JSON block: root_cause, files_to_touch[], confidence,
      scope, fix_description, reproduction_steps,
      affected_components, security_implications.
    outputs:
      investigate_output: "The investigator's full JSON output."
      files_to_touch: "Files the fix needs to touch."
      confidence: "Float 0-1 confidence in the diagnosed root cause."
      scope: "S | M | L | XL fix scope."
      root_cause: "One-paragraph root cause."
      fix_description: "One-paragraph fix description."
      reproduction_steps: "Steps or commands used to reproduce or infer the bug."
      affected_components: "Components touched by the bug."
      security_implications: "none | low | medium | high with explanation."

  implementation_approval_human:
    type: human
    fields:
      - name: approval_decision
        label: "Approve this root cause and fix scope?"
        type: select
        options: [approve, request_changes, cancel]
        required: true
      - name: approval_feedback
        label: "Feedback or reason (optional for approval)"
        type: textarea
        required: false
    outputs:
      approval_decision: "approve | request_changes | cancel"
      approval_feedback: "Feedback passed back to the investigator or implementation lead."
    prompt: |
      Review the diagnosed root cause and proposed fix scope before any
      implementation agent starts changing code.

      Original bug report:
      {{bug_report}}

      Root cause:
      {{root_cause}}

      Proposed fix (as a bug):
      {{fix_description}}

      Confidence: {{confidence}}
      Scope: {{scope}}

      Reproduction:
      {{reproduction_steps}}

      Affected components:
      {{affected_components}}

      Security implications:
      {{security_implications}}

      Files proposed for implementation:
      {{files_to_touch}}

      Options:
        approve         → start implementation with this root cause and scope
        request_changes → send feedback back to investigation before coding
        cancel          → abandon the workflow before implementation

  implement:
    agent: engineering-lead
    # Resume across retries (qa-fail, code-review-fail) so engineering-lead
    # remembers which specialist owns which file — retries become "fix
    # what broke" not "re-do everything".
    resume_on_retry: true
    # Single-node dispatch: the workspace is already created by the
    # upstream `create_workspace` code node. Engineering-lead MUST reuse
    # {{worktree_path}} from state and MUST NOT call create_workspace
    # again. It groups files by specialist and dispatches via spawn_agent.
    prompt: |
      MODE: 2 (execute — fix dispatch into an existing worktree)
      SCOPE: implementation_only
      REQUIREMENT SOURCE: diagnosed_bug_fix
      DOWNSTREAM GATES: qa_handled_downstream, review_handled_downstream, pr_handled_downstream

      You are the Engineering Lead dispatching a bug fix. The workspace
      has ALREADY been created upstream — reuse it. Group the files
      listed below by specialty, spawn the right specialist(s), collect
      results. You DO NOT write code.

      BUG REPORT: {{bug_report}}
      BUG ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      FILES TO TOUCH:  {{files_to_touch}}
      AFFECTED COMPONENTS: {{affected_components}}
      SECURITY IMPLICATIONS: {{security_implications}}
      HUMAN APPROVAL FEEDBACK: {{approval_feedback}}

      EXISTING WORKSPACE (do NOT create a new one):
        worktree_path: {{worktree_path}}
        branch_name:   {{branch_name}}
        workspace_id:  {{workspace_id}}
        base_branch:   {{base_branch}}

      Step-by-step:
        1. DO NOT call create_workspace. The worktree above already
           exists — all specialists must work inside {{worktree_path}}.
        2. First produce a concrete implementation plan before spawning
           specialists. The plan must include:
             - acceptance_criteria[] derived from bug_report, root_cause,
               and fix_description
             - ordered plan_items[] with owner specialty, target files, and
               expected behavior change
             - test_strategy focused on unit/integration acceptance checks,
               not slow regression-suite execution
             - risk_checks for security, data, concurrency, and edge cases
        3. Group files_to_touch by specialty (backend-developer /
           frontend-developer / devops-engineer / security-specialist /
           test-writer for test-only fixes). Most bug fixes touch one
           subsystem — a single specialist is the common case. Do not spawn
           documentation-writer in this workflow; docs are not part of this
           lean bug-fix lane unless a doc file is explicitly part of the
           root-cause fix.
        4. For each specialist, spawn_agent with repo_path={{worktree_path}}
           and a prompt containing: root_cause, fix_description, the
           relevant plan_items, acceptance_criteria, specific files they
           own, security_implications, approval_feedback, and the worktree path.
        5. Wait for each spawn via wait_for_execution. On failure, retry
           that specialist ONCE with the error output as context.
        6. Self-judge the completed work against every plan item and
           acceptance criterion before returning. If any plan item or
           acceptance criterion is not implemented, retry the responsible
           specialist once or set any_failures=true with exact details.
        7. Emit the MODE 2 JSON output block with implementation_plan_json,
           acceptance_criteria, plan_completion_checklist, self_judge_verdict,
           specialists_used, files_changed, any_failures, failure_details.
           any_failures MUST be a JSON boolean, not a string. Do NOT re-emit
           worktree_path / branch_name / workspace_id — the upstream
           create_workspace node already put those in state; downstream
           nodes read them directly from there.

      HARD RULES:
        - NEVER edit files yourself. Use spawn_agent for every change.
        - ALWAYS pass repo_path={{worktree_path}} to every spawn_agent call.
        - NEVER call create_workspace — the workspace is already provisioned.
        - Do not create PRD/HLD/LLD for this node. This is a diagnosed bug
          workflow; bug_report + root_cause + fix_description + files_to_touch
          are the binding source of truth.

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      implementation_plan_json: "Structured fix plan with acceptance_criteria, plan_items, test_strategy, and risk_checks."
      acceptance_criteria: "Concrete acceptance criteria derived from the bug report and root cause."
      plan_completion_checklist: "Per-plan-item implementation status and evidence."
      self_judge_verdict: "pass | fail — engineering-lead's self-check that all plan items and acceptance criteria were implemented."
      files_changed: "List of files changed by the fix."
      any_failures: "Boolean — true if any specialist returned a non-recoverable failure."
      failure_details: "Structured details per failing specialist. Empty on success."

  qa:
    agent: qa-lead
    resume_on_retry: true
    retries: 1
    prompt: |
      You are the QA orchestrator. Drive the ENTIRE quality loop in one
      call: spawn test-writer to write targeted unit/integration tests for
      the acceptance criteria, run build + lint + relevant unit/integration
      tests, loop until green or fail. Do NOT run the slow regression suite
      for this workflow.

      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      IMPLEMENTATION PLAN: {{implementation_plan_json}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      DEVELOPER SELF-JUDGE: {{self_judge_verdict}}
      PLAN COMPLETION CHECKLIST: {{plan_completion_checklist}}
      FILES CHANGED: {{files_changed}}
      WORKTREE PATH: {{worktree_path}}
      TEST POLICY: unit_and_integration_acceptance_only

      Follow your five-rule contract:
        1. Spawn test-writer with the bug context, implementation plan,
           files changed, and acceptance_criteria. Ask it to write or
           update targeted unit/integration tests that prove every
           acceptance criterion.
        2. Run build + lint + relevant unit tests and integration tests
           inside {{worktree_path}}. Do not run slow regression packs,
           slow e2e packs, or tests tagged slow/regression.
        3. Verify acceptance coverage: every acceptance criterion must map
           to at least one passing unit or integration test, or an explicit
           no-test-setup explanation when the repo has no test framework.
        4. Loop until green (max 3 cycles).
        5. Emit your structured JSON verdict.

      ALWAYS pass repo_path={{worktree_path}} to every spawn_agent call.

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      qa_verdict: "pass | fail | escalate"
      build: "pass | fail"
      lint: "pass | fail"
      unit_tests: "pass | fail"
      integration_tests: "pass | fail | skipped-no-infra"
      regression_tests: "skipped-by-policy"
      test_files: "List of unit/integration test files produced or updated."
      verification_test_files: "List of targeted unit/integration tests used to prove acceptance criteria."
      verification_test_summary: "One paragraph describing what the acceptance tests assert."
      covered_acceptance_criteria: "Acceptance criteria covered by passing unit/integration tests."
      uncovered_acceptance_criteria: "Acceptance criteria not covered by passing unit/integration tests."
      cycles_used: "Number of write-run-verify cycles."
      failure_target: "engineering-lead | test-writer | null"
      failure_details: "Details when verdict is fail or escalate."

  implementation_validator:
    agent: implementation-validator
    resume_on_retry: true
    retries: 1
    prompt: |
      Validate that the final bug-fix diff fully satisfies the actual bug
      report and the diagnosed root cause. Treat the BUG REPORT + ROOT CAUSE
      + FIX DESCRIPTION as the source-of-truth requirement for this bug run.

      WORKTREE PATH: {{worktree_path}}
      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      IMPLEMENTATION PLAN: {{implementation_plan_json}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      DEVELOPER SELF-JUDGE: {{self_judge_verdict}}
      PLAN COMPLETION CHECKLIST: {{plan_completion_checklist}}
      FILES CHANGED: {{files_changed}}
      ACCEPTANCE TESTS: {{verification_test_files}} — {{verification_test_summary}}
      COVERED ACCEPTANCE CRITERIA: {{covered_acceptance_criteria}}
      UNCOVERED ACCEPTANCE CRITERIA: {{uncovered_acceptance_criteria}}
      QA VERDICT: {{qa_verdict}}

      Run your blocking-checks against the current diff in the worktree:
        - the diff fixes the diagnosed root cause, not only the visible symptom
        - every implementation plan item is reflected in the diff or marked
          unnecessary with evidence
        - every acceptance criterion is covered by a passing unit or
          integration test, or has a valid no-test-framework explanation
        - the changed files are the minimal files needed for that root cause
        - no unrelated scope creep was introduced
        - security-sensitive paths have explicit handling if the bug touches
          auth, authorization, secrets, crypto, user input, or data exposure

      End with your normal structured JSON block. Use:
        prd_satisfied=true only if the bug report and root cause are fully
        satisfied by the diff and unit/integration acceptance tests.
        blocking_violations for anything that could leave the root cause
        unfixed or partially fixed.

      {{#if retry_context}}
      RETRY FEEDBACK from a previous validator loop:
      {{retry_context}}
      {{/if}}
    outputs:
      prd_satisfied: "Boolean — true only when the bug report/root cause is fully fixed."
      blocking_violations: "Array of blocking violations that leave the bug partially or incorrectly fixed."
      informational_deviations: "Non-blocking notes about implementation drift or minor cleanup opportunities."
      confidence: "Float 0-1."

  code_review:
    agent: code-reviewer
    resume_on_retry: true
    retries: 1
    prompt: |
      Review the bug fix diff in the worktree.

      WORKTREE PATH: {{worktree_path}}
      BRANCH: {{branch_name}}
      FILES CHANGED: {{files_changed}}
      BUG REPORT: {{bug_report}}
      BUG ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      IMPLEMENTATION PLAN: {{implementation_plan_json}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      ACCEPTANCE TESTS: {{verification_test_files}} — {{verification_test_summary}}
      VALIDATOR VERDICT: prd_satisfied={{prd_satisfied}}
      VALIDATOR BLOCKERS: {{blocking_violations}}

      Run your full 15-point rubric including security checklist. Focus on:
        - Does the fix actually address the root cause (not just the symptom)?
        - Does the diff implement the plan without unrelated scope creep?
        - Are the unit/integration acceptance tests meaningful?
        - Does the fix introduce any security regression?
        - Does the fix introduce any new deviation from the repo's conventions?

      End with a JSON block: review_verdict, review_feedback,
      security_findings, doc_drift_findings.

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      review_verdict: "APPROVED or REQUEST_CHANGES"
      review_feedback: "Markdown review notes."
      security_findings: "Array of security issues."
      doc_drift_findings: "Array of doc drift notes. Empty when no docs changed."

  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a pull request for this bug fix run.

      WORKFLOW TYPE: bug
      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME: {{branch_name}}

      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      IMPLEMENTATION PLAN: {{implementation_plan_json}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      ACCEPTANCE TESTS: {{verification_test_files}} — {{verification_test_summary}}
      VALIDATOR VERDICT: prd_satisfied={{prd_satisfied}}
      VALIDATOR BLOCKERS: {{blocking_violations}}

      CODE REVIEW SUMMARY: {{review_feedback}}
      SECURITY FINDINGS: {{security_findings}}
      FILES CHANGED: {{files_changed}}

      Follow your PR-creation contract: stage, commit with `fix: ...`
      message, push, gh pr create, handle errors at each step, and
      return structured JSON. Include bug report, root cause, fix
      description, acceptance criteria, unit/integration test evidence,
      security findings, and
      verification steps in the PR body.
    outputs:
      pr_url: "The created (or reused) PR URL, or null on failure."
      commit_hash: "Git SHA of the commit pushed."
      status: "created | reused_existing | failed"
      error: "Error message when status is failed."

  # Unified escalation review — qa escalate and any retry exhaustion
  # route here instead of silently ending. User picks retry / override
  # / abandon.
  escalation_review:
    type: human
    fields:
      - name: decision
        label: "What should happen?"
        type: select
        options: [retry_with_feedback, override_and_continue, abandon]
        required: true
      - name: feedback
        label: "Feedback or reason"
        type: textarea
        required: true
    outputs:
      decision: "retry_with_feedback | override_and_continue | abandon"
      feedback: "Free-text feedback passed to the agent on retry"
    prompt: |
      🔴 The bug-fix workflow paused because an agent gave up or its
      retry budget was exhausted.

      BUG REPORT:     {{bug_report}}
      ROOT CAUSE:     {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}

      QA VERDICT:        {{qa_verdict}}
      QA failure details: {{failure_details}}
      VALIDATOR:         prd_satisfied={{prd_satisfied}}
      VALIDATOR BLOCKERS: {{blocking_violations}}
      CODE REVIEW:       {{review_verdict}}
      CODE REVIEW NOTES: {{review_feedback}}
      PR STATUS:         {{status}}
      PR ERROR:          {{error}}

      Your decision:
        retry_with_feedback  — loop back to `implement` with your feedback.
                               If PR creation failed, retry PR creation.
        override_and_continue — continue past the failing stage only when
                               you accept the risk (qa → validator,
                               validator → code_review, code_review → PR,
                               PR failure → final partial summary).
        abandon              — end the run; artifacts so far are preserved.

  summary:
    agent: documentation-writer
    resume_on_retry: true
    prompt: |
      MODE: summary

      Produce the final implementation summary for this bug fix run.

      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      PR URL: {{pr_url}}
      PR STATUS: {{status}}
      PR ERROR: {{error}}
      BRANCH: {{branch_name}}
      WORKTREE PATH: {{worktree_path}}
      FILES CHANGED: {{files_changed}}
      IMPLEMENTATION PLAN: {{implementation_plan_json}}
      ACCEPTANCE CRITERIA: {{acceptance_criteria}}
      ACCEPTANCE TESTS: {{verification_test_files}}
      TEST SUMMARY: {{verification_test_summary}}
      VALIDATOR VERDICT: prd_satisfied={{prd_satisfied}}
      VALIDATOR BLOCKERS: {{blocking_violations}}
      CODE REVIEW: {{review_feedback}}
      SECURITY FINDINGS: {{security_findings}}

      Follow your Mode 2 BUG contract: one-line bug, root cause, fix
      file-by-file, implementation plan completion, acceptance criteria,
      unit/integration test evidence, security notes, how to verify manually.

      End with a JSON block per your Mode 2 output contract.
    outputs:
      summary_markdown: "Full summary as markdown."
      summary_url: "Public .md URL."
      workflow_verdict: "success or partial_success_with_manual_review"

edges:
  # Forward paths start by provisioning the worktree exactly once. Retry
  # edges loop back directly to `implement` (see below) and reuse the
  # existing worktree.
  - { from: START, to: create_workspace }
  - { from: create_workspace, to: investigate }
  - { from: investigate, to: implementation_approval_human }
  - { from: implementation_approval_human, to: implement, condition: "approval_decision == 'approve'" }
  - { from: implementation_approval_human, to: investigate, condition: "approval_decision == 'request_changes'", max_retries: 2, retry_context: "Human requested investigation changes before implementation:\n{{approval_feedback}}" }
  - { from: implementation_approval_human, to: END, condition: "approval_decision == 'cancel'" }
  - { from: implementation_approval_human, to: escalation_review, condition: "approval_decision == 'request_changes' AND __retry_exhausted_from == 'implementation_approval_human'" }
  - { from: implement, to: qa, condition: "any_failures == false" }
  - { from: implement, to: escalation_review, condition: "any_failures == true" }
  - { from: qa, to: implementation_validator, condition: "qa_verdict == 'pass'" }
  - { from: qa, to: implement, condition: "qa_verdict == 'fail'", max_retries: 2, retry_context: "QA failed — build/lint/tests broken:\n{{failure_details}}" }
  - { from: qa, to: escalation_review, condition: "qa_verdict == 'escalate'" }
  # Retry-exhaustion fallbacks (guarded by __retry_exhausted_from so they
  # only fire AFTER the retry edge's budget is spent — see engine.ts).
  - { from: qa,          to: escalation_review, condition: "qa_verdict == 'fail' AND __retry_exhausted_from == 'qa'" }
  - { from: implementation_validator, to: escalation_review, condition: "prd_satisfied != true AND __retry_exhausted_from == 'implementation_validator'" }
  - { from: code_review, to: escalation_review, condition: "review_verdict == 'REQUEST_CHANGES' AND __retry_exhausted_from == 'code_review'" }
  - { from: implementation_validator, to: code_review, condition: "prd_satisfied == true" }
  - { from: implementation_validator, to: implement, condition: "prd_satisfied != true", max_retries: 2, retry_context: "Validator found root-cause/blocking violations:\n{{blocking_violations}}" }
  - { from: code_review, to: open_pr, condition: "review_verdict == 'APPROVED'" }
  - { from: code_review, to: implement, condition: "review_verdict == 'REQUEST_CHANGES'", max_retries: 2, retry_context: "Review feedback:\n{{review_feedback}}" }
  - { from: open_pr, to: summary, condition: "status == 'created' OR status == 'reused_existing'" }
  - { from: open_pr, to: escalation_review, condition: "status == 'failed'" }
  - { from: summary, to: END }

  # escalation_review outgoing
  - { from: escalation_review, to: END,         condition: "decision == 'abandon'" }
  - { from: escalation_review, to: investigate, condition: "decision == 'retry_with_feedback' AND __retry_exhausted_from == 'implementation_approval_human'", retry_context: "Human intervened on pre-implementation approval feedback:\n{{feedback}}" }
  - { from: escalation_review, to: implement,   condition: "decision == 'retry_with_feedback' AND (any_failures == true OR qa_verdict == 'escalate' OR qa_verdict == 'fail' OR __retry_exhausted_from == 'implementation_validator' OR review_verdict == 'REQUEST_CHANGES')", retry_context: "Human intervened on bug-fix failure. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: open_pr,     condition: "decision == 'retry_with_feedback' AND status == 'failed'", retry_context: "Human intervened on PR creation failure. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: implementation_validator, condition: "decision == 'override_and_continue' AND (qa_verdict == 'escalate' OR qa_verdict == 'fail')" }
  - { from: escalation_review, to: code_review, condition: "decision == 'override_and_continue' AND __retry_exhausted_from == 'implementation_validator'" }
  - { from: escalation_review, to: open_pr,     condition: "decision == 'override_and_continue' AND review_verdict == 'REQUEST_CHANGES'" }
  - { from: escalation_review, to: summary,     condition: "decision == 'override_and_continue' AND status == 'failed'" }
