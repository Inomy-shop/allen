name: bug-investigate-and-fix
description: >
  Lean bug fix workflow: investigate the root cause, distinguish from
  feature-in-disguise, create a worktree, dispatch the fix via the engineering-lead
  orchestrator, write a regression test, run the full suite (no skip flag —
  bug fixes are regression-risk), update tech docs, security-aware code
  review, open a PR, post a summary.

  Human touches per run (steady state): 1-2 total —
    1. Initial bug report
    2. PR merge on GitHub (external)

  Escalation touches when investigate flags feature-in-disguise, when QA
  can't triage a failure, or when reproduction isn't inferrable.

version: 1

context:
  requires: [repo]
  tools: [filesystem, git, terminal]
  concurrency: 3

input:
  bug_report:
    type: string
    required: true
    widget: textarea
    label: Bug report
    description: Describe the bug — symptoms, repro steps, error messages, stack traces if you have them. The investigator uses this to reproduce the issue and trace to the root cause.
    placeholder: "e.g. Clicking the Delete button on an empty workflow crashes the UI with 'Cannot read property id of undefined'. Reproduced on Chrome 120 and Firefox 125. Happens on workflows with no nodes."
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Target repo
    description: The registered repo where the bug lives.
  related_pr:
    type: string
    required: false
    widget: text
    label: Related PR (optional)
    description: URL of a PR you suspect introduced the bug. Handed to the investigator as a context hint — it doesn't have to use it.
    placeholder: "https://github.com/org/repo/pull/123"
  chat_session_id:
    type: string
    required: false
    widget: text
    description: Originating chat session ID (auto-populated from chat — leave blank when running from this form).
  started_by_user_id:
    type: string
    required: false
    widget: text
    description: User ID who started the run (for Slack DM routing of interventions).

nodes:
  investigate:
    agent: bug-investigator
    resume_on_retry: true
    prompt: |
      Investigate this bug and find the root cause.

      BUG REPORT: {{bug_report}}
      REPO PATH: {{repo_path}}
      {{#if related_pr}}
      RELATED PR: {{related_pr}}
      {{/if}}

      Follow your four-rule contract:
        1. Reproduce first — run the reported steps in a terminal.
        2. Walk the call stack — don't guess.
        3. Distinguish bug from feature-in-disguise — set
           looks_like_a_feature=true if the root cause is "the code was
           never specified to handle this case."
        4. Identify minimal fix scope — no while-we're-here cleanup.

      End with a JSON block: root_cause, files_to_touch[], confidence,
      scope, fix_description, looks_like_a_feature, reproduction_steps,
      affected_components, security_implications.
    outputs:
      investigate_output: "The investigator's full JSON output."
      files_to_touch: "Files the fix needs to touch."
      looks_like_a_feature: "Boolean — if true, workflow pauses for user decision."
      root_cause: "One-paragraph root cause."
      fix_description: "One-paragraph fix description."

  feature_escalation_human:
    type: human
    fields:
      - name: decision
        label: "This looks like a feature, not a bug. What do you want to do?"
        type: select
        options: [continue_as_bug, start_feature_workflow, cancel]
        required: true
    outputs:
      decision: "continue_as_bug | start_feature_workflow | cancel"
    prompt: |
      ⚠ The bug-investigator determined this is actually a feature request,
      not a bug fix. The code is behaving as specified — but the
      specification doesn't cover this case.

      Original bug report:
      {{bug_report}}

      Root cause:
      {{root_cause}}

      Proposed fix (as a bug):
      {{fix_description}}

      Options:
        continue_as_bug        → proceed anyway with the minimal fix
        start_feature_workflow → cancel this run, open a new
                                 feature-plan-and-implement workflow for
                                 proper design review
        cancel                 → abandon the workflow

  implement:
    agent: engineering-lead
    # Resume across retries (qa-fail, code-review-fail) so engineering-lead
    # remembers the workspace it created and which specialist owns which
    # file — retries become "fix what broke" not "re-create everything".
    resume_on_retry: true
    # Single-node execution: engineering-lead creates the fix workspace
    # via create_workspace, groups files by specialist, and dispatches
    # through spawn_agent. Replaces the previous create_branch (code) +
    # develop (deprecated `developer` agent) pipeline.
    prompt: |
      MODE: 2 (execute — fix dispatch with workspace creation)

      You are the Engineering Lead dispatching a bug fix. Create a
      workspace, group the files listed below by specialty, spawn the
      right specialist(s), collect results. You DO NOT write code.

      BUG ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      FILES TO TOUCH:  {{files_to_touch}}
      REPO PATH:       {{repo_path}}

      Step-by-step:
        1. Call create_workspace(repo_path="{{repo_path}}", branch_prefix="fix",
           task_summary="{{root_cause}}") ONCE. Capture the worktree_path.
        2. Group files_to_touch by specialty (backend-developer /
           frontend-developer / devops-engineer / security-specialist /
           documentation-writer). Most bug fixes touch one subsystem — a
           single specialist is the common case.
        3. For each specialist, spawn_agent with repo_path=<worktree_path>
           and a prompt containing: root_cause, fix_description, the
           specific files they own, and the worktree path.
        4. Wait for each spawn via wait_for_execution. On failure, retry
           that specialist ONCE with the error output as context.
        5. Emit the MODE 2 JSON output block with worktree_path, branch_name,
           specialists_used, files_changed, any_failures, failure_details.

      HARD RULES:
        - NEVER edit files yourself. Use spawn_agent for every change.
        - ALWAYS pass repo_path=<worktree_path> to every spawn_agent call.
        - NEVER skip create_workspace — a fix must not touch the
          registered repo directly.
    outputs:
      worktree_path: "Absolute path to the isolated git worktree the fix specialist(s) worked inside."
      branch_name: "Fix branch name."
      workspace_id: "Internal Allen workspace identifier."
      files_changed: "List of files changed by the fix."
      any_failures: "Boolean — true if any specialist returned a non-recoverable failure."
      failure_details: "Structured details per failing specialist. Empty on success."

  qa:
    agent: qa-lead
    resume_on_retry: true
    retries: 1
    prompt: |
      You are the QA orchestrator. Drive the ENTIRE quality loop in one
      call: spawn test-writer to write a regression test that would fail
      without the fix, run build + lint + all tests, loop until green
      or fail. Bug workflow ALWAYS runs the full regression suite — no
      skip flag.

      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      FILES CHANGED: {{files_changed}}
      WORKTREE PATH: {{worktree_path}}
      SKIP REGRESSION: false

      Follow your five-rule contract:
        1. Spawn test-writer with the bug context. Ask it to write a
           regression test that would fail without the fix. Tag it
           @unit or @integration — NOT @regression (that's for slow
           pre-existing tests, and this new one must always run).
        2. Run build + lint + full test suite inside {{worktree_path}}.
        3. Verify the regression test actually catches the bug — if
           the test passes WITHOUT the fix applied, test-writer wrote
           a non-regression test and must rewrite.
        4. Loop until green (max 3 cycles).
        5. Emit your structured JSON verdict.

      ALWAYS pass repo_path={{worktree_path}} to every spawn_agent call.

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      qa_verdict: "pass | fail | escalate"
      test_files: "List of test files produced."
      regression_test_file: "Path to the new regression test file."
      regression_test_summary: "One paragraph describing what the test asserts."
      cycles_used: "Number of write-run-verify cycles."
      failure_target: "engineering-lead | test-writer | null"
      failure_details: "Details when verdict is fail or escalate."

  update_docs:
    agent: documentation-writer
    resume_on_retry: true
    prompt: |
      MODE: update_docs

      Update the in-repo technical documentation to reflect the bug fix.
      For most bug fixes this is a small update — a behaviour note, a
      corrected example, or nothing if the docs don't describe the
      affected module.

      WORKTREE PATH: {{worktree_path}}
      FILES CHANGED: {{files_changed}}
      BUG ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}

      Follow your 7-rule contract. Graceful no-op if there are no docs
      to update.
    outputs:
      docs_updated: "Boolean."
      doc_files: "Files updated."

  code_review:
    agent: code-reviewer
    resume_on_retry: true
    retries: 1
    prompt: |
      Review the bug fix diff in the worktree, INCLUDING doc changes.

      WORKTREE PATH: {{worktree_path}}
      BRANCH: {{branch_name}}
      FILES CHANGED: {{files_changed}}
      BUG ROOT CAUSE: {{root_cause}}

      Run your full 15-point rubric including security checklist. Focus on:
        - Does the fix actually address the root cause (not just the symptom)?
        - Is the regression test meaningful?
        - Does the fix introduce any security regression?
        - Does the fix introduce any new deviation from the repo's conventions?

      End with a JSON block: review_verdict, review_feedback,
      security_findings, doc_drift_findings.

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      review_verdict: "APPROVED or REQUEST_CHANGES"
      review_feedback: "Markdown review notes."
      security_findings: "Array of security issues."

  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a pull request for this bug fix run.

      WORKFLOW TYPE: bug
      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME: {{branch_name}}

      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      REGRESSION TEST: {{regression_test_file}} — {{regression_test_summary}}

      CODE REVIEW SUMMARY: {{review_feedback}}
      SECURITY FINDINGS: {{security_findings}}
      FILES CHANGED: {{files_changed}}

      Follow your PR-creation contract: stage, commit with `fix: ...`
      message, push, gh pr create, handle errors at each step, and
      return structured JSON. Include bug report, root cause, fix
      description, regression test path, security findings, and
      verification steps in the PR body.
    outputs:
      pr_url: "The created (or reused) PR URL, or null on failure."
      commit_hash: "Git SHA of the commit pushed."
      status: "created | reused_existing | failed"
      error: "Error message when status is failed."

  # Unified escalation review — qa escalate and any retry exhaustion
  # route here instead of silently ending. User picks retry / override
  # / abandon.
  escalation_review:
    type: human
    fields:
      - name: decision
        label: "What should happen?"
        type: select
        options: [retry_with_feedback, override_and_continue, abandon]
        required: true
      - name: feedback
        label: "Feedback for the agent (required for retry)"
        type: textarea
        required: false
    outputs:
      decision: "retry_with_feedback | override_and_continue | abandon"
      feedback: "Free-text feedback passed to the agent on retry"
    prompt: |
      🔴 The bug-fix workflow paused because an agent gave up or its
      retry budget was exhausted.

      BUG REPORT:     {{bug_report}}
      ROOT CAUSE:     {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}

      QA VERDICT:        {{qa_verdict}}
      QA failure details: {{failure_details}}
      CODE REVIEW:       {{review_verdict}}
      CODE REVIEW NOTES: {{review_feedback}}

      Your decision:
        retry_with_feedback  — loop back to `implement` with your feedback.
        override_and_continue — skip the failing stage (qa → update_docs
                               or code_review → open_pr).
        abandon              — end the run; artifacts so far are preserved.

  summary:
    agent: documentation-writer
    resume_on_retry: true
    prompt: |
      MODE: summary

      Produce the final implementation summary for this bug fix run.

      BUG REPORT: {{bug_report}}
      ROOT CAUSE: {{root_cause}}
      FIX DESCRIPTION: {{fix_description}}
      PR URL: {{pr_url}}
      BRANCH: {{branch_name}}
      WORKTREE PATH: {{worktree_path}}
      FILES CHANGED: {{files_changed}}
      REGRESSION TEST: {{regression_test_file}}
      CODE REVIEW: {{review_feedback}}
      SECURITY FINDINGS: {{security_findings}}

      Follow your Mode 2 BUG contract: one-line bug, root cause, fix
      file-by-file, regression test assertion, security notes, how to
      verify manually.

      End with a JSON block per your Mode 2 output contract.
    outputs:
      summary_markdown: "Full summary as markdown."
      summary_url: "Public .md URL."
      workflow_verdict: "success or partial_success_with_manual_review"

edges:
  - { from: START, to: investigate }
  - { from: investigate, to: implement, condition: "looks_like_a_feature == false" }
  - { from: investigate, to: feature_escalation_human, condition: "looks_like_a_feature == true" }
  # Honour the user's decision. Before this split, every choice
  # unconditionally advanced to `implement`, so `start_feature_workflow`
  # and `cancel` silently behaved like `continue_as_bug`.
  - { from: feature_escalation_human, to: implement, condition: "decision == 'continue_as_bug'" }
  - { from: feature_escalation_human, to: END,       condition: "decision == 'start_feature_workflow'" }
  - { from: feature_escalation_human, to: END,       condition: "decision == 'cancel'" }
  - { from: implement, to: qa }
  - { from: qa, to: update_docs, condition: "qa_verdict == 'pass'" }
  - { from: qa, to: implement, condition: "qa_verdict == 'fail'", max_retries: 2, retry_context: "QA failed — build/lint/tests broken:\n{{failure_details}}" }
  - { from: qa, to: escalation_review, condition: "qa_verdict == 'escalate'" }
  # Retry-exhaustion fallbacks (guarded by __retry_exhausted_from so they
  # only fire AFTER the retry edge's budget is spent — see engine.ts).
  - { from: qa,          to: escalation_review, condition: "qa_verdict == 'fail' AND __retry_exhausted_from == 'qa'" }
  - { from: code_review, to: escalation_review, condition: "review_verdict == 'REQUEST_CHANGES' AND __retry_exhausted_from == 'code_review'" }
  - { from: update_docs, to: code_review }
  - { from: code_review, to: open_pr, condition: "review_verdict == 'APPROVED'" }
  - { from: code_review, to: implement, condition: "review_verdict == 'REQUEST_CHANGES'", max_retries: 2, retry_context: "Review feedback:\n{{review_feedback}}" }
  - { from: open_pr, to: summary }
  - { from: summary, to: END }

  # escalation_review outgoing
  - { from: escalation_review, to: END,         condition: "decision == 'abandon'" }
  - { from: escalation_review, to: implement,   condition: "decision == 'retry_with_feedback'", retry_context: "Human intervened on bug-fix failure. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: update_docs, condition: "decision == 'override_and_continue' AND (qa_verdict == 'escalate' OR qa_verdict == 'fail')" }
  - { from: escalation_review, to: open_pr,     condition: "decision == 'override_and_continue' AND review_verdict == 'REQUEST_CHANGES'" }
