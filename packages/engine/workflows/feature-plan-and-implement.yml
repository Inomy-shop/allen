name: feature-plan-and-implement
description: >
  End-to-end feature workflow with artifact-only handoff:
    1. Requirements analyst reads the raw ask, asks clarifying questions
       via human gate if the request is ambiguous, then produces the PRD.
    2. Doc-auditor audits the PRD.
    3. Technical-designer produces the TDD from the PRD artifact.
    4. Doc-auditor audits the TDD against the PRD artifact.
    5. Optional human plan-approval gate (skipped when trusted_mode=true).
    6. Code node creates an isolated git worktree.
    7. Engineering-lead dispatches specialists AND self-validates the diff
       in one node — no separate self-check.
    8. QA writes/runs tests, implementation-validator checks the diff
       against the PRD, docs are updated, security-aware code review runs,
       PR opens, and a final summary is posted to chat.

  Artifact-read convention: every artifact URL is
  http://.../api/artifacts/<id>/content. To read an artifact, use
  mcp__allen__allen_get_artifact(artifact_id=<id>) — extract <id> from the
  URL segment between /artifacts/ and /content, or use the upstream-
  artifacts index the engine auto-injects into every agent's context.
  Agents save with mcp__allen__allen_save_artifact.

  Human touches per run (steady state): 2-3 total —
    1. Clarification answers (only when produce_prd asks)
    2. Plan approval (skipped when trusted_mode=true)
    3. PR merge on GitHub (external)

  Escalations may add extra touches when agents can't self-correct.

version: 2

context:
  requires: [repo]
  tools: [filesystem, git, terminal]
  concurrency: 2

input:
  user_request:
    type: string
    required: true
    widget: textarea
    label: Feature request
    description: Describe the feature in plain English — what the user wants, why, and any constraints.
    placeholder: "e.g. Users should be able to bookmark their favorite workflows so they appear pinned at the top of the workflow list. Per-user, no cap."
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Target repo
    description: The registered repo where the feature will be implemented.
  trusted_mode:
    type: boolean
    required: false
    default: false
    widget: checkbox
    label: Trusted mode (skip plan approval gate)
    description: If enabled, skips the human plan-approval gate after TDD audit. Only enable for low-risk repetitive changes.
  skip_regression:
    type: boolean
    required: false
    default: false
    widget: checkbox
    label: Skip regression tests
    description: If enabled, regression tests are listed but not executed by QA.
  chat_session_id:
    type: string
    required: false
    widget: text
    description: Originating chat session ID (auto-populated from chat).
  started_by_user_id:
    type: string
    required: false
    widget: text
    description: User ID who started the run (for Slack DM routing of interventions).

nodes:
  # ══════════════════════════════════════════════════════════════════════
  # PHASE 1 — PLANNING (artifact-only handoff)
  # ══════════════════════════════════════════════════════════════════════

  produce_prd:
    agent: requirements-analyst
    resume_on_retry: true
    prompt: |
      You are the Product Manager. Read the raw user request and either:
        (a) ask 1-3 clarifying questions if the ask is ambiguous, OR
        (b) produce the full PRD as a markdown artifact.

      USER REQUEST: {{user_request}}
      REPO PATH:    {{repo_path}}

      Scan the repo briefly to ground your understanding before deciding —
      e.g. "this API already exists in routes/teams.ts, did you mean to
      extend it or add a new one?".

      You have up to 3 clarification rounds. Round 3 is your last chance
      to ask — after that, commit to the best interpretation and produce
      the PRD.

      ─────────────────────────────────────────────────────────────────
      PATH A — REQUEST IS UNCLEAR
      ─────────────────────────────────────────────────────────────────
      Emit 1-3 concrete, answerable questions. Do NOT save an artifact.

      ```json
      {
        "ready_to_produce_prd": false,
        "clarifying_questions": [
          "Per-user or per-workspace bookmarks?",
          "Pinned to top, or separate section?"
        ],
        "prd_artifact_url": ""
      }
      ```

      ─────────────────────────────────────────────────────────────────
      PATH B — REQUEST IS CLEAR (or round 3 forces commit)
      ─────────────────────────────────────────────────────────────────
      Produce the full PRD. It must include: user stories, acceptance
      criteria (Given/When/Then), edge cases, out-of-scope items, affected
      areas, risks, assumptions, non-functional requirements, open
      questions.

      TRACEABILITY CONTRACT:
        - Every requirement: stable id REQ-001, REQ-002, ...
        - Every acceptance criterion: stable id AC-001 referencing a REQ.
        - Every edge case: EC-001. Every NFR: NFR-001.

      Save the FULL PRD as a markdown artifact:
        mcp__allen__allen_save_artifact("prd/requirements.md", <markdown>, content_type="markdown", overwrite=true)
      Copy the returned `publicUrl` into the JSON below as `prd_artifact_url`.

      Keep PRD body INSIDE the artifact. JSON carries only the URL + bool.

      ```json
      {
        "ready_to_produce_prd": true,
        "clarifying_questions": [],
        "prd_artifact_url": "<publicUrl from allen_save_artifact>"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK (from clarification answers OR PRD-audit revise):
      {{retry_context}}
      {{/if}}
    outputs:
      ready_to_produce_prd: "Boolean — true when PRD artifact saved; false when clarifying_questions are returned."
      clarifying_questions: "Array of clarifying questions. Empty when ready_to_produce_prd=true."
      prd_artifact_url: "Public URL of the PRD markdown artifact. Empty string when ready_to_produce_prd=false."

  clarify_human:
    type: human
    fields:
      - name: answers
        label: "Answers to clarifying questions"
        type: textarea
        required: true
    prompt: |
      The product manager needs clarification before producing the PRD.

      Original request: {{user_request}}

      Questions to answer:
      {{clarifying_questions}}

      Please answer each question in order. The PM will incorporate your
      answers and either ask follow-ups or produce the PRD.

  audit_prd:
    agent: doc-auditor
    resume_on_retry: true
    prompt: |
      Audit the PRD against the user's original request for intent fidelity.

      ORIGINAL USER REQUEST: {{user_request}}

      📄 PRD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{prd_artifact_url}}

      Judge: does this PRD answer what the user asked for? Are stories,
      acceptance criteria, and edge cases covered? Flag intent drift only —
      technical correctness is the validator's job later.

      End with a fenced JSON block:
      ```json
      {
        "prd_audit_verdict": "approve | revise | escalate",
        "prd_audit_rationale": "one paragraph"
      }
      ```
    outputs:
      prd_audit_verdict: "approve | revise | escalate"
      prd_audit_rationale: "One-paragraph rationale; used in retry_context + escalation display."

  produce_tdd:
    agent: technical-designer
    resume_on_retry: true
    prompt: |
      Produce the Technical Design Document (TDD) from the approved PRD.

      📄 PRD ARTIFACT (fetch via mcp__allen__allen_get_artifact — primary input):
      {{prd_artifact_url}}

      ORIGINAL USER REQUEST: {{user_request}}
      REPO PATH:             {{repo_path}}

      EXISTING CODEBASE AWARENESS (MANDATORY):
        1. Read package.json / go.mod / Cargo.toml / requirements.txt to
           learn the tech stack already in use.
        2. Scan the directory structure to understand existing patterns
           (route/controller/service split, model locations, conventions).
        3. Look at 2-3 features similar in scope: routing, data access,
           validation, error handling, auth, testing patterns.

      YOUR DESIGN MUST FIT THE EXISTING ARCHITECTURE unless the existing
      patterns genuinely cannot accommodate the feature (justify any
      departure with a concrete complexity comparison).

      Include: data models, API contracts, sequence diagrams, error
      taxonomy, observability plan, UI changes.

      TRACEABILITY CONTRACT:
        - Every data model, API contract, UI change, validation rule, and
          test strategy item lists the PRD ids it satisfies (REQ/AC/EC/NFR).
        - Add a coverage matrix mapping every AC id to concrete
          implementation touchpoints and intended tests.
        - Mark any AC that needs no code change as not_applicable + reason.

      Save the FULL TDD as a markdown artifact:
        mcp__allen__allen_save_artifact("tdd/technical-design.md", <markdown>, content_type="markdown", overwrite=true)
      Copy the returned `publicUrl` into JSON as `tdd_artifact_url`.

      ```json
      {
        "tdd_artifact_url": "<publicUrl from allen_save_artifact>"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK (from TDD-audit revise OR plan-gate request_changes):
      {{retry_context}}
      {{/if}}
    outputs:
      tdd_artifact_url: "Public URL of the TDD markdown artifact. Downstream nodes fetch via mcp__allen__allen_get_artifact."

  audit_tdd:
    agent: doc-auditor
    resume_on_retry: true
    prompt: |
      Audit the TDD against the approved PRD.

      ORIGINAL USER REQUEST: {{user_request}}

      📄 PRD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{prd_artifact_url}}

      📄 TDD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{tdd_artifact_url}}

      Judge: does every API contract and data model trace to a PRD id?
      Does every endpoint satisfy at least one acceptance criterion? Are
      the models and APIs internally consistent?

      End with a fenced JSON block:
      ```json
      {
        "tdd_audit_verdict": "approve | revise | escalate",
        "tdd_audit_rationale": "one paragraph"
      }
      ```
    outputs:
      tdd_audit_verdict: "approve | revise | escalate"
      tdd_audit_rationale: "One paragraph; used in retry_context + escalation display."

  plan_approval_gate:
    type: human
    fields:
      - name: decision
        label: "Decision"
        type: select
        options: [approve, request_changes, reject]
        required: true
      - name: scope
        label: "Scope (only for request_changes)"
        type: select
        options: [requirements, technical_design, all]
        required: false
      - name: feedback
        label: "Feedback (required for request_changes)"
        type: textarea
        required: false
    prompt: |
      ✅ PRD and TDD are produced and audited. Review and approve to start
      implementation.

      USER REQUEST: {{user_request}}

      📋 Requirements:     {{prd_artifact_url}}
      🔧 Technical Design: {{tdd_artifact_url}}

      Both passed agent audit.

      Decision:
        approve         → advance to implementation
        request_changes → loop back to the producer (pick scope)
        reject          → abandon the workflow

  # ══════════════════════════════════════════════════════════════════════
  # PHASE 2 — IMPLEMENTATION
  # ══════════════════════════════════════════════════════════════════════

  # Dedicated workspace-creation node — runs ONCE on the forward path
  # out of planning. Retries back to `implement` skip this node and reuse
  # the existing worktree.
  create_workspace:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
      timeout_sec: 600
    outputs:
      workspace_id: "Internal Allen workspace identifier."
      worktree_path: "Absolute path to the isolated git worktree."
      branch: "Generated branch name."
      branch_name: "Alias of `branch` — downstream nodes read {{branch_name}}."
      base_branch: "Branch the worktree was cut from."
      status: "Workspace setup status."
      repo_path: "Alias of worktree_path — overwrites input repo_path so downstream agents operate inside the worktree."

  implement:
    agent: engineering-lead
    resume_on_retry: true
    prompt: |
      SCOPE: implementation_only
      qa_handled_downstream: true
      review_handled_downstream: true
      docs_handled_downstream: true

      You are the Engineering Lead. Translate the approved design into a
      file-level plan, dispatch specialists, and self-validate the diff.
      You DO NOT write code yourself.

      📄 PRD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{prd_artifact_url}}

      📄 TDD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{tdd_artifact_url}}

      USER REQUEST: {{user_request}}

      EXISTING WORKSPACE (do NOT create a new one):
        worktree_path: {{worktree_path}}
        branch_name:   {{branch_name}}

      Step-by-step:
        1. Fetch the PRD and TDD artifacts.
        2. Spawn codebase-navigator (READ-ONLY) with repo_path={{worktree_path}}
           to identify existing patterns, dependency order, validation commands.
           The navigator MUST NOT edit files, commit, push, or run formatters
           that write. Code changes come from backend-developer,
           frontend-developer, devops-engineer, or security-specialist only.
        3. Build the implementation plan with file-level items, specialist
           assignments, AC coverage matrix, conflict plan, validation commands.
        4. For each specialist group, spawn_agent with repo_path={{worktree_path}}.
           Parallelise safe batches; serialise file conflicts.
        5. Wait on each batch, retry each specialist once on failure.
        6. SELF-VALIDATE before returning:
           a. `git diff --name-only` to confirm planned files were touched.
           b. For each PRD acceptance criterion, verify at least one plan
              item has implementation evidence in the diff (or is marked
              not_applicable with reason).
           c. Confirm codebase-navigator did not write files.
           d. Enumerate the build/lint/typecheck commands QA must run.

      Save the FULL plan + self-validation as a markdown artifact:
        mcp__allen__allen_save_artifact("implementation/plan.md", <markdown>, content_type="markdown", overwrite=true)
      The artifact must contain: implementation_plan, ac_coverage_matrix,
      specialist_assignments, conflict_plan, validation_commands, and a
      "## Self-validation" section with per-AC verdict, unassigned items,
      specialist failures, and navigator findings.

      Copy the returned `publicUrl` into JSON as `implementation_plan_artifact_url`.

      Verdict:
        pass     → every planned file touched, every AC has evidence (or
                   not_applicable+reason), no specialist failures, no
                   navigator writes. QA can start.
        fail     → some planned work missing or specialists failed; the
                   issues are recoverable on retry. Workflow loops you back.
        escalate → unrecoverable: contradiction between PRD/TDD and worktree,
                   missing repo infrastructure, etc.

      ```json
      {
        "implementation_plan_artifact_url": "<publicUrl from allen_save_artifact>",
        "implement_verdict": "pass | fail | escalate",
        "implement_failure_details": "short string (only when fail/escalate; empty on pass)"
      }
      ```

      HARD RULES:
        - NEVER edit files yourself. Use spawn_agent for every change.
        - ALWAYS pass repo_path={{worktree_path}} to every spawn_agent call.
        - NEVER call create_workspace — the workspace is already provisioned.
        - NEVER run QA, code review, security review, docs update, PR
          creation, or summary from this node.

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      implementation_plan_artifact_url: "Public URL of the implementation plan + self-validation markdown artifact."
      implement_verdict: "pass | fail | escalate — drives downstream routing."
      implement_failure_details: "Short failure description (only when verdict is fail or escalate). Used in implement self-retry retry_context."

  qa:
    agent: qa-lead
    resume_on_retry: true
    retries: 1
    prompt: |
      You are the QA orchestrator. Drive the ENTIRE quality loop in one
      call: spawn test-writer, run tests, check coverage, fix or delegate
      back on failure, repeat until green. Return only when verdict is
      pass, fail (delegate back to engineering-lead), or escalate.

      📄 PRD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{prd_artifact_url}}

      📄 TDD ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{tdd_artifact_url}}

      📄 IMPLEMENTATION PLAN ARTIFACT (fetch via mcp__allen__allen_get_artifact):
      {{default implementation_plan_artifact_url "(implement node escalated before saving plan — work from the worktree diff directly; build the test plan from PRD acceptance criteria alone)"}}

      WORKTREE PATH:    {{worktree_path}}
      SKIP REGRESSION:  {{skip_regression}}

      Follow your five-rule contract:
        1. Fetch the artifacts, spawn test-writer with the PRD's ACs.
        2. Run build + lint + tests inside {{worktree_path}}.
        3. Verify coverage against the PRD's acceptance criteria.
        4. Loop until green (max 3 write-run-verify cycles).
        5. Save the full QA report as a markdown artifact, emit verdict.

      Save the full QA report:
        mcp__allen__allen_save_artifact("qa/report.md", <markdown>, content_type="markdown", overwrite=true)
      The artifact must hold: build/lint/unit/integration verdicts, test
      files, coverage matrix, failure details, cycles used.
      Copy `publicUrl` into JSON as `qa_artifact_url`.

      ALWAYS pass repo_path={{worktree_path}} to every spawn_agent call.

      ```json
      {
        "qa_verdict": "pass | fail | escalate",
        "qa_artifact_url": "<publicUrl from allen_save_artifact>",
        "qa_failure_details": "short string when verdict is fail or escalate (empty on pass)"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      qa_verdict: "pass | fail | escalate"
      qa_artifact_url: "Public URL of the full QA report markdown."
      qa_failure_details: "Short failure description; used in qa→implement retry_context."

  implementation_validator:
    agent: implementation-validator
    resume_on_retry: true
    retries: 1
    prompt: |
      Validate the final implementation against the approved PRD.

      REMEMBER: PRD is the source of truth. TDD deviations are
      informational, not blocking, as long as the PRD is still satisfied.

      📄 PRD ARTIFACT:                  {{prd_artifact_url}}
      📄 TDD ARTIFACT:                  {{tdd_artifact_url}}
      📄 IMPLEMENTATION PLAN ARTIFACT:  {{default implementation_plan_artifact_url "(implement node escalated before saving plan — validate the worktree diff against PRD acceptance criteria directly)"}}
      📄 QA REPORT ARTIFACT:            {{default qa_artifact_url "(qa node escalated before saving report — no QA evidence available; rely on diff + PRD only)"}}
      (Fetch each via mcp__allen__allen_get_artifact.)

      WORKTREE PATH: {{worktree_path}}

      Run your blocking-checks + informational-checks list against the
      current diff. Check every PRD AC id, edge case id, and NFR id —
      return ALL blocking violations and informational deviations in one
      response, grouped by id.

      Save the full validator report:
        mcp__allen__allen_save_artifact("validator/report.md", <markdown>, content_type="markdown", overwrite=true)
      The artifact must hold: blocking_violations (with evidence),
      informational_deviations, per-AC verdict, validator confidence.
      Copy `publicUrl` into JSON as `validator_artifact_url`.

      ```json
      {
        "prd_satisfied": true,
        "validator_artifact_url": "<publicUrl from allen_save_artifact>"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK from prior validator loop:
      {{retry_context}}
      {{/if}}
    outputs:
      prd_satisfied: "Boolean — drives routing to update_docs (true) or back to implement (false)."
      validator_artifact_url: "Public URL of the full validator report markdown."

  update_docs:
    agent: documentation-writer
    resume_on_retry: true
    prompt: |
      MODE: update_docs

      Update the in-repo technical documentation to reflect the changes
      in the current diff.

      📄 PRD ARTIFACT: {{prd_artifact_url}}
      📄 TDD ARTIFACT: {{tdd_artifact_url}}
      (Fetch each via mcp__allen__allen_get_artifact.)

      WORKTREE PATH: {{worktree_path}}

      Follow your 7-rule contract: discover docs, match to changed modules,
      update to match reality, match existing style, no speculation,
      graceful no-op if repo has no docs, run the doc linter.

      The docs are committed to the worktree alongside the implementation
      diff. Emit a small JSON status block so the run record carries an
      explicit signal that this node executed (no downstream edge consumes it):

      ```json
      {
        "docs_updated": true
      }
      ```
    outputs:
      docs_updated: "Boolean — true when at least one doc file was changed or the repo was checked and had no docs to update. Informational only; no edge consumes this."

  code_review:
    agent: code-reviewer
    resume_on_retry: true
    retries: 1
    prompt: |
      Review the full diff in the worktree, INCLUDING doc changes from
      the upstream update_docs node.

      📄 PRD ARTIFACT:                  {{prd_artifact_url}}
      📄 TDD ARTIFACT:                  {{tdd_artifact_url}}
      📄 IMPLEMENTATION PLAN ARTIFACT:  {{implementation_plan_artifact_url}}
      📄 QA REPORT ARTIFACT:            {{qa_artifact_url}}
      📄 VALIDATOR REPORT ARTIFACT:     {{validator_artifact_url}}
      (Fetch each via mcp__allen__allen_get_artifact.)

      WORKTREE PATH: {{worktree_path}}
      BRANCH:        {{branch_name}}

      Run your full 15-point rubric: correctness, conventions, performance,
      test quality, readability, type safety, security checklist (8
      points), and doc-code drift.

      Save the full review markdown:
        mcp__allen__allen_save_artifact("review/code-review.md", <markdown>, content_type="markdown", overwrite=true)
      The artifact must hold review_feedback, security_findings, and
      doc_drift_findings. Copy `publicUrl` into JSON as `code_review_artifact_url`.

      ```json
      {
        "review_verdict": "APPROVED | REQUEST_CHANGES",
        "code_review_artifact_url": "<publicUrl from allen_save_artifact>"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      review_verdict: "APPROVED | REQUEST_CHANGES"
      code_review_artifact_url: "Public URL of the full review markdown."

  open_pr:
    agent: pr-creator
    resume_on_retry: true
    prompt: |
      Create a pull request for this feature run.

      WORKFLOW TYPE: feature
      WORKTREE PATH: {{worktree_path}}
      BRANCH NAME:   {{branch_name}}
      USER REQUEST:  {{user_request}}

      📄 ARTIFACTS (mcp__allen__allen_get_artifact any you need to populate the PR body):
        PRD:                 {{prd_artifact_url}}
        TDD:                 {{tdd_artifact_url}}
        IMPLEMENTATION PLAN: {{implementation_plan_artifact_url}}
        QA REPORT:           {{qa_artifact_url}}
        VALIDATOR REPORT:    {{validator_artifact_url}}
        CODE REVIEW:         {{code_review_artifact_url}}

      Follow your PR-creation contract: stage, commit, push, gh pr create,
      handle errors at each step. Link to the artifact URLs in the PR body.

      ```json
      {
        "pr_url": "<created or reused PR URL, or null on failure>"
      }
      ```
    outputs:
      pr_url: "The created (or reused) PR URL, or null on failure."

  summary:
    agent: documentation-writer
    resume_on_retry: true
    prompt: |
      MODE: summary

      Produce the final implementation summary for this feature workflow
      run. Post it back to the chat session AND upload as a public .md.

      USER REQUEST: {{user_request}}
      PR URL:       {{pr_url}}
      BRANCH:       {{branch_name}}
      WORKTREE:     {{worktree_path}}

      📄 ARTIFACTS (mcp__allen__allen_get_artifact when you need detail):
        PRD:                 {{prd_artifact_url}}
        TDD:                 {{tdd_artifact_url}}
        IMPLEMENTATION PLAN: {{implementation_plan_artifact_url}}
        QA REPORT:           {{qa_artifact_url}}
        VALIDATOR REPORT:    {{validator_artifact_url}}
        CODE REVIEW:         {{code_review_artifact_url}}

      Follow your Mode 2 contract: include the traceability spine (AC →
      tests → files), file-by-file rationale, minor deviations, follow-ups.

      Save the final summary:
        mcp__allen__allen_save_artifact("summary/final.md", <markdown>, content_type="markdown", overwrite=true)
      Copy `publicUrl` into JSON as `summary_artifact_url`.

      ```json
      {
        "summary_artifact_url": "<publicUrl>"
      }
      ```
    outputs:
      summary_artifact_url: "Public URL of the final summary markdown — workflow's primary deliverable to the user."

  # Unified escalation review — every agent's `escalate` verdict and every
  # retry exhaustion routes here. The human sees what escalated, gets the
  # full artifact context, and picks retry / override / abandon.
  escalation_review:
    type: human
    fields:
      - name: decision
        label: "What should happen?"
        type: select
        options: [retry_with_feedback, override_and_continue, abandon]
        required: true
      - name: feedback
        label: "Feedback for the agent (required for retry)"
        type: textarea
        required: false
    prompt: |
      🔴 The workflow paused because an agent escalated or a retry budget
      ran out. It's handing the decision to you.

      ORIGINAL REQUEST:
      {{user_request}}

      ── Status (only relevant rows are filled) ──

      EXHAUSTED FROM:  {{default __retry_exhausted_from "(direct escalate — no retry budget hit)"}}

      PRD AUDIT:        {{default prd_audit_verdict "—"}} — {{default prd_audit_rationale "(not run yet)"}}
      TDD AUDIT:        {{default tdd_audit_verdict "—"}} — {{default tdd_audit_rationale "(not run yet)"}}

      IMPLEMENT:        {{default implement_verdict "—"}} — {{default implement_failure_details "(not run yet)"}}
      QA:               {{default qa_verdict "—"}} — {{default qa_failure_details "(not run yet)"}}
      PRD SATISFIED:    {{default prd_satisfied "(not validated yet)"}}
      REVIEW:           {{default review_verdict "(not reviewed yet)"}}

      📄 Artifacts so far:
        PRD:                 {{default prd_artifact_url "(not produced yet)"}}
        TDD:                 {{default tdd_artifact_url "(not produced yet)"}}
        IMPLEMENTATION PLAN: {{default implementation_plan_artifact_url "(not produced yet)"}}
        QA REPORT:           {{default qa_artifact_url "(not run yet)"}}
        VALIDATOR REPORT:    {{default validator_artifact_url "(not run yet)"}}
        CODE REVIEW:         {{default code_review_artifact_url "(not run yet)"}}

      ── Your decision ──
        retry_with_feedback  — loop back to the failing node with your
                               feedback. Retry counters reset.
        override_and_continue — bypass the failing stage and advance to
                               the next happy-path node.
        abandon              — end the run. Artifacts preserved.

edges:
  # ──────────────────────────────────────────────────────────────────────
  # Planning phase
  # ──────────────────────────────────────────────────────────────────────
  - { from: START, to: produce_prd }
  - { from: produce_prd, to: audit_prd,     condition: "ready_to_produce_prd == true" }
  - { from: produce_prd, to: clarify_human, condition: "ready_to_produce_prd != true" }

  # The PM's session is RESUMED so it remembers the questions it asked.
  # max_retries=3 matches the prompt's 3-round budget.
  - from: clarify_human
    to: produce_prd
    max_retries: 3
    retry_context: |
      The user answered your clarifying questions:

      {{answers}}

      Decide:
        - If the request is now clear enough → emit ready_to_produce_prd=true
          with a saved PRD artifact.
        - If you still need clarification → emit new clarifying_questions
          (you have used {{__retry_attempt}} of 3 rounds).

  - { from: audit_prd, to: produce_tdd,        condition: "prd_audit_verdict == 'approve'" }
  - { from: audit_prd, to: produce_prd,        condition: "prd_audit_verdict == 'revise'", max_retries: 2, retry_context: "PRD audit feedback:\n{{prd_audit_rationale}}" }
  - { from: audit_prd, to: escalation_review,  condition: "prd_audit_verdict == 'escalate'" }

  - { from: produce_tdd, to: audit_tdd }

  - { from: audit_tdd, to: create_workspace,   condition: "tdd_audit_verdict == 'approve' AND trusted_mode == true" }
  - { from: audit_tdd, to: plan_approval_gate, condition: "tdd_audit_verdict == 'approve' AND trusted_mode != true" }
  - { from: audit_tdd, to: produce_tdd,        condition: "tdd_audit_verdict == 'revise'", max_retries: 2, retry_context: "TDD audit feedback:\n{{tdd_audit_rationale}}" }
  - { from: audit_tdd, to: escalation_review,  condition: "tdd_audit_verdict == 'escalate'" }

  - { from: plan_approval_gate, to: create_workspace, condition: "decision == 'approve'" }
  - { from: plan_approval_gate, to: END,              condition: "decision == 'reject'" }
  - { from: plan_approval_gate, to: produce_prd, condition: "decision == 'request_changes' AND scope == 'requirements'",     max_retries: 2, retry_context: "Human feedback on PRD:\n{{feedback}}" }
  - { from: plan_approval_gate, to: produce_tdd, condition: "decision == 'request_changes' AND scope == 'technical_design'", max_retries: 2, retry_context: "Human feedback on TDD:\n{{feedback}}" }
  - { from: plan_approval_gate, to: produce_prd, condition: "decision == 'request_changes' AND scope == 'all'",              max_retries: 2, retry_context: "Human feedback (full redesign):\n{{feedback}}" }

  # ──────────────────────────────────────────────────────────────────────
  # Implementation phase
  # ──────────────────────────────────────────────────────────────────────
  - { from: create_workspace, to: implement }

  - { from: implement, to: qa,                 condition: "implement_verdict == 'pass'" }
  - { from: implement, to: implement,          condition: "implement_verdict == 'fail'", max_retries: 2, retry_context: "Implement self-validation failed:\n{{implement_failure_details}}\nPlan + self-check: {{implementation_plan_artifact_url}}" }
  - { from: implement, to: escalation_review,  condition: "implement_verdict == 'escalate'" }

  - { from: qa, to: implementation_validator, condition: "qa_verdict == 'pass'" }
  - { from: qa, to: implement,                condition: "qa_verdict == 'fail'", max_retries: 2, retry_context: "QA failed. Summary:\n{{qa_failure_details}}\nFull report: {{qa_artifact_url}}" }
  - { from: qa, to: escalation_review,        condition: "qa_verdict == 'escalate'" }

  - { from: implementation_validator, to: update_docs, condition: "prd_satisfied == true" }
  - { from: implementation_validator, to: implement,   condition: "prd_satisfied != true", max_retries: 2, retry_context: "Validator blocked. See {{validator_artifact_url}}" }

  - { from: update_docs, to: code_review }

  - { from: code_review, to: open_pr,   condition: "review_verdict == 'APPROVED'" }
  - { from: code_review, to: implement, condition: "review_verdict == 'REQUEST_CHANGES'", max_retries: 2, retry_context: "Code review requested changes. See {{code_review_artifact_url}}" }

  - { from: open_pr, to: summary }
  - { from: summary, to: END }

  # ──────────────────────────────────────────────────────────────────────
  # RETRY-EXHAUSTION FALLBACKS — when a retry edge's budget is spent,
  # the engine sets state.__retry_exhausted_from to the source node name.
  # These condition-only edges fire ONLY after exhaustion so they don't
  # fan out in parallel with an active retry.
  # ──────────────────────────────────────────────────────────────────────
  - { from: clarify_human,            to: escalation_review, condition: "ready_to_produce_prd != true AND __retry_exhausted_from == 'clarify_human'" }
  - { from: audit_prd,                to: escalation_review, condition: "prd_audit_verdict == 'revise' AND __retry_exhausted_from == 'audit_prd'" }
  - { from: audit_tdd,                to: escalation_review, condition: "tdd_audit_verdict == 'revise' AND __retry_exhausted_from == 'audit_tdd'" }
  - { from: plan_approval_gate,       to: escalation_review, condition: "decision == 'request_changes' AND __retry_exhausted_from == 'plan_approval_gate'" }
  - { from: implement,                to: escalation_review, condition: "implement_verdict == 'fail' AND __retry_exhausted_from == 'implement'" }
  - { from: qa,                       to: escalation_review, condition: "qa_verdict == 'fail' AND __retry_exhausted_from == 'qa'" }
  - { from: implementation_validator, to: escalation_review, condition: "prd_satisfied != true AND __retry_exhausted_from == 'implementation_validator'" }
  - { from: code_review,              to: escalation_review, condition: "review_verdict == 'REQUEST_CHANGES' AND __retry_exhausted_from == 'code_review'" }

  # ──────────────────────────────────────────────────────────────────────
  # escalation_review outgoing
  # Conditions OR on BOTH the agent-escalate case and the retry-exhaustion
  # case so the same edge handles both failure modes per stage.
  # No max_retries — the human is the retry controller.
  # ──────────────────────────────────────────────────────────────────────
  - { from: escalation_review, to: END, condition: "decision == 'abandon'" }

  # retry_with_feedback — route back to the failing stage with feedback.
  - { from: escalation_review, to: produce_prd, condition: "decision == 'retry_with_feedback' AND __retry_exhausted_from == 'clarify_human'",        retry_context: "Human intervened on clarification exhaustion. Commit to the best interpretation and produce a PRD. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: produce_prd, condition: "decision == 'retry_with_feedback' AND (prd_audit_verdict == 'escalate' OR prd_audit_verdict == 'revise')", retry_context: "Human intervened on PRD audit failure. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: produce_tdd, condition: "decision == 'retry_with_feedback' AND (tdd_audit_verdict == 'escalate' OR tdd_audit_verdict == 'revise')", retry_context: "Human intervened on TDD audit failure. Feedback:\n{{feedback}}" }

  # Plan-approval exhaustion retry — route back to the producer for the
  # scope the human last picked. Guarded by exhaustion source so these
  # don't fan out with audit-driven retries.
  - { from: escalation_review, to: produce_prd, condition: "decision == 'retry_with_feedback' AND __retry_exhausted_from == 'plan_approval_gate' AND scope == 'requirements'",     retry_context: "Human intervened on plan-approval exhaustion. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: produce_tdd, condition: "decision == 'retry_with_feedback' AND __retry_exhausted_from == 'plan_approval_gate' AND scope == 'technical_design'", retry_context: "Human intervened on plan-approval exhaustion. Feedback:\n{{feedback}}" }
  - { from: escalation_review, to: produce_prd, condition: "decision == 'retry_with_feedback' AND __retry_exhausted_from == 'plan_approval_gate' AND scope == 'all'",              retry_context: "Human intervened on plan-approval exhaustion (all scope). Feedback:\n{{feedback}}" }

  # Implementation-side retries. The condition-parser maps undefined
  # identifiers to false, so `prd_satisfied != true` AND
  # `prd_satisfied == false` BOTH fan out whenever prd_satisfied has
  # never been set. Guard validator branch with the exhaustion flag.
  - { from: escalation_review, to: implement, condition: "decision == 'retry_with_feedback' AND (implement_verdict == 'escalate' OR implement_verdict == 'fail' OR qa_verdict == 'escalate' OR qa_verdict == 'fail' OR __retry_exhausted_from == 'implementation_validator' OR review_verdict == 'REQUEST_CHANGES')", retry_context: "Human intervened on implementation/qa/validation/review failure. Feedback:\n{{feedback}}" }

  # override_and_continue — advance past the failing stage. Paths that
  # reach implementation for the FIRST time go through create_workspace.
  # Paths that have already implemented skip to the next downstream node.
  - { from: escalation_review, to: produce_tdd,              condition: "decision == 'override_and_continue' AND (prd_audit_verdict == 'escalate' OR prd_audit_verdict == 'revise')" }
  - { from: escalation_review, to: create_workspace,         condition: "decision == 'override_and_continue' AND (tdd_audit_verdict == 'escalate' OR tdd_audit_verdict == 'revise') AND trusted_mode == true" }
  - { from: escalation_review, to: plan_approval_gate,       condition: "decision == 'override_and_continue' AND (tdd_audit_verdict == 'escalate' OR tdd_audit_verdict == 'revise') AND trusted_mode != true" }
  - { from: escalation_review, to: qa,                       condition: "decision == 'override_and_continue' AND (implement_verdict == 'escalate' OR implement_verdict == 'fail')" }
  - { from: escalation_review, to: implementation_validator, condition: "decision == 'override_and_continue' AND (qa_verdict == 'escalate' OR qa_verdict == 'fail')" }
  - { from: escalation_review, to: update_docs,              condition: "decision == 'override_and_continue' AND __retry_exhausted_from == 'implementation_validator'" }
  - { from: escalation_review, to: open_pr,                  condition: "decision == 'override_and_continue' AND review_verdict == 'REQUEST_CHANGES'" }
  - { from: escalation_review, to: create_workspace,         condition: "decision == 'override_and_continue' AND __retry_exhausted_from == 'plan_approval_gate'" }
  - { from: escalation_review, to: produce_prd,              condition: "decision == 'override_and_continue' AND __retry_exhausted_from == 'clarify_human'" }
