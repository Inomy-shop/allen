name: tdd-design-by-severity
description: >
  TDD-only design workflow. The user supplies the requirements (which may
  include a Linear ticket URL or a PRD doc URL); the workflow classifies
  severity and produces a Technical Design Document scaled to severity.

  Routing by severity:
    small  → simple_tdd_design → validator
             (one-pass TDD; ~2 LLM calls)
    medium → 2 TDD proposals (schema, system_design) → tdd_finalizer
             → validator
    large  → 3 TDD proposals (schema, system_design, flow) → tdd_finalizer
             (adversarial self-critique) → validator

  Shared infrastructure for every lane:
    - codebase_grounding runs FIRST and is required reading for every drafter
    - codebase_grounding produces the survey AND picks severity in one LLM
      call (with severity_classification_human fallback when severity is invalid)
    - tdd_human_clarification (engineering+security audience) fires when
      tdd_finalizer is blocked OR when the user-supplied requirement has
      gaps the finalizer needs answered
    - validator failure auto-retries up to 2 attempts back to
      tdd_finalizer (regardless of severity), passing the validator's
      blockers as retry_context. For the small lane, tdd_finalizer
      treats the simple_tdd artifact as its starting draft and revises
      it; for medium/large it revises the previously-finalized TDD.
      No human gate on validator failure until retries exhaust.
    - design_escalation_review catches retry exhaustion (validator
      retry exhausted, tdd_human_clarification exhausted) and offers
      abandon / retry_with_feedback / force_continue.

  Artifact-first: every drafter saves a full markdown artifact and emits
  only its publicUrl + small routing primitives. Finalizers fetch the
  upstream artifacts via mcp__allen__allen_get_artifact when they need
  full content — prompts stay small.

  Artifact-read convention: artifact URLs in this workflow are
  http://.../api/artifacts/<id>/content. To read an artifact, use
  mcp__allen__allen_get_artifact(artifact_id=<id>) — extract <id> from the
  URL (segment between /artifacts/ and /content), or use the
  upstream-artifacts index the engine auto-injects into every agent's
  context. Agents save with mcp__allen__allen_save_artifact.

version: 1

context:
  concurrency: 4

input:
  requirement:
    type: string
    required: true
    widget: textarea
    label: Requirement
    description: Paste the requirements. May include a Linear ticket URL or PRD doc URL — if so, agents will treat that as the source of truth alongside the literal text.
    placeholder: "e.g. https://linear.app/acme/issue/ENG-1234  OR  paste the PRD content directly."
  repo_path:
    type: string
    required: true
    widget: repo_picker
    label: Target repo
    description: Required. Codebase to ground the design in. The codebase_grounding node surveys this repo first; every drafter must fetch the survey via mcp__allen__allen_get_artifact before drafting.
  product_context:
    type: string
    required: false
    widget: textarea
    label: Product context
    description: Optional business, user, domain, and constraint context that supplements the requirement.
  size_override:
    type: string
    required: false
    widget: select
    label: Size override
    description: "Optional manual override of the triage classification. Leave as 'auto' to let triage decide."
    options: [auto, small, medium, large]

nodes:
  # ── Shared first stage: ground in the repo, classify the request ───────
  codebase_grounding:
    agent: codebase-navigator
    prompt: |
      Survey the repository at {{repo_path}} for context relevant to:

      REQUIREMENT (may contain a Linear ticket URL or PRD doc URL —
      if a URL is present, treat it as the user's PRD reference; use the
      literal text alongside any context the URL adds):
      {{requirement}}

      PRODUCT CONTEXT:
      {{product_context}}

      Produce a focused survey that downstream TDD drafters will read
      before writing any technical design. Cover:

        - Affected modules / directories most likely involved
        - Existing patterns and conventions in those modules
          (naming, layering, framework choices, test style)
        - Prior PRDs / ADRs / design docs (search docs/, design/, .adr/,
          docs/decisions/, anything markdown)
        - Recent PRs that touch the same area (titles + short summary)
        - Stack: languages, frameworks, build/test commands, runtime
        - Hard constraints visible from the code (DB schema, API contracts,
          third-party limits, feature-flag config)

      ALSO classify request severity in the SAME response — no second
      LLM call needed. Severity drives downstream lane selection:

        - small  : trivial / single-file / copy / null-check / one-line
                   bug-shaped request. No new schema, no new API, no
                   cross-subsystem concerns. Can be designed in one pass.
        - medium : single subsystem, contained blast radius. May need a
                   couple of file changes and one new endpoint/schema
                   addition. Two TDD angles cover it.
        - large  : cross-subsystem, regression risk, security/privacy
                   sensitive, data migration, third-party contract, or
                   unclear root design. Needs full 3-angle TDD with
                   adversarial self-critique.

      SIZE OVERRIDE: {{size_override}}
      If size_override is one of small/medium/large, honor it verbatim
      (set override_applied=true). Otherwise classify from the survey
      you just produced + the requirement.

      ARTIFACT + OUTPUT CONTRACT:
      Save the full survey as a markdown artifact:
        mcp__allen__allen_save_artifact("grounding/00-codebase-survey.md", <markdown>, content_type="markdown", overwrite=true)
      Copy the returned publicUrl to JSON as `codebase_grounding_artifact_url`.

      End with a fenced JSON block containing EXACTLY:

      ```json
      {
        "codebase_grounding_artifact_url": "<publicUrl>",
        "affected_modules_index": ["path/one", "path/two"],
        "repo_stack_summary": "one-line stack summary",
        "prior_design_doc_urls": ["/path/to/doc.md"],
        "severity": "small | medium | large",
        "triage_rationale": "one-paragraph explanation of the severity choice",
        "override_applied": false
      }
      ```
    outputs:
      codebase_grounding_artifact_url: "Public URL of the full codebase survey markdown. Every downstream drafter must fetch this via mcp__allen__allen_get_artifact."
      affected_modules_index: "Short array of repo paths most likely involved — surfaced to downstream drafters for grounding."
      repo_stack_summary: "One-line stack summary (e.g., 'node/express/mongo/jest')."
      prior_design_doc_urls: "Array of in-repo design doc paths found during the survey. May be empty."
      severity: "small | medium | large — drives downstream lane selection."
      triage_rationale: "One-paragraph rationale for the chosen severity (or for honoring the override)."
      override_applied: "Boolean — true if size_override was honored verbatim."

  # ── Fallback gate when codebase_grounding emits an invalid severity ────
  severity_classification_human:
    type: human
    fields:
      - name: severity
        label: "Pick a severity (triage did not emit a valid value)"
        type: select
        options: [small, medium, large]
        required: true
    outputs:
      severity: "small | medium | large — manually classified by human."
    prompt: |
      ⚠️ Triage did not return a valid severity classification.
      Pick one yourself based on the requirement and codebase survey.

      REQUIREMENT:
      {{requirement}}

      📄 CODEBASE GROUNDING:
      {{codebase_grounding_artifact_url}}

      Severity guide:
        - small  : trivial / single-file / one-pass design is enough.
        - medium : single subsystem, contained blast radius.
        - large  : cross-subsystem, regression risk, security-sensitive,
                   or needs deep architectural thought.

  # ── SMALL lane: one combined TDD pass ──────────────────────────────────
  simple_tdd_design:
    agent: technical-designer
    resume_on_retry: true
    prompt: |
      Produce a single Technical Design Document for a SMALL request in
      one pass. Skip the multi-angle proposals — this is for trivial /
      single-file / one-line-change scope.

      The user-supplied REQUIREMENT is the authoritative spec. Do NOT
      re-derive product intent or invent new acceptance criteria — your
      job is to translate the requirement into a concrete technical plan.

      REQUIREMENT (may include a Linear ticket URL or PRD doc URL):
      {{requirement}}

      PRODUCT CONTEXT:
      {{product_context}}

      📄 CODEBASE GROUNDING (REQUIRED reading — fetch first via mcp__allen__allen_get_artifact):
      {{codebase_grounding_artifact_url}}

      AFFECTED MODULES: {{affected_modules_index}}
      REPO STACK:       {{repo_stack_summary}}

      SCOPE DISCIPLINE (read before drafting anything):
        - Stick STRICTLY to what the requirement literally asks for,
          PLUS the minimum technical work strictly necessary to make
          that thing actually function in this codebase.
        - A file/schema/component is in scope if it either:
            (a) traces to a literal phrase in the requirement, OR
            (b) is a NECESSARY precondition for (a) to work
                (e.g., a read endpoint to load the data the page must
                show; empty/error states the page must render; following
                the existing auth pattern the codebase already enforces).
          If neither, it's out of scope.
        - Do NOT design adjacent features that are independently useful
          but not required by the literal request.
          Example: requirement = "page that lists all products" → do NOT
          add product detail page, search, filters, sorting, pagination,
          edit/delete actions, admin views, exports unless the
          requirement names them. DO include the read endpoint, the
          empty/error/loading states, and conformance to existing app
          patterns (auth, layout, routing) — those are necessary.
        - List the adjacent features you considered and rejected in an
          explicit "Out of scope" section so reviewers can see what was
          deliberately excluded. Do NOT list necessary supporting work
          there — that belongs in the main design.
        - If the requirement is genuinely ambiguous about whether a
          capability is included, set scope_creep_detected=true and
          recommend re-running through medium severity — do NOT silently
          expand scope.

      Produce a lightweight TDD that contains:
        - Problem statement (one line — restated from the requirement)
        - File(s) to touch with the expected change
        - Any new/changed types or DTOs
        - Any test changes
        - Risks (if any)
        - Implementation steps (numbered)
        - Out of scope: explicit list of ADJACENT features considered
          and rejected (e.g. "detail view: not requested", "search:
          not requested"). Do NOT list necessary supporting work
          (loading state, error state, auth conformance) here —
          that belongs above.

      SELF-CRITIQUE before saving:
      Re-read your draft once and ask:
        - Would an implementer need to guess anything?
        - Is the design testable against the requirement?
        - Is the scope still small (no creep into new modules/APIs)?
        - If scope has actually crept past small, set
          scope_creep_detected=true AND set severity='medium'. The
          workflow auto-routes to the medium proposal lane when this
          happens — do NOT silently expand scope inside this draft.

      ARTIFACT + OUTPUT CONTRACT:
      Save the TDD as:
        mcp__allen__allen_save_artifact("tdd/small/01-simple-tdd.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl to JSON as `simple_tdd_artifact_url`.

      End with a fenced JSON block containing EXACTLY:

      ```json
      {
        "simple_tdd_artifact_url": "<publicUrl>",
        "scope_creep_detected": false,
        "severity": "small"
      }
      ```

      Set `severity` to "medium" when scope_creep_detected is true so
      the engine re-routes; otherwise leave it as "small".
    outputs:
      simple_tdd_artifact_url: "Public URL of the small-lane TDD."
      scope_creep_detected: "Boolean — true if drafter found the scope is actually larger than small."
      severity: "Echoes 'small' for the normal path. Set to 'medium' when scope_creep_detected is true so the engine auto-upgrades to the medium proposal lane."

  # ── TDD proposal nodes ─────────────────────────────────────────────────
  tdd_proposal_data_schema:
    agent: technical-designer
    prompt: |
      Draft a TDD proposal from the STATIC DATA MODEL / SCHEMA angle.
      (Runtime data flow + UX flow live in tdd_proposal_flow — focus
      here on what the data IS, not how it moves at runtime.)

      The user-supplied REQUIREMENT is the authoritative spec. Read it
      carefully; if it contains a URL (Linear ticket, PRD doc), treat
      that URL as part of the spec.

      REQUIREMENT:
      {{requirement}}

      PRODUCT CONTEXT:
      {{product_context}}

      📄 CODEBASE GROUNDING (REQUIRED reading):
      {{codebase_grounding_artifact_url}}

      AFFECTED MODULES: {{affected_modules_index}}
      REPO STACK:       {{repo_stack_summary}}

      SCOPE DISCIPLINE:
        - Design the schema and data model the requirement requires,
          PLUS any minimally-necessary schema plumbing those requirements
          depend on (an index needed for the page to load at a reasonable
          latency IS necessary; a second index for a search feature the
          requirement does not request is NOT).
        - Do NOT add tables, columns, indexes, or pipelines that
          neither a requirement clause nor a necessary precondition
          justifies. If a column would be "nice to have for the future"
          but no requirement reads or writes it, drop it.
        - Reuse existing schema and patterns from the codebase grounding
          survey before proposing new ones. New schema must be justified
          by a specific requirement the existing schema cannot satisfy.
        - List rejected schema extensions in a "Considered and rejected"
          subsection. Do NOT list necessary plumbing there.

      Focus only on this angle (static data model — not runtime flow):
        - Tables, collections, indexes, fields, constraints, enums, DTOs
        - Field types, nullability, defaults, foreign keys
        - Migrations, backfills, validation rules, retention policies
        - State machines / status enums (the shape, not the transitions
          at runtime — those go in tdd_proposal_flow)
        - Per-requirement-clause coverage mapping (quote the literal
          requirement phrase you're satisfying)

      Save the full draft:
        mcp__allen__allen_save_artifact("tdd/drafts/02-data-schema-tdd-proposal.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl to JSON as `tdd_data_schema_artifact_url`.

      End with a fenced JSON block:

      ```json
      {
        "tdd_data_schema_artifact_url": "<publicUrl>",
        "tdd_data_schema_summary": "one-line synopsis"
      }
      ```
    outputs:
      tdd_data_schema_artifact_url: "Public URL of the data-schema TDD proposal."
      tdd_data_schema_summary: "One-line summary."

  tdd_proposal_system_design:
    agent: solution-architect
    prompt: |
      Draft a TDD proposal from the SYSTEM-DESIGN / API / SECURITY / OPS angle.

      The user-supplied REQUIREMENT is the authoritative spec. Read it
      carefully; if it contains a URL (Linear ticket, PRD doc), treat
      that URL as part of the spec.

      REQUIREMENT:
      {{requirement}}

      PRODUCT CONTEXT:
      {{product_context}}

      📄 CODEBASE GROUNDING (REQUIRED reading):
      {{codebase_grounding_artifact_url}}

      AFFECTED MODULES: {{affected_modules_index}}
      REPO STACK:       {{repo_stack_summary}}

      SCOPE DISCIPLINE:
        - Design the components, APIs, and infrastructure that the
          requirement requires, PLUS minimally-necessary supporting
          work (the endpoint that returns the data the page shows,
          route registration, error/empty-state contracts, baseline
          observability that the codebase already enforces).
        - Do NOT add services, queues, caches, microservices, or
          abstractions that neither a requirement clause nor a necessary
          precondition justifies.
          Example: a "list products" page needs ONE read endpoint and
          standard routing/auth wiring — NOT a service bus, search
          index, or caching tier unless the requirement explicitly
          triggers them.
        - Prefer extending the existing architecture from the codebase
          grounding survey over introducing new components. New
          components must trace to a specific requirement or be a
          necessary precondition for one.
        - Tradeoffs are about the design decision itself, not an excuse
          to discuss future capabilities the requirement does not request.
        - List rejected architectural extensions in a "Considered and
          rejected" subsection. Do NOT list necessary supporting
          components there.

      Focus only on this angle:
        - Component / service decomposition
        - APIs, interfaces, contracts, sequence diagrams
        - Deployment topology, scaling, reliability, security, observability
        - Tradeoffs and alternatives considered
        - Per-requirement-clause coverage mapping (quote the literal
          requirement phrase you're satisfying)

      Save the full draft:
        mcp__allen__allen_save_artifact("tdd/drafts/03-system-design-tdd-proposal.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl to JSON as `tdd_system_design_artifact_url`.

      End with a fenced JSON block:

      ```json
      {
        "tdd_system_design_artifact_url": "<publicUrl>",
        "tdd_system_design_summary": "one-line synopsis"
      }
      ```
    outputs:
      tdd_system_design_artifact_url: "Public URL of the system-design TDD proposal."
      tdd_system_design_summary: "One-line summary."

  tdd_proposal_flow:
    agent: technical-designer
    prompt: |
      Draft a TDD proposal from the RUNTIME DATA FLOW + UX FLOW angle.
      (LARGE severity only — this proposal does not run for medium.)

      This is the dynamic view that complements tdd_proposal_data_schema
      (static model) and tdd_proposal_system_design (component layout):
      trace how data actually MOVES end-to-end, and how the user (if
      any) walks through the feature.

      The user-supplied REQUIREMENT is the authoritative spec.

      REQUIREMENT:
      {{requirement}}

      PRODUCT CONTEXT:
      {{product_context}}

      📄 CODEBASE GROUNDING (REQUIRED reading):
      {{codebase_grounding_artifact_url}}

      AFFECTED MODULES: {{affected_modules_index}}
      REPO STACK:       {{repo_stack_summary}}

      SCOPE DISCIPLINE:
        - Cover only the flows the requirement implies, PLUS the
          minimally-necessary supporting steps (auth check, loading
          state, empty/error state, validation, the read that powers
          a requested page). Do NOT invent adjacent flows the
          requirement does not name (search, filter, detail view,
          edit, admin, exports, etc.).
        - If the feature is backend-only and has no UI, the "UX flow"
          section should explicitly say "no UI — backend-only feature"
          and skip the UX section. Do NOT invent a UI.
        - Reuse existing flow patterns from the codebase grounding
          survey (existing nav, existing auth pattern, existing toast
          / error-banner conventions) over inventing new ones.
        - List rejected flows in a "Considered and rejected" subsection.

      Focus only on this angle:

      DATA FLOW (runtime — how data moves):
        - End-to-end sequence: trigger → controller/handler → service →
          persistence → response. Sequence diagram or step list.
        - Producers, consumers, transport, queues, events, retries.
        - State transitions: which fields/enums change when, and what
          triggers each transition.
        - Failure paths: what happens on validation error, persistence
          error, timeout, partial failure. What the caller sees.
        - Idempotency, concurrency, and ordering constraints relevant
          to the requirement.

      UX FLOW (only if the feature has a UI — otherwise say so):
        - Entry points: how the user gets to this feature (existing nav,
          deep link, etc.).
        - Step-by-step user journey for the happy path.
        - Visible states: loading, empty, populated, error.
        - User-facing error messages and how they're presented.
        - Accessibility / keyboard / screen-reader behavior at the level
          the codebase already enforces — not a new bar.

      Per-requirement-clause coverage mapping (quote the literal
      requirement phrase each flow step satisfies).

      Save the full draft:
        mcp__allen__allen_save_artifact("tdd/drafts/04-flow-tdd-proposal.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl to JSON as `tdd_flow_artifact_url`.

      End with a fenced JSON block:

      ```json
      {
        "tdd_flow_artifact_url": "<publicUrl>",
        "tdd_flow_summary": "one-line synopsis",
        "has_ui": true
      }
      ```
    outputs:
      tdd_flow_artifact_url: "Public URL of the runtime-data-flow + UX-flow TDD proposal."
      tdd_flow_summary: "One-line summary."
      has_ui: "Boolean — true if the feature has a UX flow; false for backend-only features."

  # ── TDD finalizer (shared by MEDIUM and LARGE; also handles small-lane
  #    revisions when the validator rejects the simple TDD) ──────────────
  tdd_finalizer:
    agent: technical-designer
    resume_on_retry: true
    prompt: |
      You are the final TDD generator and TDD gatekeeper. Two operating
      modes depending on inputs:

      MODE A — Consolidation (medium/large lane, normal run):
        You receive multiple TDD proposal artifacts. Consolidate them
        into a single TDD, perform a SELF-CRITIQUE pass, and decide
        whether human clarification is required.

      MODE B — Revision (small lane after validator failure):
        You receive `simple_tdd_artifact_url` (and NO proposal artifacts)
        plus a `retry_context` containing validator blockers. Treat the
        simple TDD as your starting draft, revise it to address the
        blockers, and emit the revised TDD as the final TDD. Do NOT
        invent new sections beyond what the small lane needs — just fix
        what the validator flagged. Do not try to fetch proposal
        artifacts that don't exist.

      Pick the mode by looking at which inputs are populated:
        - If simple_tdd_artifact_url is set AND the proposal URLs are
          empty → MODE B.
        - Otherwise → MODE A.

      In BOTH modes, the user-supplied REQUIREMENT is the authoritative
      spec — there is no separate PRD finalizer in this workflow. If
      the requirement is ambiguous, missing critical product intent, or
      contradicts the codebase grounding in ways you cannot resolve,
      ask the user via tdd_needs_clarification.

      REQUIREMENT (may include a Linear ticket URL or PRD doc URL):
      {{requirement}}

      PRODUCT CONTEXT:
      {{product_context}}

      SEVERITY: {{severity}}

      📄 CODEBASE GROUNDING:
      {{codebase_grounding_artifact_url}}

      📄 INPUT ARTIFACTS:
        Small-lane starting draft (MODE B input — empty in MODE A):
          SIMPLE TDD: {{simple_tdd_artifact_url}}

        Proposal artifacts (MODE A inputs — empty in MODE B):
        1. STATIC SCHEMA / DATA MODEL : {{tdd_data_schema_artifact_url}}
            summary: {{tdd_data_schema_summary}}
        2. SYSTEM DESIGN              : {{tdd_system_design_artifact_url}}
            summary: {{tdd_system_design_summary}}
        {{#if tdd_flow_artifact_url}}
        3. RUNTIME DATA FLOW + UX FLOW: {{tdd_flow_artifact_url}}
            summary: {{tdd_flow_summary}}
            has_ui: {{has_ui}}
        {{/if}}

      HUMAN TDD CLARIFICATION ANSWERS (if a prior round happened):
      {{tdd_clarification_answers}}

      EXTRA TDD NOTES:
      {{tdd_extra_notes}}

      Step 1 — Coverage and gap check:
        - Map every requirement clause to TDD coverage.
        - Identify missing data flow / schema / file targets / API
          contracts / security / observability / rollout / test strategy.
        - Identify requirement gaps: ambiguous behavior, missing edge
          cases the requirement should have specified, conflicting
          statements, unclear acceptance.

      Step 1b — Scope discipline (mandatory, but do not strip necessary work):
        - For EVERY file / schema / component across all upstream proposals,
          it must be justified by ONE of:
            (a) a literal phrase in the REQUIREMENT, OR
            (b) a necessary precondition for (a) to actually function
                in this codebase (e.g., the read endpoint that powers
                the requested page, empty/loading/error states,
                conformance to existing auth, accessibility parity with
                neighboring pages, baseline observability this codebase
                already uses, the test coverage required to verify
                the literal behavior).
          If neither (a) nor (b), CUT the item to the "Considered and
          rejected" section.
        - Common scope-creep patterns to actively reject:
            * adjacent CRUD operations (detail / edit / delete components
              when only list was requested)
            * search, filter, sort, pagination components when not
              requested
            * admin / management modules when only end-user view was
              asked for
            * speculative NFRs / new infra (caching tiers, queues,
              multi-region) when the existing system already meets the
              literal requirement
            * future-proofing components ("…so we can later add X")
        - Things that LOOK like scope creep but are NOT (do not cut):
            * the API endpoint that returns the data the requested page
              shows
            * empty state, error state, loading state for the requested
              feature
            * authn/authz when the rest of the app already requires it
            * accessibility, i18n, observability at the level the
              codebase already enforces
            * the test coverage required to verify the literal behavior
        - The final TDD MUST contain an explicit "Considered and
          rejected" section listing rejected adjacent components.
        - If the proposals UNDER-scoped (missed necessary supporting
          work), add it back — surface this in tdd_self_critique_findings
          and include the item in the final TDD.

      Step 2 — Self-critique pass (intensity scales with severity):
        - For severity == 'medium': stress-test against obvious edge
          cases, untested paths, rollback risks.
        - For severity == 'large': adversarial self-critique covering:
            * security regressions
            * performance / load implications
            * data migration & rollback
            * blast radius and operability
            * blast on existing contracts / consumers
          Flag everything that would block implementation.

      Step 3a — If clarification is required (technical OR requirement gaps):
        - Set tdd_needs_clarification=true.
        - Emit every focused tdd_clarification_question you genuinely
          need — there is no cap on the number of questions. Keep each
          question concrete and answerable in plain text. Do NOT pad
          the list, do NOT split one question into many, and do NOT
          skip a real question to stay under some imagined limit. If
          the gap is in the user-supplied requirement (not the
          technical design), phrase the question for the
          requirement-owner audience and include that context.
        - Save the decision report:
          mcp__allen__allen_save_artifact("tdd/finalizer/05-tdd-finalizer-decision.md", <markdown>, content_type="markdown", overwrite=true)
        - Leave final_tdd_artifact_url empty.

      Step 3b — If no clarification is needed:
        - Set tdd_needs_clarification=false.
        - Generate the final consolidated TDD with sections:
          Executive summary · Problem statement (restated from the
          requirement) · Architecture overview · Data flow ·
          Schema / data model · File-level changes and impact ·
          APIs / contracts / system design · Security, observability,
          reliability, rollout · Test strategy · Requirement-to-design
          coverage matrix (every requirement clause mapped to design
          elements) · Considered and rejected (adjacent items left
          out of scope, by name, with one-line reason) · Risks and
          mitigations
        - Save the decision report.
        - Save the final TDD:
          mcp__allen__allen_save_artifact("tdd/final/06-final-tdd.md", <markdown>, content_type="markdown", overwrite=true)

      End with a fenced JSON block containing EXACTLY:

      ```json
      {
        "tdd_needs_clarification": false,
        "tdd_clarification_questions": [],
        "tdd_finalizer_gaps": [],
        "tdd_finalizer_conflicts": [],
        "tdd_self_critique_findings": [],
        "tdd_finalizer_decision_artifact_url": "<publicUrl>",
        "final_tdd_artifact_url": "<publicUrl or empty>",
        "final_tdd_coverage_matrix": {},
        "final_tdd_uncovered_requirements": []
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK:
      {{retry_context}}
      {{/if}}
    outputs:
      tdd_needs_clarification: "Boolean — true when human TDD clarification is required (technical gaps OR requirement gaps)."
      tdd_clarification_questions: "Array of TDD clarification questions; empty when not needed."
      tdd_finalizer_gaps: "TDD gaps found during consolidation, including requirement gaps."
      tdd_finalizer_conflicts: "Conflicts between TDD proposals or between proposals and the requirement."
      tdd_self_critique_findings: "Issues uncovered by the self-critique pass."
      tdd_finalizer_decision_artifact_url: "Public URL of the TDD finalizer decision report."
      final_tdd_artifact_url: "Public URL of the final TDD; empty until ready."
      final_tdd_coverage_matrix: "Matrix mapping requirement clauses to technical design coverage."
      final_tdd_uncovered_requirements: "Requirement clauses not fully covered."

  tdd_human_clarification:
    type: human
    fields:
      - name: tdd_clarification_answers
        label: "Answers to TDD clarification questions (engineering / requirement owner audience)"
        type: textarea
        required: true
      - name: tdd_extra_notes
        label: "Extra TDD notes or requirement updates"
        type: textarea
        required: false
    outputs:
      tdd_clarification_answers: "Human answers to the TDD finalizer questions."
      tdd_extra_notes: "Optional additional TDD guidance or updated requirement context."
    prompt: |
      The TDD finalizer needs clarification. The questions may be about
      the technical design OR about gaps in the requirement you supplied.

      ORIGINAL REQUIREMENT:
      {{requirement}}

      📄 TDD FINALIZER DECISION REPORT:
      {{tdd_finalizer_decision_artifact_url}}

      TDD QUESTIONS:
      {{tdd_clarification_questions}}

      TDD GAPS:
      {{tdd_finalizer_gaps}}

      TDD CONFLICTS:
      {{tdd_finalizer_conflicts}}

      Please answer each question in order. If a question reveals a gap
      in the requirement itself, add the updated requirement context in
      the "Extra TDD notes" field.

  # ── Final readiness gate (all lanes converge here) ─────────────────────
  implementation_readiness_validator:
    agent: implementation-validator
    resume_on_retry: true
    prompt: |
      Validate whether the TDD is ready to hand off to an implementation
      agent. This is the blocking quality gate.

      ORIGINAL REQUIREMENT (authoritative — may include a Linear ticket
      URL or PRD doc URL):
      {{requirement}}

      SEVERITY: {{severity}}

      📄 CODEBASE GROUNDING:
      {{codebase_grounding_artifact_url}}

      ── WHICH TDD TO VALIDATE ─────────────────────────────────────────
      Two artifact URLs may be in state. Apply this precedence:

        1. If `final_tdd_artifact_url` is set (non-empty), validate
           THAT artifact. It is the most recently produced TDD and
           supersedes any earlier draft. This is true for:
             - medium/large normal runs (tdd_finalizer wrote it)
             - small-lane validator-failure retry (tdd_finalizer MODE B
               wrote a revised TDD here even though severity is 'small')
        2. Otherwise, validate `simple_tdd_artifact_url`. This is the
           small-lane first-pass case where the simple TDD has not yet
           been revised.

      📄 FINAL TDD (preferred when set):  {{final_tdd_artifact_url}}
      📄 SIMPLE TDD (fallback):           {{simple_tdd_artifact_url}}
      COVERAGE MATRIX (medium/large):     {{final_tdd_coverage_matrix}}
      UNCOVERED REQS  (medium/large):     {{final_tdd_uncovered_requirements}}

      Fetch the chosen artifact via mcp__allen__allen_get_artifact before
      validating. The bodies are not inlined.

      Validate strictly:
        1. Every clause of the original requirement is covered by the TDD
           (file targets, schema, APIs, tests).
        2. The TDD includes data flow, schema, file-level changes, APIs/
           contracts, security, observability, rollout, test strategy
           where applicable.
        3. No implementation agent would need to guess schema decisions,
           API contracts, file targets, or acceptance tests.
        4. The codebase grounding survey is reflected in the file
           targets and patterns chosen.
        5. SCOPE DISCIPLINE (without stripping necessary work): every
           file / schema / component in the TDD must trace to either:
             (a) a literal phrase in the ORIGINAL REQUIREMENT, OR
             (b) a necessary precondition for (a) to function in this
                 codebase (read endpoint, loading/empty/error states,
                 conformance to existing auth/accessibility/observability
                 baselines, test coverage for the literal requirement).
           Reject (ready_for_implementation=false) ONLY if you find
           components that fit NEITHER (a) nor (b) — i.e. adjacent
           features the user did not ask for AND that are not necessary
           supporting work. Example red flags for "list all products":
             - detail / edit / delete views in the TDD
             - search / filter / sort / pagination components not
               mentioned by the user
             - admin views, exports, notifications, analytics
             - speculative NFRs (new caching tiers, queues) at small scale
           NOT red flags (these are necessary, keep them):
             - the read endpoint that powers the page
             - loading / empty / error states
             - conformance to existing auth and layout patterns
             - baseline observability/accessibility the codebase
               already enforces
             - tests that verify the stated requirement
           The TDD MUST contain an explicit "Considered and rejected"
           section naming the adjacent components that were left out
           of scope. If the section is missing, reject. If that section
           lists items that are actually necessary supporting work
           (e.g. "loading state: out of scope"), also reject — those
           should not have been excluded.

      If anything is missing OR scope-creep is detected, set
      ready_for_implementation=false and list exactly what blocks
      handoff (including the specific file/component that is out of
      scope). Also reject if necessary supporting work was stripped —
      under-scoping is just as blocking as over-scoping.

      Produce a handoff document with:
        - Problem statement (restated from the requirement)
        - Readiness verdict
        - Final TDD artifact link
        - Blocking issues (if any)
        - Non-blocking risks (if any)
        - Implementation-agent handoff prompt ready to dispatch

      Save:
        mcp__allen__allen_save_artifact("handoff/07-implementation-readiness-handoff.md", <markdown>, content_type="markdown", overwrite=true)
      Copy publicUrl to JSON as `implementation_readiness_handoff_artifact_url`.

      End with a fenced JSON block containing EXACTLY:

      ```json
      {
        "ready_for_implementation": true,
        "implementation_readiness_verdict": "ready",
        "implementation_readiness_blockers": [],
        "implementation_readiness_risks": [],
        "implementation_readiness_scope_findings": [],
        "implementation_problem_statement": "…",
        "implementation_final_tdd_artifact_url": "<url or empty>",
        "implementation_simple_tdd_artifact_url": "<url or empty>",
        "implementation_agent_handoff_prompt": "…",
        "implementation_readiness_handoff_artifact_url": "<publicUrl>"
      }
      ```

      {{#if retry_context}}
      RETRY FEEDBACK from a previous validator pass:
      {{retry_context}}
      {{/if}}
    outputs:
      ready_for_implementation: "Boolean readiness gate. true → END; false → auto-retries once back to the TDD producer (simple_tdd_design or tdd_finalizer), then escalates to design_escalation_review."
      implementation_readiness_verdict: "Concise validator verdict."
      implementation_readiness_blockers: "Blocking issues that must be fixed before implementation."
      implementation_readiness_risks: "Non-blocking risks for the implementation agent."
      implementation_readiness_scope_findings: "Scope-discipline findings — adjacent components in the TDD that the validator flagged as not traceable to the original requirement (empty when clean)."
      implementation_problem_statement: "Problem statement to pass to the implementation agent."
      implementation_final_tdd_artifact_url: "Final TDD artifact URL (medium/large) — empty for small lane."
      implementation_simple_tdd_artifact_url: "Simple TDD artifact URL (small lane) — empty for medium/large."
      implementation_agent_handoff_prompt: "Direct prompt payload for the implementation agent."
      implementation_readiness_handoff_artifact_url: "Public URL of the validator handoff document."

  # ── Escalation gate (catch-all for retry exhaustion) ──────────────────
  design_escalation_review:
    type: human
    fields:
      - name: escalation_decision
        label: "Clarification retries exhausted. What now?"
        type: select
        options: [retry_with_feedback, force_continue, abandon]
        required: true
      - name: escalation_feedback
        label: "Feedback or reason"
        type: textarea
        required: true
    outputs:
      escalation_decision: "retry_with_feedback | force_continue | abandon"
      escalation_feedback: "Feedback that goes into retry_context on retry."
    prompt: |
      🔴 A retry loop ran out of retries. This happens in two cases:
        - tdd_human_clarification: user clarification didn't unblock
          the finalizer after 2 attempts.
        - implementation_readiness_validator: the auto-retry on
          validator failure ran twice and the TDD is still rejected.

      ORIGINAL REQUIREMENT:
      {{requirement}}

      WHICH LOOP EXHAUSTED:
      {{__retry_exhausted_from}}

      📄 ARTIFACTS SO FAR:
        Codebase survey:           {{codebase_grounding_artifact_url}}
        TDD finalizer decision:    {{tdd_finalizer_decision_artifact_url}}
        Final TDD (may be empty):  {{final_tdd_artifact_url}}
        Simple TDD (may be empty): {{simple_tdd_artifact_url}}
        Validator handoff:         {{implementation_readiness_handoff_artifact_url}}

      OPEN GAPS / CONFLICTS:
        TDD gaps:           {{tdd_finalizer_gaps}}
        TDD conflicts:      {{tdd_finalizer_conflicts}}
        Validator blockers: {{implementation_readiness_blockers}}

      OUTSTANDING QUESTIONS:
        TDD: {{tdd_clarification_questions}}

      Options:
        retry_with_feedback → loop back to the exhausted node with your
                              feedback. Retry counters reset.
                              (tdd_human_clarification exhausted →
                               re-runs tdd_finalizer;
                               implementation_readiness_validator
                               exhausted → re-runs tdd_finalizer or
                               simple_tdd_design depending on severity.)
        force_continue      → skip remaining retries and proceed
                              straight to the validator (or END if the
                              validator was already the exhausted node).
        abandon             → end the run; artifacts preserved.

edges:
  # ── Phase 1: ground + classify (single LLM call) ───────────────────────
  - { from: START, to: codebase_grounding }

  # Grounding → severity routing. Parallel fan-out for medium/large via
  # `parallel: true` + array `to`. Engine.ts:762 requires this exact shape
  # to actually run branches concurrently — separate edges would execute
  # sequentially in a for-await loop.
  - { from: codebase_grounding, to: simple_tdd_design,
      condition: "severity == 'small'" }
  - from: codebase_grounding
    to: [tdd_proposal_data_schema, tdd_proposal_system_design]
    parallel: true
    condition: "severity == 'medium'"
  - from: codebase_grounding
    to: [tdd_proposal_data_schema, tdd_proposal_system_design, tdd_proposal_flow]
    parallel: true
    condition: "severity == 'large'"
  - { from: codebase_grounding, to: severity_classification_human,
      condition: "severity != 'small' AND severity != 'medium' AND severity != 'large'" }

  # Human fallback fan-out (same routing as grounding, also parallelized).
  - { from: severity_classification_human, to: simple_tdd_design,
      condition: "severity == 'small'" }
  - from: severity_classification_human
    to: [tdd_proposal_data_schema, tdd_proposal_system_design]
    parallel: true
    condition: "severity == 'medium'"
  - from: severity_classification_human
    to: [tdd_proposal_data_schema, tdd_proposal_system_design, tdd_proposal_flow]
    parallel: true
    condition: "severity == 'large'"

  # ── SMALL lane: simple TDD → validator (normal) OR auto-upgrade
  #    to the medium proposal lane when the drafter detected scope creep.
  #    The drafter sets severity='medium' alongside scope_creep_detected=true,
  #    so the existing medium fan-in (severity == 'medium') fires.
  - from: simple_tdd_design
    to: [tdd_proposal_data_schema, tdd_proposal_system_design]
    parallel: true
    condition: "scope_creep_detected == true"
  - { from: simple_tdd_design, to: implementation_readiness_validator,
      condition: "scope_creep_detected != true" }

  # ── TDD finalizer fan-in (medium = 2 proposals, large = 3) ────────────
  - from: [tdd_proposal_data_schema, tdd_proposal_system_design]
    to: tdd_finalizer
    condition: "severity == 'medium'"
  - from: [tdd_proposal_data_schema, tdd_proposal_system_design, tdd_proposal_flow]
    to: tdd_finalizer
    condition: "severity == 'large'"

  # TDD finalizer outgoing. Two branches:
  #   (a) clarification needed (technical OR requirement gap) → human
  #   (b) all clear → validator
  - { from: tdd_finalizer, to: tdd_human_clarification,
      condition: "tdd_needs_clarification == true" }
  - { from: tdd_finalizer, to: implementation_readiness_validator,
      condition: "tdd_needs_clarification != true" }

  # TDD clarification retry (max 2). Exhaustion fallback declared AFTER.
  - from: tdd_human_clarification
    to: tdd_finalizer
    max_retries: 2
    retry_context: |
      The user answered the TDD clarification questions:
      {{tdd_clarification_answers}}

      Extra TDD notes / updated requirement context:
      {{tdd_extra_notes}}

      Re-run the TDD finalizer. If the answers resolve the ambiguity,
      emit tdd_needs_clarification=false. Ask follow-up only if still
      strictly blocked.
  - { from: tdd_human_clarification, to: design_escalation_review,
      condition: "__retry_exhausted_from == 'tdd_human_clarification'" }

  # ── Validator outcome routing ─────────────────────────────────────────
  # Success → END. Failure auto-retries up to 2 attempts back to
  # tdd_finalizer (regardless of severity) with the validator's
  # blockers as retry_context. tdd_finalizer detects small-lane mode
  # from its inputs and revises the simple TDD instead of consolidating
  # proposals. Only after both retries fail does control fall through
  # to design_escalation_review.
  - { from: implementation_readiness_validator, to: END,
      condition: "ready_for_implementation == true" }
  - from: implementation_readiness_validator
    to: tdd_finalizer
    condition: "ready_for_implementation != true"
    max_retries: 2
    retry_context: |
      Validator rejected the TDD. Blockers:
      {{implementation_readiness_blockers}}

      Non-blocking risks (FYI):
      {{implementation_readiness_risks}}

      Scope findings:
      {{implementation_readiness_scope_findings}}

      📄 Validator handoff document (read for full context):
      {{implementation_readiness_handoff_artifact_url}}

      Re-run tdd_finalizer addressing each blocker.
        - If simple_tdd_artifact_url is set and proposal artifacts are
          empty (small lane), revise the simple TDD against these
          blockers and emit it as the final TDD (MODE B).
        - Otherwise, revise the previously-finalized TDD against these
          blockers (MODE A).
      Do NOT regress on scope: keep necessary supporting work
      (loading/empty/error states, auth conformance, the read endpoint,
      test coverage), and cut only the adjacent items the validator
      flagged as out of scope.
  - { from: implementation_readiness_validator, to: design_escalation_review,
      condition: "__retry_exhausted_from == 'implementation_readiness_validator'" }

  # ── Escalation outgoing (abandon / retry / force_continue) ────────────
  - { from: design_escalation_review, to: END,
      condition: "escalation_decision == 'abandon'" }

  # retry_with_feedback: condition-only retry edge → engine clears
  # __retry_exhausted_from and resets retry counters for the target.
  - from: design_escalation_review
    to: tdd_finalizer
    condition: "escalation_decision == 'retry_with_feedback' AND __retry_exhausted_from == 'tdd_human_clarification'"
    retry_context: |
      Human intervened after TDD clarification retries were exhausted.
      Feedback: {{escalation_feedback}}

      Re-run tdd_finalizer with this feedback. Do NOT ask another round
      of clarification unless the request is genuinely impossible.

  # Validator auto-retry (2 attempts) exhausted → human-added feedback
  # plus validator blockers go back to tdd_finalizer. Same node for
  # all severities — tdd_finalizer detects small-lane MODE B from its
  # inputs (simple_tdd_artifact_url set, proposal URLs empty).
  - from: design_escalation_review
    to: tdd_finalizer
    condition: "escalation_decision == 'retry_with_feedback' AND __retry_exhausted_from == 'implementation_readiness_validator'"
    retry_context: |
      Validator auto-retry exhausted on the TDD. Human feedback:
      {{escalation_feedback}}

      Validator blockers:
      {{implementation_readiness_blockers}}

      Re-run tdd_finalizer addressing both. Keep necessary supporting
      work; cut only adjacent items the validator flagged as out of scope.

  # force_continue routes depending on which loop exhausted:
  #   - tdd_human_clarification exhausted → run validator (it will
  #     reject if blockers remain, which is fine — surface the failure).
  #   - implementation_readiness_validator exhausted → straight to END
  #     (force_continue here means "ship the current TDD with its known
  #     blockers"; re-running validator would just fail again).
  - { from: design_escalation_review, to: implementation_readiness_validator,
      condition: "escalation_decision == 'force_continue' AND __retry_exhausted_from == 'tdd_human_clarification'" }
  - { from: design_escalation_review, to: END,
      condition: "escalation_decision == 'force_continue' AND __retry_exhausted_from == 'implementation_readiness_validator'" }
