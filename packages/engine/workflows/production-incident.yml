name: production-incident
description: >
  Production incident investigation. Incident Responder triages, 3 parallel
  investigation tracks (code, infra, data), Performance Profiler analyses,
  API Developer hotfixes, Regression Analyst verifies, Security Reviewer checks,
  Runbook Author writes postmortem. You merge the PR manually.
version: 2

context:
  requires: [repo]
  tools: [filesystem, git, terminal, database]

input:
  incident: { type: string, required: true }
  repo_path: { type: string, required: true }
  severity: { type: string, required: false, default: "unknown" }

nodes:
  # ── Phase 1: Triage (Operations Team) ──
  triage:
    agent: incident-responder
    prompt: |
      PRODUCTION INCIDENT — triage immediately:
      {{incident}}
      Severity: {{severity}}

      Quick triage:
      1. What is affected? (endpoints, pages, services)
      2. When did it start? (git log --oneline -20 for recent changes)
      3. Full or partial outage?
      4. Blast radius? (all users, some, one?)
      5. What changed recently? (code changes, config, dependencies)
    outputs: [affected_surface, recent_changes, blast_radius, initial_hypothesis]

  # ── Phase 2: Human decides action ──
  decide:
    type: human
    prompt: |
      INCIDENT TRIAGE:

      Affected: {{affected_surface}}
      Blast radius: {{blast_radius}}
      Recent changes: {{recent_changes}}
      Hypothesis: {{initial_hypothesis}}

    fields:
      - { name: action, type: select, options: [investigate-and-fix, investigate-only], label: "Action" }
      - { name: context, type: text, required: false, label: "Extra context (logs, user reports)" }
    outputs: [action, context]

  # ── Phase 3: Parallel investigation tracks ──
  # Track A: Code — what changed recently?
  investigate-code:
    agent: codebase-navigator
    prompt: |
      INCIDENT — code investigation:
      {{incident}}
      Hypothesis: {{initial_hypothesis}}
      Recent changes: {{recent_changes}}
      {{#if context}}Extra: {{context}}{{/if}}

      1. Diff the last 5 commits — what changed?
      2. Trace the affected endpoint end-to-end
      3. Look for: off-by-one, missing error handling, race conditions, null checks
      4. Check if issue is in code or data
    outputs: [code_root_cause, code_evidence, code_confidence]

  # Track B: Infrastructure — config, resources, environment
  investigate-infra:
    agent: environment-manager
    prompt: |
      INCIDENT — infrastructure investigation:
      {{incident}}
      Affected: {{affected_surface}}
      {{#if context}}Extra: {{context}}{{/if}}

      Check:
      1. Environment configs (.env files, docker configs)
      2. Connection strings, timeouts, pool sizes
      3. Rate limit configs
      4. CI/CD pipeline changes
      5. Any config drift?
    outputs: [infra_root_cause, infra_evidence, infra_confidence]

  # Track C: Performance — resource exhaustion?
  investigate-performance:
    agent: performance-profiler
    prompt: |
      INCIDENT — performance investigation:
      {{incident}}
      Affected: {{affected_surface}}
      {{#if context}}Extra: {{context}}{{/if}}

      Check:
      1. Database queries — any missing indexes? N+1 queries? Full scans?
      2. Connection pool exhaustion?
      3. Memory leaks or high CPU?
      4. Blocking operations on the main thread?
    outputs: [perf_root_cause, perf_evidence, perf_confidence]

  # Track D: Data — corrupt/unexpected data?
  investigate-data:
    agent: data-quality-monitor
    prompt: |
      INCIDENT — data investigation:
      {{incident}}
      Affected: {{affected_surface}}
      {{#if context}}Extra: {{context}}{{/if}}

      Check:
      1. Schema mismatches, migration issues
      2. Null values where not expected
      3. Referential integrity violations
      4. Recent schema changes
    outputs: [data_root_cause, data_evidence, data_confidence]

  # ── Phase 4: Synthesise ──
  synthesise:
    agent: incident-responder
    prompt: |
      SYNTHESISE incident findings:

      CODE: {{code_root_cause}} ({{code_confidence}})
      Evidence: {{code_evidence}}

      INFRA: {{infra_root_cause}} ({{infra_confidence}})
      Evidence: {{infra_evidence}}

      PERFORMANCE: {{perf_root_cause}} ({{perf_confidence}})
      Evidence: {{perf_evidence}}

      DATA: {{data_root_cause}} ({{data_confidence}})
      Evidence: {{data_evidence}}

      Determine:
      1. Most likely root cause (pick the highest-confidence finding)
      2. Contributing factors
      3. Specific fix needed (file, line, change)
      4. Risk of the fix
      5. What monitoring to add
    outputs: [root_cause, fix_plan, fix_risk, monitoring_plan]

  # ── Phase 5: Hotfix workspace (git worktree + ports + setup) ──
  create-branch:
    type: code
    function: create-workspace
    config:
      wait_for_setup: true
    outputs: [worktree_path, branch_name, workspace_id]

  hotfix:
    agent: api-developer
    prompt: |
      HOTFIX in {{worktree_path}}:

      ROOT CAUSE: {{root_cause}}
      FIX PLAN: {{fix_plan}}

      {{#if retry_context}}PREVIOUS ATTEMPT FAILED:\n{{retry_context}}{{/if}}

      RULES:
      - MINIMAL change. Fix ONLY the root cause.
      - Do NOT refactor.
      - Do NOT add features.
      - Run build to verify.
    outputs: [changed_files, fix_summary]
    resume_on_retry: true

  # ── Phase 6: Verify (parallel) ──
  regression-test:
    agent: regression-analyst
    prompt: |
      Run tests and verify the hotfix in {{worktree_path}}:

      ROOT CAUSE: {{root_cause}}
      FIX: {{fix_summary}}
      CHANGED: {{changed_files}}

      1. Run the full test suite
      2. Classify any failures: REAL REGRESSION, FLAKY, TEST-ENV
      3. Report: test_passed = true only if zero real regressions
    outputs: [test_passed, test_output]

  security-check:
    agent: code-security-reviewer
    prompt: |
      Security check of hotfix in {{worktree_path}}:

      Changed: {{changed_files}}
      Fix: {{fix_summary}}

      Quick check: does the fix introduce security issues?
      Verdict: APPROVED or REQUEST_CHANGES.
    outputs: [security_verdict, security_feedback]

  hotfix-build:
    type: code
    function: run-build
    retries: 1
    outputs: [build_passed, build_errors]

  # ── Phase 7: PR ──
  create-pr:
    agent: release-manager
    prompt: |
      Create HOTFIX PR from {{branch_name}} in {{worktree_path}}:

      Title: hotfix: {{fix_summary}}
      Body:
      - Incident: {{incident}}
      - Root cause: {{root_cause}}
      - Fix: {{fix_summary}}
      - Risk: {{fix_risk}}
      - Tests verified, security reviewed

      Stage, commit, push, create PR. Mark as high priority.
    outputs: [pr_url]

  # ── Phase 8: Postmortem + Monitoring ──
  postmortem:
    agent: runbook-author
    prompt: |
      Write a postmortem for this production incident:

      INCIDENT: {{incident}}
      SEVERITY: {{severity}}
      AFFECTED: {{affected_surface}}
      BLAST RADIUS: {{blast_radius}}

      ROOT CAUSE: {{root_cause}}
      Code evidence: {{code_evidence}}
      Infra evidence: {{infra_evidence}}
      Perf evidence: {{perf_evidence}}
      Data evidence: {{data_evidence}}

      FIX: {{fix_summary}}
      {{#if pr_url}}PR: {{pr_url}}{{/if}}

      Format:
      ## Incident Summary
      ## Timeline
      ## Root Cause Analysis
      ## Resolution
      ## Action Items (prevent recurrence)
      ## Monitoring Improvements
      ## Lessons Learned
    outputs: [postmortem_report]

  add-monitoring:
    agent: monitoring-engineer
    prompt: |
      Based on this incident, add monitoring in {{worktree_path}}:

      ROOT CAUSE: {{root_cause}}
      MONITORING PLAN: {{monitoring_plan}}

      Add alerts/checks that would catch this earlier next time.
      Document the alert: what it means, threshold, runbook link.
    outputs: [monitoring_added]

edges:
  # Triage → decide
  - { from: START, to: triage }
  - { from: triage, to: decide }

  # Parallel investigation (all 4 tracks)
  - { from: decide, to: [investigate-code, investigate-infra, investigate-performance, investigate-data], parallel: true, join: wait-all }

  # Synthesise
  - { from: [investigate-code, investigate-infra, investigate-performance, investigate-data], to: synthesise }

  # If fix requested → branch → hotfix → verify → PR → postmortem
  - { from: synthesise, to: create-branch, condition: "action == 'investigate-and-fix'" }
  - { from: create-branch, to: hotfix }
  - { from: hotfix, to: [regression-test, security-check, hotfix-build], parallel: true, join: wait-all }

  # Verify fail → retry hotfix
  - { from: [regression-test, security-check, hotfix-build], to: hotfix, condition: "NOT test_passed OR NOT build_passed OR security_verdict == 'REQUEST_CHANGES'", max_retries: 3, retry_context: "Tests:\n{{test_output}}\nBuild:\n{{build_errors}}\nSecurity:\n{{security_feedback}}" }

  # Verify pass → PR → postmortem + monitoring (parallel)
  - { from: [regression-test, security-check, hotfix-build], to: create-pr, condition: "test_passed AND build_passed AND security_verdict == 'APPROVED'" }
  - { from: create-pr, to: [postmortem, add-monitoring], parallel: true, join: wait-all }

  # Investigate-only → postmortem directly (no fix)
  - { from: synthesise, to: postmortem, condition: "action == 'investigate-only'" }

  - { from: [postmortem, add-monitoring], to: END }
  - { from: postmortem, to: END }
