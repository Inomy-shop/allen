name: Deploy FlowForge

on:
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deploy type'
        required: true
        default: 'app-only'
        type: choice
        options:
          - app-only      # fast: just git pull + build + restart via SSM
          - full           # terraform apply (infra + app)
  push:
    branches: [main]
    paths: ['packages/**']

env:
  INSTANCE_ID: i-086efc3e8ad92eb7f
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    # FlowForge-specific secrets come from repo secrets.
    # AWS creds come from org secrets (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY).
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-1
      # Terraform sensitive vars — from repo secrets
      TF_VAR_docdb_uri:      ${{ secrets.DOCDB_URI }}
      TF_VAR_master_key:     ${{ secrets.FLOWFORGE_MASTER_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Full deploy (terraform apply + app) ──
      - name: Setup Terraform
        if: github.event.inputs.deploy_type == 'full'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        if: github.event.inputs.deploy_type == 'full'
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        if: github.event.inputs.deploy_type == 'full'
        working-directory: infra
        run: terraform apply -auto-approve

      # ── App-only deploy (SSM → bootstrap.sh) ──
      # Runs on push-to-main OR when deploy_type is 'app-only' (or unset)
      - name: Deploy app via SSM
        if: github.event.inputs.deploy_type != 'full'
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --comment "FlowForge deploy (commit: ${{ github.sha }})" \
            --parameters 'commands=["sudo -u ubuntu bash /opt/flowforge/infra/templates/bootstrap.sh 2>&1 | tee /tmp/flowforge-deploy.log"]' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command: $COMMAND_ID"
          echo "Waiting for deploy..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" 2>/dev/null || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)

          echo "Status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy failed"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text | tail -50
            exit 1
          fi

          echo "Deploy succeeded"
