name: Allen CI

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: allen-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    name: Build, lint, and test Allen
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out Allen
        uses: actions/checkout@v4

      - name: Set up Node.js for Allen
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Allen dependencies
        run: npm ci

      - name: Build engine, server, and UI
        run: npm run build

      - name: Typecheck engine, server, and UI
        run: npm run lint

      - name: Run Vitest suites
        run: npm test
