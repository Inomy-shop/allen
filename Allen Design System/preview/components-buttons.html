<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 10px; flex-wrap: wrap;">
    <button class="btn btn-primary">Create workflow</button>
    <button class="btn btn-secondary">Open</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">Delete repo</button>
    <button class="btn btn-primary" disabled style="opacity: 0.5; cursor: not-allowed;">Submitting…</button>
  </div>
  <div class="row" style="gap: 10px; flex-wrap: wrap; margin-top: 14px;">
    <button class="btn btn-secondary" style="height: 24px; padding: 0 8px; font-size: 12px;">small</button>
    <button class="btn btn-secondary">default</button>
    <button class="btn btn-secondary" style="height: 36px; padding: 0 16px; font-size: 14px;">large</button>
    <button class="btn btn-secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>Add agent</button>
    <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polygon points="6 3 20 12 6 21 6 3"/></svg>Run</button>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    sentence-case labels · radius 8 · height 24/30/36 · icons 14px from lucide
  </div>
</div>
</body></html>
