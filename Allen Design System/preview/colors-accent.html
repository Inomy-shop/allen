<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #2A76E2;"></div>
      <div class="swatch-meta"><div class="swatch-name">accent</div>#2A76E2 · 42 118 226</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #4490FE;"></div>
      <div class="swatch-meta"><div class="swatch-name">accent-hover</div>#4490FE · 68 144 254</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #DEF0FF;"></div>
      <div class="swatch-meta"><div class="swatch-name">accent-soft</div>#DEF0FF · 222 240 255</div>
    </div>
    <div class="swatch-tile" style="background: #FFFFFF;">
      <div class="swatch-chip" style="background: #FFFFFF; border-bottom: 1px solid #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">on accent</div>#FFFFFF · text on blue</div>
    </div>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); letter-spacing: 0.02em;">
    one accent — every primary action, link, focus ring, active nav. status colors stay reserved for run state.
  </div>
</div>
</body></html>
