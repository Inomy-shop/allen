<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card-frame { background: rgb(var(--color-surface)); }
</style>
</head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 16px; align-items: stretch;">
    <div style="flex: 1; padding: 18px; background: #FFFFFF; border: 1px solid #E3E1DE; border-radius: 12px;">
      <div style="font-size: 13px; font-weight: 600;">resting card</div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-top: 4px;">1px border · no shadow</div>
    </div>
    <div style="flex: 1; padding: 18px; background: #FFFFFF; border: 1px solid #ECEBE8; border-radius: 12px; box-shadow: 0 1px 2px rgb(0 0 0 / 0.04), 0 1px 1px rgb(0 0 0 / 0.04);">
      <div style="font-size: 13px; font-weight: 600;">hover card</div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-top: 4px;">border-strong · shadow-sm</div>
    </div>
    <div style="flex: 1; padding: 18px; background: #FFFFFF; border: 1px solid #E3E1DE; border-radius: 12px; box-shadow: 0 8px 24px rgb(24 24 26 / 0.08), 0 2px 6px rgb(24 24 26 / 0.06);">
      <div style="font-size: 13px; font-weight: 600;">popover</div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-top: 4px;">shadow-popover</div>
    </div>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    two shadows total. resting surfaces always rely on the 1px border, not elevation.
  </div>
</div>
</body></html>
