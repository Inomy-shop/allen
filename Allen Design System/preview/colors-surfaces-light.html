<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #FBFAF8; border-bottom: 1px solid #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface</div>#FBFAF8 · page bg</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #FFFFFF; border-bottom: 1px solid #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface-100</div>#FFFFFF · panel</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #F6F5F2; border-bottom: 1px solid #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface-200</div>#F6F5F2 · muted</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #F9F8F6; border-bottom: 1px solid #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface-300</div>#F9F8F6 · panel alt</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">border</div>#E3E1DE · 1px lines</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #ECEBE8;"></div>
      <div class="swatch-meta"><div class="swatch-name">border-strong</div>#ECEBE8 · hover</div>
    </div>
    <div class="swatch-tile" style="grid-column: span 2;">
      <div class="swatch-chip" style="background: linear-gradient(90deg, #FBFAF8 0%, #FFFFFF 33%, #F6F5F2 66%, #F9F8F6 100%); border-bottom: 1px solid #E3E1DE;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface stack</div>off-white → white → muted strip · layered by elevation</div>
    </div>
  </div>
</div>
</body></html>
