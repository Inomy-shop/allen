<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="col" style="gap: 12px;">
    <div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-bottom: 6px;">Repository name</div>
      <input class="input" placeholder="e.g. inomy-shop/web" />
    </div>
    <div class="row" style="gap: 12px;">
      <div style="flex: 1;">
        <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-bottom: 6px;">Default branch</div>
        <input class="input" value="main" />
      </div>
      <div style="flex: 1;">
        <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-bottom: 6px;">Provider</div>
        <select class="input"><option>github</option><option>gitlab</option></select>
      </div>
    </div>
    <div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-bottom: 6px;">Focused</div>
      <input class="input" style="border-color: rgb(var(--color-accent)); box-shadow: 0 0 0 3px rgb(var(--color-accent) / 0.18);" value="bug-fix-by-severity" />
    </div>
  </div>
</div>
</body></html>
