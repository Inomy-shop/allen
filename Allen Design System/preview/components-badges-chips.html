<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 10px; flex-wrap: wrap;">
    <span class="badge badge-ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>completed</span>
    <span class="badge badge-info"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>running</span>
    <span class="badge badge-warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>queued</span>
    <span class="badge badge-err"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>failed</span>
    <span class="badge badge-human"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>waiting for input</span>
    <span class="badge badge-muted"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="12" cy="12" r="10"/></svg>skipped</span>
  </div>
  <div class="row" style="gap: 8px; margin-top: 14px; flex-wrap: wrap;">
    <span class="chip"><span class="dot dot-run" style="background: rgb(var(--color-accent-cyan));"></span>12 live</span>
    <span class="chip" style="background: rgb(var(--color-accent-green) / 0.12); color: rgb(var(--color-accent-green)); border-color: rgb(var(--color-accent-green) / 0.25);"><span class="dot dot-ok"></span>healthy</span>
    <span class="chip">v0.2</span>
    <span class="chip">node 22</span>
    <span class="chip">⌘K · search</span>
    <span class="chip" style="background: rgb(var(--color-accent-soft)); color: rgb(var(--color-accent)); border-color: rgb(var(--color-accent) / 0.25);">claude-sonnet-4-5</span>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    badges: pill · status-tinted fill at 0.15a · used only on run state. chips: 4-radius mono · borders · 1.5px gap.
  </div>
</div>
</body></html>
