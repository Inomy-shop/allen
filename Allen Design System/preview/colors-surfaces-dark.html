<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: #06080C; }
  .card-frame { background: #06080C; }
  .swatch-tile { background: #0D1116; border-color: #1F2329; }
  .swatch-meta { color: #70757C; }
  .swatch-name { color: #DBDEE2; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #06080C; border-bottom: 1px solid #1F2329;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface</div>#06080C · page bg</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #0D1116; border-bottom: 1px solid #1F2329;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface-100</div>#0D1116 · panel</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #0B0F13; border-bottom: 1px solid #1F2329;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface-200</div>#0B0F13 · muted</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #13181D; border-bottom: 1px solid #1F2329;"></div>
      <div class="swatch-meta"><div class="swatch-name">surface-300</div>#13181D · panel alt</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #5CA4FF;"></div>
      <div class="swatch-meta"><div class="swatch-name">accent</div>#5CA4FF · brightened</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #0C3164;"></div>
      <div class="swatch-meta"><div class="swatch-name">accent-soft</div>#0C3164 · tinted bg</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #1F2329;"></div>
      <div class="swatch-meta"><div class="swatch-name">border</div>#1F2329 · 1px lines</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #DBDEE2;"></div>
      <div class="swatch-meta"><div class="swatch-name">ink-primary</div>#DBDEE2 · text</div>
    </div>
  </div>
</div>
</body></html>
