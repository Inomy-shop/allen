<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 16px; align-items: flex-end;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 64px; height: 48px; background: rgb(var(--color-surface-100)); border: 1px solid rgb(var(--color-border)); border-radius: 4px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">sm · 4px</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 64px; height: 48px; background: rgb(var(--color-surface-100)); border: 1px solid rgb(var(--color-border)); border-radius: 8px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">base · 8px</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 64px; height: 48px; background: rgb(var(--color-surface-100)); border: 1px solid rgb(var(--color-border)); border-radius: 12px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">lg · 12px</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 64px; height: 48px; background: rgb(var(--color-surface-100)); border: 1px solid rgb(var(--color-border)); border-radius: 999px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">pill · 999</div>
    </div>
    <div style="flex: 1; min-width: 0;">
      <div style="font-size: 13px; color: rgb(var(--color-text-primary)); font-weight: 600;">4 / 8 / 12 / pill</div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted)); margin-top: 4px; line-height: 1.6;">
        chips kbd badges → 4<br>buttons inputs nav → 8<br>cards dialogs panels → 12<br>status badges avatars → 999
      </div>
      <div style="font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-subtle)); margin-top: 6px;">no 16+ container radii.</div>
    </div>
  </div>
</div>
</body></html>
