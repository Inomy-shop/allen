<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 16px; align-items: flex-end;">
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 4px;  height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">1·4</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 8px;  height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">2·8</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 12px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">3·12</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 16px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">4·16</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 20px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">5·20</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 24px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">6·24</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 28px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">7·28</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 32px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">8·32</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 40px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">10·40</div></div>
    <div style="display:flex; flex-direction: column; align-items: center; gap: 6px;"><div style="width: 48px; height: 32px; background: #DEF0FF; border-left: 2px solid #2A76E2;"></div><div style="font-family: var(--font-mono); font-size: 10px; color: rgb(var(--color-text-muted));">12·48</div></div>
  </div>
  <div style="margin-top: 16px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    4-pt baseline. page shells px-6 pt-5 pb-8 · cards 16–20 · rows 12·16 · inline gaps 6/8/10/12.
  </div>
</div>
</body></html>
