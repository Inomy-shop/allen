<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #269F5F;"></div>
      <div class="swatch-meta"><div class="swatch-name">ok · green</div>#269F5F</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #0098C0;"></div>
      <div class="swatch-meta"><div class="swatch-name">info · cyan</div>#0098C0</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #DE9300;"></div>
      <div class="swatch-meta"><div class="swatch-name">warn · yellow</div>#DE9300</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #DE3B3D;"></div>
      <div class="swatch-meta"><div class="swatch-name">err · red</div>#DE3B3D</div>
    </div>
    <div class="swatch-tile">
      <div class="swatch-chip" style="background: #9763CC;"></div>
      <div class="swatch-meta"><div class="swatch-name">human · purple</div>#9763CC</div>
    </div>
  </div>
  <div class="row" style="margin-top: 16px; gap: 8px; flex-wrap: wrap;">
    <span class="badge badge-ok">completed</span>
    <span class="badge badge-info">running</span>
    <span class="badge badge-warn">queued</span>
    <span class="badge badge-err">failed</span>
    <span class="badge badge-human">waiting for input</span>
    <span class="badge badge-muted">skipped</span>
  </div>
  <div style="margin-top: 12px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    only used on run state. fills are the color at 0.15 alpha; text is the full color.
  </div>
</div>
</body></html>
