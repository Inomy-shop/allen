<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .avatar { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, #2A76E2, #9763CC); color: white; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .agent-icon { width: 32px; height: 32px; border-radius: 8px; background: rgb(var(--color-accent-purple) / 0.1); border: 1px solid rgb(var(--color-accent-purple) / 0.25); color: rgb(var(--color-accent-purple)); display: inline-flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 12px; flex-wrap: wrap; align-items: center;">
    <div class="avatar">A</div>
    <div class="avatar" style="background: linear-gradient(135deg, #2A76E2, #4490FE);">M</div>
    <div class="avatar" style="background: linear-gradient(135deg, #9763CC, #2A76E2); width: 28px; height: 28px; font-size: 11px;">SK</div>
    <div class="avatar" style="background: linear-gradient(135deg, #2A76E2, #0098C0); width: 48px; height: 48px; font-size: 16px;">EJ</div>
    <div style="width: 1px; height: 36px; background: rgb(var(--color-border));"></div>
    <div class="agent-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div class="agent-icon" style="background: rgb(var(--color-accent) / 0.1); border-color: rgb(var(--color-accent) / 0.25); color: rgb(var(--color-accent));">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
    </div>
    <div class="agent-icon" style="background: rgb(var(--color-accent-green) / 0.1); border-color: rgb(var(--color-accent-green) / 0.25); color: rgb(var(--color-accent-green));">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 12 2 5"/><path d="M22 5 15 12"/><path d="M5 19v-7"/><path d="M19 19v-7"/></svg>
    </div>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    user avatars: pill · accent→purple gradient (only place gradients live). agent icons: 8-radius soft fill in role color.
  </div>
</div>
</body></html>
