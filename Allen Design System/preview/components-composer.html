<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card-frame { background: rgb(var(--color-surface-200)); }
  .composer { background: rgb(var(--color-surface)); border: 1px solid color-mix(in oklch, #2A76E2 18%, #E3E1DE); border-radius: 16px; padding: 18px; box-shadow: none; }
  .composer textarea { width: 100%; border: 0; outline: none; resize: none; font: 400 16px var(--font-body); line-height: 1.6; color: rgb(var(--color-text-primary)); background: transparent; }
  .composer textarea::placeholder { color: rgb(var(--color-text-subtle)); }
  .composer-foot { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="composer">
    <textarea rows="3" placeholder="Message Allen..."></textarea>
    <div class="composer-foot">
      <span class="chip"><span class="dot" style="background: rgb(var(--color-accent-purple));"></span>engineering-bug-fix-l2</span>
      <span class="chip">@ENG-142</span>
      <span class="chip">claude-sonnet-4-5</span>
      <span style="flex: 1;"></span>
      <span class="kbd">⌘↵</span>
      <button class="btn btn-primary">Send</button>
    </div>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: rgb(var(--color-text-muted));">
    chat composer · 16px text · radius 16 · tinted accent border (one place that breaks the 12px rule)
  </div>
</div>
</body></html>
