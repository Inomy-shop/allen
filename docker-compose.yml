services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    restart: unless-stopped

  server:
    build: ./packages/server
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/allen
    volumes:
      - ~/.claude:/root/.claude:ro
    depends_on:
      - mongodb
